function drawFurniture(f){
  ctx.save();
  ctx.fillStyle="rgba(120,70,30,.16)";
  ctx.beginPath(); ctx.ellipse(f.x+f.w/2, f.y+f.h+6, f.w*0.55, 12, 0,0,7); ctx.fill();
  if(f.kind==="table"){
    ctx.fillStyle="#c98a53"; roundRect(f.x,f.y,f.w,f.h,10,true,false);
    ctx.fillStyle="#e0a86b"; roundRect(f.x+6,f.y+5,f.w-12,f.h-16,8,true,false);
    ctx.fillStyle="#a86f3d"; ctx.fillRect(f.x+14,f.y+f.h,12,20); ctx.fillRect(f.x+f.w-26,f.y+f.h,12,20);
    // fruit bowl
    ctx.fillStyle="#fff"; ctx.beginPath(); ctx.ellipse(f.x+f.w/2,f.y+16,34,13,0,0,7); ctx.fill();
    ctx.fillStyle="#ff6b6b"; ctx.beginPath(); ctx.arc(f.x+f.w/2-10,f.y+8,10,0,7); ctx.fill();
    ctx.fillStyle="#ffd93d"; ctx.beginPath(); ctx.arc(f.x+f.w/2+8,f.y+9,9,0,7); ctx.fill();
  } else if(f.kind==="guitar"){
    const cx = f.x + f.w/2, base = f.y + f.h;
    ctx.strokeStyle="#57606f"; ctx.lineWidth=4; ctx.lineCap="round";  // the stand
    ctx.beginPath();
    ctx.moveTo(cx-19, base+6); ctx.lineTo(cx+7, base-28);
    ctx.moveTo(cx+19, base+6); ctx.lineTo(cx-7, base-28);
    ctx.moveTo(cx-13, base-2); ctx.lineTo(cx+13, base-2);
    ctx.stroke(); ctx.lineCap="butt";
    ctx.save();
    // it rocks on the stand while he's playing it
    ctx.translate(cx, base-4);
    ctx.rotate(0.08 + (playing>0 ? Math.sin(T*7)*0.055 : 0));
    ctx.fillStyle="#6b4322"; roundRect(-4.5,-104, 9, 64, 2, true, false);   // neck
    ctx.fillStyle="#3a2412"; roundRect(-8.5,-122,17, 22, 4, true, false);   // headstock
    ctx.fillStyle="#e6d5a8";
    for(let i=0;i<3;i++){
      ctx.beginPath(); ctx.arc(-12,-117+i*7,2.3,0,7); ctx.fill();
      ctx.beginPath(); ctx.arc( 12,-117+i*7,2.3,0,7); ctx.fill();
    }
    ctx.fillStyle="#e0a75c";                                               // body
    ctx.beginPath(); ctx.ellipse(0,-20,20,18,0,0,7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(0,-42,15,14,0,0,7); ctx.fill();
    ctx.fillStyle="rgba(255,255,255,.22)";
    ctx.beginPath(); ctx.ellipse(-7,-24,7,9,-0.3,0,7); ctx.fill();
    ctx.fillStyle="#3a2412";                                               // soundhole
    ctx.beginPath(); ctx.arc(0,-30,6.8,0,7); ctx.fill();
    ctx.strokeStyle="#b9793a"; ctx.lineWidth=1.6;                          // rosette
    ctx.beginPath(); ctx.arc(0,-30,9.5,0,7); ctx.stroke();
    ctx.fillStyle="#5a3a1c"; roundRect(-8,-13,16,4,2,true,false);          // bridge
    ctx.strokeStyle="rgba(255,255,255,.5)"; ctx.lineWidth=0.9;             // strings
    for(let i=-2;i<=2;i++){
      ctx.beginPath(); ctx.moveTo(i*1.9,-11); ctx.lineTo(i*2.7,-112); ctx.stroke();
    }
    ctx.restore();
  } else if(f.kind==="basket"){
    ctx.fillStyle="#e8c07d"; roundRect(f.x,f.y,f.w,f.h,12,true,false);
    ctx.strokeStyle="#c79a54"; ctx.lineWidth=3;
    for(let i=1;i<5;i++){ ctx.beginPath(); ctx.moveTo(f.x+i*20,f.y); ctx.lineTo(f.x+i*20,f.y+f.h); ctx.stroke(); }
    ctx.fillStyle="#ff8fab"; ctx.beginPath(); ctx.ellipse(f.x+30,f.y+2,26,12,0,0,7); ctx.fill();
    ctx.fillStyle="#9ad0ff"; ctx.beginPath(); ctx.ellipse(f.x+72,f.y+1,22,11,0,0,7); ctx.fill();
  } else if(f.kind==="chair"){
    ctx.fillStyle="#8bc7e8"; roundRect(f.x,f.y-34,f.w,34,8,true,false);
    ctx.fillStyle="#69aed3"; roundRect(f.x,f.y,f.w,f.h-16,8,true,false);
    ctx.fillStyle="#4f8fb3"; ctx.fillRect(f.x+8,f.y+f.h-16,10,18); ctx.fillRect(f.x+f.w-18,f.y+f.h-16,10,18);
  } else if(f.kind==="flowers"){
    const cx = f.x + f.w/2, top = f.y + 20;
    ctx.fillStyle="#a5744d"; ctx.fillRect(cx-5, top+4, 10, f.h-12);      // slim leg
    ctx.fillStyle="#8b5e3c"; roundRect(cx-18, f.y+f.h-4, 36, 8, 4, true, false);
    ctx.fillStyle="#c98a53"; roundRect(f.x+6, top-6, f.w-12, 13, 6, true, false);
    ctx.fillStyle="#e0a86b"; roundRect(f.x+8, top-9, f.w-16, 9, 5, true, false);
    // vase
    ctx.fillStyle="#7fb8d8";
    ctx.beginPath();
    ctx.moveTo(cx-8, top-26); ctx.quadraticCurveTo(cx-13, top-10, cx-6, top-9);
    ctx.lineTo(cx+6, top-9); ctx.quadraticCurveTo(cx+13, top-10, cx+8, top-26);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle="rgba(255,255,255,.40)"; roundRect(cx-5, top-23, 3, 11, 1.5, true, false);
    // stems, leaves, blooms
    // the tall yellow one in the middle is the one she takes — the vase remembers
    const blooms = [[-14,-52,"#ff8fab"],[1,-60,"#ffd93d"],[13,-49,"#c77dff"]]
                     .filter((b,i) => !(flowerPicked && i===1));
    ctx.strokeStyle="#5ea45f"; ctx.lineWidth=2.2; ctx.lineCap="round";
    for(const b of blooms){
      ctx.beginPath(); ctx.moveTo(cx, top-24);
      ctx.quadraticCurveTo(cx+b[0]*0.5, top-40, cx+b[0], top+b[1]+7); ctx.stroke();
    }
    ctx.lineCap="butt";
    ctx.fillStyle="#5ea45f";
    ctx.beginPath(); ctx.ellipse(cx-9, top-36, 7, 3.4, -0.5, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+9, top-33, 7, 3.4,  0.5, 0, 7); ctx.fill();
    for(const b of blooms){
      const bx = cx+b[0], by = top+b[1]+7;
      ctx.fillStyle = b[2];
      for(let i=0;i<5;i++){
        const a = i*Math.PI*2/5;
        ctx.beginPath(); ctx.arc(bx+Math.cos(a)*5, by+Math.sin(a)*5, 4.2, 0, 7); ctx.fill();
      }
      ctx.fillStyle="#fff6c9"; ctx.beginPath(); ctx.arc(bx, by, 3.2, 0, 7); ctx.fill();
    }
  } else if(f.kind==="cattree"){
    ctx.restore(); drawCatTree(); return;
  } else if(f.kind==="rug"){
    ctx.fillStyle="#c9a7ff"; ctx.beginPath(); ctx.ellipse(f.x+f.w/2,f.y+f.h/2,f.w/2,f.h/2,0,0,7); ctx.fill();
    ctx.fillStyle="#e6d4ff"; ctx.beginPath(); ctx.ellipse(f.x+f.w/2,f.y+f.h/2,f.w/3,f.h/3,0,0,7); ctx.fill();
  }
  ctx.restore();
}

/* ----- people ----- */
function drawPerson(p, opts){
  const o = opts||{};
  const facing = p.facing;                 // 0 back .. 1 front
  const sx = Math.cos(facing*Math.PI);     // +1 back, -1 front
  const squish = Math.max(0.16, Math.abs(sx));
  const front = sx < 0;
  const lg = o.laugh || 0;      // doubled-up-laughing amount, 0..1
  const jig = o.jig || 0;       // …and a little dance while he plays, 0..1
  const bob = (p.moving ? Math.abs(Math.sin(p.walk))*3 : Math.sin(p.walk*0.9)*1.4)
            + lg*Math.abs(Math.sin(T*17))*7
            + jig*Math.abs(Math.sin(T*8))*5;
  const hopY = p.hop>0 ? -Math.abs(Math.sin((1-p.hop)*Math.PI*3))*16*p.hop : 0;
  const swing = (p.moving ? Math.sin(p.walk)*11 : (o.scrub ? Math.sin(p.walk*3)*7 : Math.sin(p.walk*0.9)*2))
            + jig*Math.sin(T*8)*10;

  const isC = p.who==="Cushla";
  const skin  = isC ? "#ffd7b8" : "#c08a5e";
  const skinD = isC ? "#f0bd97" : "#a26f47";
  const top   = isC ? "#e63946" : "#2fa8a0";
  const topD  = isC ? "#c22a37" : "#238e88";
  const pants = isC ? "#3d4f8a" : "#4a5568";
  // Shonty's hair used to be near-black, which — with a full beard under it —
  // left almost no bare skin and made his whole head read as a dark blob.
  // Warmer brown, a short crop and a goatee let his actual face show through.
  const hair  = isC ? "#ffd45e" : "#4a2f1d";
  const beard = "#57381f";

  ctx.save();
  ctx.translate(p.x, p.y + hopY);
  if(lg > 0){                       // rocking back, holding his sides
    ctx.translate(0, 6*lg);
    ctx.rotate(Math.sin(T*9)*0.10*lg - 0.12*lg);
  }
  if(jig > 0){                      // hips going, at the sink, mid-wash
    ctx.translate(Math.sin(T*4)*4.5*jig, 0);
    ctx.rotate(Math.sin(T*8)*0.07*jig);
  }

  // contact shadow — soft and tight under the feet, not a flat blob
  if(FANCY){
    const sg = ctx.createRadialGradient(0,4,2,0,4,30);
    sg.addColorStop(0,"rgba(80,45,18,.34)");
    sg.addColorStop(0.55,"rgba(80,45,18,.16)");
    sg.addColorStop(1,"rgba(80,45,18,0)");
    ctx.save(); ctx.translate(0,4); ctx.scale(1,0.34);
    ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(0,0,30,0,7); ctx.fill(); ctx.restore();
  } else {
    ctx.fillStyle="rgba(90,50,20,.20)";
    ctx.beginPath(); ctx.ellipse(0,4,26,9,0,0,7); ctx.fill();
  }

  // legs
  ctx.fillStyle = pants;
  roundRect(-15 + swing*0.4, -34, 13, 36, 6, true, false);
  roundRect(  3 - swing*0.4, -34, 13, 36, 6, true, false);
  ctx.fillStyle = isC ? "#ffffff" : "#2d3748";
  roundRect(-17 + swing*0.4, 0, 17, 9, 4, true, false);
  roundRect(  2 - swing*0.4, 0, 17, 9, 4, true, false);

  ctx.save();
  ctx.scale(squish, 1);   // horizontal squash sells the spin

  // body
  ctx.fillStyle = top;
  roundRect(-24, -86+bob, 48, 56, 14, true, false);
  ctx.fillStyle = topD;
  roundRect(-24, -40+bob, 48, 10, 6, true, false);
  if(isC){ // little skirt hem
    ctx.fillStyle="#ff8fa3"; roundRect(-26,-44+bob,52,10,5,true,false);
  }

  // arms
  ctx.fillStyle = top;
  const armY = -80+bob;
  if(o.scrub){
    roundRect(-34, armY, 13, 34, 6, true, false);
    roundRect( 21, armY, 13, 34, 6, true, false);
    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.arc(-27, armY+36+Math.sin(p.walk*6)*3, 7,0,7); ctx.fill();
    ctx.beginPath(); ctx.arc( 27, armY+36-Math.sin(p.walk*6)*3, 7,0,7); ctx.fill();
  } else {
    ctx.save(); ctx.translate(-27, armY+4); ctx.rotate(swing*0.02);
    roundRect(-6,0,13,32,6,true,false);
    ctx.fillStyle=skin; ctx.beginPath(); ctx.arc(0,34,7,0,7); ctx.fill(); ctx.restore();
    ctx.fillStyle = top;
    ctx.save(); ctx.translate(27, armY+4); ctx.rotate(-swing*0.02);
    roundRect(-6,0,13,32,6,true,false);
    ctx.fillStyle=skin; ctx.beginPath(); ctx.arc(0,34,7,0,7); ctx.fill(); ctx.restore();
  }

  // form shading: light from the window above, shadow gathering low
  if(FANCY){
    const bg = ctx.createLinearGradient(0,-92+bob,0,-28+bob);
    bg.addColorStop(0,"rgba(255,245,220,.30)");
    bg.addColorStop(0.42,"rgba(255,255,255,0)");
    bg.addColorStop(1,"rgba(60,30,15,.22)");
    ctx.fillStyle=bg; roundRect(-24,-86+bob,48,56,14,true,false);
    // rim light down the window side
    ctx.strokeStyle="rgba(255,250,225,.55)"; ctx.lineWidth=2.5;
    ctx.beginPath();
    ctx.moveTo(-22,-78+bob); ctx.quadraticCurveTo(-25,-56+bob,-22,-34+bob); ctx.stroke();
    // a couple of cloth folds
    ctx.strokeStyle="rgba(0,0,0,.10)"; ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(-10,-44+bob); ctx.quadraticCurveTo(0,-38+bob,10,-44+bob);
    ctx.moveTo(-13,-56+bob); ctx.quadraticCurveTo(-4,-51+bob,4,-56+bob); ctx.stroke();
  }

  // apron — worn by whoever's on dish duty (whipped off to deliver a twang)
  if(o.apron && !p.apronOff){
    const ap = "#fff6ea", trim = "#ff8fa3";
    if(front){
      ctx.fillStyle=ap;
      roundRect(-16,-78+bob,32,26,6,true,false);        // bib
      roundRect(-22,-54+bob,44,30,6,true,false);        // skirt
      ctx.strokeStyle=trim; ctx.lineWidth=3;            // neck strap
      ctx.beginPath(); ctx.moveTo(-14,-78+bob); ctx.lineTo(-9,-88+bob);
      ctx.moveTo(14,-78+bob); ctx.lineTo(9,-88+bob); ctx.stroke();
      ctx.fillStyle=trim; ctx.fillRect(-23,-56+bob,46,5);   // waistband
      ctx.strokeStyle="rgba(255,143,163,.5)"; ctx.lineWidth=2;   // gingham check
      for(let i=-1;i<=1;i++){ ctx.beginPath(); ctx.moveTo(i*11,-76+bob); ctx.lineTo(i*11,-26+bob); ctx.stroke(); }
      ctx.beginPath(); ctx.moveTo(-21,-66+bob); ctx.lineTo(21,-66+bob);
      ctx.moveTo(-21,-40+bob); ctx.lineTo(21,-40+bob); ctx.stroke();
      ctx.fillStyle="rgba(255,143,163,.35)"; roundRect(-11,-48+bob,22,14,4,true,false); // pocket
    } else {
      ctx.strokeStyle=trim; ctx.lineWidth=4;            // straps crossing the back
      ctx.beginPath();
      ctx.moveTo(-13,-84+bob); ctx.lineTo(9,-58+bob);
      ctx.moveTo(13,-84+bob); ctx.lineTo(-9,-58+bob); ctx.stroke();
      ctx.fillStyle=trim; ctx.fillRect(-22,-58+bob,44,6); // waist tie
      ctx.beginPath();                                   // bow
      ctx.ellipse(-8,-54+bob,8,5,0.5,0,7);
      ctx.ellipse( 8,-54+bob,8,5,-0.5,0,7); ctx.fill();
      ctx.beginPath(); ctx.arc(0,-54+bob,3.4,0,7); ctx.fill();
      ctx.strokeStyle=trim; ctx.lineWidth=3;             // dangling ends
      ctx.beginPath(); ctx.moveTo(-4,-50+bob); ctx.quadraticCurveTo(-10,-40+bob,-6,-32+bob);
      ctx.moveTo(4,-50+bob); ctx.quadraticCurveTo(10,-40+bob,7,-33+bob); ctx.stroke();
    }
  }

  // pegs clipped to the back / front of the top
  for(const pg of p.pegsOn){
    const px = front ? -pg.ox : pg.ox;
    ctx.save(); ctx.translate(px, pg.oy+bob); ctx.rotate(pg.rot);
    const s = 1 + Math.max(0, pg.pop)*0.9; ctx.scale(s,s);
    ctx.fillStyle = pg.col; roundRect(-5,-12,10,24,3,true,false);
    ctx.fillStyle = "rgba(255,255,255,.55)"; roundRect(-3,-10,3,20,2,true,false);
    ctx.fillStyle = "rgba(0,0,0,.22)"; ctx.fillRect(-5,-2,10,3);
    ctx.restore();
  }

  // head
  const hy = -104+bob;
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.ellipse(0, hy, 21, 23, 0, 0, 7); ctx.fill();
  ctx.fillStyle = skinD;
  ctx.beginPath(); ctx.ellipse(0, hy+20, 8, 5, 0, 0, 7); ctx.fill(); // neck shade

  if(front){
    // ears
    ctx.fillStyle=skin; ctx.beginPath(); ctx.arc(-21,hy+2,5,0,7); ctx.arc(21,hy+2,5,0,7); ctx.fill();
    // eyes — squeezed shut when he's cracking up, and they blink now and then
    const blinkPh = (T*0.55 + (isC?0:1.7)) % 1;
    const blinking = blinkPh > 0.965;
    if(blinking && lg <= 0.3){
      ctx.strokeStyle = isC ? "#c9a227" : "#3b2417"; ctx.lineWidth=2.6; ctx.lineCap="round";
      ctx.beginPath();
      ctx.moveTo(-13,hy-2); ctx.lineTo(-3,hy-2);
      ctx.moveTo(3,hy-2); ctx.lineTo(13,hy-2); ctx.stroke();
    } else if(lg > 0.3){
      ctx.strokeStyle = isC ? "#2f80ed" : "#3b2417"; ctx.lineWidth=2.8; ctx.lineCap="round";
      ctx.beginPath();
      ctx.arc(-8, hy+2, 6, Math.PI*1.15, Math.PI*1.85);
      ctx.arc( 8, hy+2, 6, Math.PI*1.15, Math.PI*1.85);
      ctx.stroke();
    } else {
      ctx.fillStyle="#fff";
      ctx.beginPath(); ctx.ellipse(-8,hy-2,6,7,0,0,7); ctx.ellipse(8,hy-2,6,7,0,0,7); ctx.fill();
      ctx.fillStyle = isC ? "#2f80ed" : "#3b2417";
      const ex = (o.scan||0)*3;
      ctx.beginPath(); ctx.arc(-8+ex,hy-1,3.4,0,7); ctx.arc(8+ex,hy-1,3.4,0,7); ctx.fill();
      ctx.fillStyle="#fff";
      ctx.beginPath(); ctx.arc(-9.4+ex,hy-2.6,1.3,0,7); ctx.arc(6.6+ex,hy-2.6,1.3,0,7); ctx.fill();
    }
    // brows
    ctx.strokeStyle = isC ? "#e0ac33" : "#1b0f09"; ctx.lineWidth=2.6; ctx.lineCap="round";
    // pulled in at the outer ends, to leave bare skin between brow and hair
    ctx.beginPath(); ctx.moveTo(-9.5,hy-11); ctx.lineTo(-2.5,hy-12.5);
    ctx.moveTo(2.5,hy-12.5); ctx.lineTo(9.5,hy-11); ctx.stroke();
    // blush
    ctx.fillStyle="rgba(255,120,120,.35)";
    ctx.beginPath(); ctx.ellipse(-14,hy+7,5,3.4,0,0,7); ctx.ellipse(14,hy+7,5,3.4,0,0,7); ctx.fill();

    if(isC){
      ctx.strokeStyle="#8a4b3a"; ctx.lineWidth=2.4;
      ctx.beginPath();
      if(p.squeal>0){ ctx.arc(0,hy+9,6,0,Math.PI*2); ctx.fillStyle="#c0483f"; ctx.fill(); }
      else ctx.arc(0,hy+6,7,0.15*Math.PI,0.85*Math.PI);
      ctx.stroke();
    } else {
      // goatee: a neat patch on the chin only, so the cheeks and jaw stay bare
      ctx.fillStyle=beard;
      ctx.beginPath(); ctx.ellipse(0,hy+18,7.5,6.5,0,0,7); ctx.fill();
      // great big smile — wide open when he's laughing his head off
      const mo = 1 + lg*(1.1 + Math.sin(T*17)*0.25);
      ctx.fillStyle="#4a2b16";
      ctx.beginPath(); ctx.ellipse(0,hy+9,10,6*mo,0,0.05*Math.PI,0.95*Math.PI); ctx.fill();
      if(lg > 0.3){
        ctx.fillStyle="#e0798a";     // tongue
        ctx.beginPath(); ctx.ellipse(0,hy+9+5*mo,5,3.4,0,0,Math.PI); ctx.fill();
      }
      ctx.fillStyle="#fff";
      ctx.beginPath(); ctx.ellipse(0,hy+9,9,4*mo,0,0.05*Math.PI,0.95*Math.PI); ctx.fill();
      ctx.fillStyle=beard;  // moustache, sitting just above the smile
      ctx.beginPath(); ctx.ellipse(-5,hy+4,7,3.4,0.30,0,7); ctx.ellipse(5,hy+4,7,3.4,-0.30,0,7); ctx.fill();
      // glasses — pale lens fill first so the dark frame really pops. Kept a
      // touch smaller than the eyes need, to leave bare skin up to the hairline.
      ctx.fillStyle="rgba(225,245,255,.55)";
      ctx.beginPath(); ctx.arc(-8,hy-2,7.4,0,7); ctx.fill();
      ctx.beginPath(); ctx.arc( 8,hy-2,7.4,0,7); ctx.fill();
      ctx.strokeStyle="#14181f"; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(-8,hy-2,7.4,0,7); ctx.stroke();
      ctx.beginPath(); ctx.arc( 8,hy-2,7.4,0,7); ctx.stroke();
      ctx.lineWidth=2.7; ctx.beginPath();
      ctx.moveTo(-0.6,hy-3); ctx.lineTo(0.6,hy-3);
      ctx.moveTo(-15.4,hy-3); ctx.lineTo(-20.5,hy-5); ctx.moveTo(15.4,hy-3); ctx.lineTo(20.5,hy-5); ctx.stroke();
      ctx.fillStyle="rgba(255,255,255,.28)";
      ctx.beginPath(); ctx.arc(-10,hy-5,3,0,7); ctx.arc(6,hy-5,3,0,7); ctx.fill();
    }
  }

  // hair (drawn for both views)
  ctx.fillStyle = hair;
  if(isC){
    ctx.beginPath(); ctx.ellipse(0,hy-6,23,20,0,Math.PI,0); ctx.fill();
    if(front){
      ctx.beginPath(); ctx.moveTo(-23,hy-6); ctx.quadraticCurveTo(-27,hy+16,-19,hy+22);
      ctx.quadraticCurveTo(-24,hy+2,-20,hy-8); ctx.fill();
      ctx.beginPath(); ctx.moveTo(23,hy-6); ctx.quadraticCurveTo(27,hy+16,19,hy+22);
      ctx.quadraticCurveTo(24,hy+2,20,hy-8); ctx.fill();
      ctx.beginPath(); ctx.ellipse(-6,hy-14,15,8,-0.25,Math.PI,0); ctx.fill();
    } else {
      ctx.beginPath(); ctx.ellipse(0,hy+2,23,26,0,0,7); ctx.fill();       // long blonde back
      ctx.fillStyle="#ffe28a";
      ctx.beginPath(); ctx.ellipse(-7,hy-2,7,16,0.15,0,7); ctx.fill();
    }
    // bow
    ctx.fillStyle="#ff5d8f";
    ctx.beginPath(); ctx.ellipse(16,hy-17,7,5,0.5,0,7); ctx.ellipse(25,hy-14,7,5,-0.4,0,7); ctx.fill();
    ctx.fillStyle="#ffd1e0"; ctx.beginPath(); ctx.arc(20.5,hy-15.5,2.6,0,7); ctx.fill();
  } else {
    // ONE piece, not a cap plus two blobs: over the top of the skull, then back
    // along a hairline that sits low at the temples and rises across the
    // forehead. Separate tufts at the sides read as scrolls stuck on his head,
    // and a plain half-ellipse gives a dead-flat fringe, i.e. a bowl cut.
    ctx.beginPath();
    ctx.moveTo(-20.5, hy-8);
    ctx.bezierCurveTo(-23, hy-26, 23, hy-26, 20.5, hy-8);   // over the skull
    ctx.quadraticCurveTo( 12, hy-16.5,  0, hy-17);          // hairline, right half
    ctx.quadraticCurveTo(-12, hy-16.5, -20.5, hy-8);        // …and the left
    ctx.closePath(); ctx.fill();
    if(!front){ ctx.beginPath(); ctx.ellipse(0,hy-4,22,19,0,0,7); ctx.fill(); }
  }
  ctx.restore(); // squish

  // little "!" when he's about to turn
  if(o.warn){
    ctx.save(); ctx.translate(26, -136+bob);
    ctx.fillStyle="#fff"; ctx.strokeStyle="#ff8b3d"; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(0,0,15,0,7); ctx.fill(); ctx.stroke();
    ctx.fillStyle="#ff6b35"; ctx.font="bold 22px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("?",0,1); ctx.restore();
  }
  if(o.eyeing && !PORTRAIT){     // on a phone this is a full-width strip instead
    ctx.save(); ctx.translate(0,-150+bob);
    ctx.fillStyle="rgba(255,90,90,.9)"; ctx.font="bold 17px Arial"; ctx.textAlign="center";
    ctx.fillText("👀 LOOKING!",0,0); ctx.restore();
  }
  if(lg > 0.25){                       // HA HA HA!
    ctx.save();
    ctx.textAlign="center"; ctx.textBaseline="middle";
    for(let i=0;i<3;i++){
      const ph = (T*2.2 + i*0.42) % 1;
      ctx.globalAlpha = Math.min(1, lg) * (1-ph) * 0.95;
      const s2 = 0.7 + ph*0.7;
      ctx.save();
      ctx.translate(34 + i*13, -118 - ph*46 + bob);
      ctx.rotate(Math.sin(T*4+i)*0.3); ctx.scale(s2,s2);
      ctx.fillStyle="#fff"; ctx.strokeStyle="#ffb703"; ctx.lineWidth=3;
      roundRect(-25,-15,50,28,10,true,true);
      ctx.fillStyle="#e07a1f"; ctx.font="bold 17px Comic Sans MS, Arial";
      ctx.fillText(i%2 ? "ha!" : "HA!", 0, 0);
      ctx.restore();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }
  if(p.squeal>0){
    const s = Math.min(1, p.squeal*1.6) * (PORTRAIT ? 1.45 : 1);
    ctx.save(); ctx.translate(38,-128+bob); ctx.scale(s,s);
    ctx.fillStyle="#fff"; ctx.strokeStyle="#e63946"; ctx.lineWidth=3;
    roundRect(-34,-24,68,40,12,true,true);
    ctx.beginPath(); ctx.moveTo(-16,14); ctx.lineTo(-26,28); ctx.lineTo(-4,16); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle="#e63946"; ctx.font="bold 24px Comic Sans MS, Arial"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText("ow!",0,-3);
    ctx.restore();
    // motion squiggles
    ctx.strokeStyle="rgba(230,57,70,.8)"; ctx.lineWidth=3; ctx.lineCap="round";
    for(let i=0;i<3;i++){
      const a=-0.6+i*0.6, r=34+Math.sin(p.squeal*22)*4;
      ctx.beginPath(); ctx.moveTo(Math.cos(a)*r*-1-10,-52); ctx.lineTo(Math.cos(a)*r*-1-22,-58-i*6); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(Math.cos(a)*r+10,-52); ctx.lineTo(Math.cos(a)*r+22,-58-i*6); ctx.stroke();
    }
  }
  ctx.restore();
}

/* ----- hud ----- */
function drawHUD(){
  ctx.save();
  if(PORTRAIT){
    // --- phone: its own band at the top, two rows, nothing overlapping ---
    ctx.fillStyle="rgba(255,255,255,.94)";
    ctx.fillRect(0, 0, W, HUD_H);
    ctx.fillStyle="rgba(0,0,0,.07)"; ctx.fillRect(0, HUD_H-2, W, 2);

    const top = SAFE_TOP + 6*SC;
    // row 1: round + rounds won, with the pause button on the right
    const b = pauseBtn();
    ctx.textAlign="left"; ctx.textBaseline="middle";
    ctx.fillStyle= sneaker===cushla ? "#e63946" : "#2fa8a0"; ctx.font=fnt(13, true);
    ctx.fillText(sneaker===cushla ? "▶ you're sneaking" : "▶ you're on the dishes", 12*SC, top + 13*SC);
    ctx.textAlign="right"; ctx.fillStyle="#8a5a2a";
    ctx.fillText("peg " + Math.min(turnPegs+1, PER_TURN) + " of " + PER_TURN, b.x - b.r - 10*SC, top + 13*SC);

    // row 2: the two scoreboards side by side
    const gap = 8*SC, cw = (W - 20*SC - gap)/2, ry = top + 28*SC;
    ctx.fillStyle="rgba(230,57,70,.10)";  roundRect(10*SC, ry, cw, 50*SC, 12*SC, true, false);
    ctx.fillStyle="rgba(47,168,160,.10)"; roundRect(10*SC+cw+gap, ry, cw, 50*SC, 12*SC, true, false);
    drawScore(10*SC,          ry, cw, "Cushla", "#e63946", shonty.pegsOn.length, sneaker===cushla, dotPop.cushla);
    drawScore(10*SC+cw+gap,   ry, cw, "Shonty", "#2fa8a0", cushla.pegsOn.length, sneaker===shonty, dotPop.shonty);
  } else {
    const pad = 18, bw = Math.min(300, (W - pad*2 - 76) / 2);
    ctx.fillStyle="rgba(255,255,255,.9)"; roundRect(pad,12,bw,54,16,true,false);
    ctx.fillStyle="rgba(255,255,255,.9)"; roundRect(W-pad-bw,12,bw,54,16,true,false);
    drawScore(pad,        12, bw, "Cushla", "#e63946", shonty.pegsOn.length, sneaker===cushla, dotPop.cushla);
    drawScore(W-pad-bw,   12, bw, "Shonty", "#2fa8a0", cushla.pegsOn.length, sneaker===shonty, dotPop.shonty);
    ctx.textAlign="center"; ctx.textBaseline="top";
    ctx.fillStyle="rgba(255,255,255,.85)";
    roundRect(W/2-110, 12, 220, 26, 13, true, false);
    ctx.fillStyle="#8a5a2a"; ctx.font="bold 14px Comic Sans MS, Arial";
    ctx.fillText((sneaker===cushla ? "You're sneaking" : "You're on the dishes")
               + "  •  peg " + Math.min(turnPegs+1, PER_TURN) + " of " + PER_TURN, W/2, 17);
  }
  // pause button (both layouts)
  const b = pauseBtn();
  ctx.fillStyle="rgba(255,255,255,.95)"; ctx.strokeStyle="rgba(0,0,0,.10)"; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,7); ctx.fill(); ctx.stroke();
  ctx.fillStyle="#4d96ff";
  if(paused){ ctx.beginPath(); ctx.moveTo(b.x-b.r*0.3,b.y-b.r*0.42); ctx.lineTo(b.x+b.r*0.46,b.y); ctx.lineTo(b.x-b.r*0.3,b.y+b.r*0.42); ctx.closePath(); ctx.fill(); }
  else { ctx.fillRect(b.x-b.r*0.36,b.y-b.r*0.44,b.r*0.26,b.r*0.88); ctx.fillRect(b.x+b.r*0.10,b.y-b.r*0.44,b.r*0.26,b.r*0.88); }
  ctx.restore();
}
/* Drawn after the HUD and outside the shake, so a peg lands exactly in its slot */
function drawFlyers(){
  for(const f of flyers){
    const p = Math.min(1, f.t/f.dur);
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.rotate(p*7 + (f.last?p*5:0));
    const s = 1 + (1-p)*0.5;
    ctx.scale(s, s);
    ctx.fillStyle=f.col; roundRect(-5,-13,10,26,3,true,false);
    ctx.fillStyle="rgba(255,255,255,.55)"; roundRect(-3,-11,3,22,2,true,false);
    ctx.fillStyle="rgba(0,0,0,.22)"; ctx.fillRect(-5,-2,10,3);
    ctx.restore();
  }
}

function drawScore(x,y,bw,name,col,n,active,pop){
  ctx.save();
  ctx.textAlign="left"; ctx.textBaseline="middle";
  const px = x + (PORTRAIT ? 10*SC : 12);
  ctx.fillStyle=col; ctx.font = PORTRAIT ? fnt(15, true) : "bold 20px Comic Sans MS, Arial";
  ctx.fillText(name, px, y + (PORTRAIT ? 16*SC : 24));
  if(active){
    ctx.font = PORTRAIT ? fnt(10, true) : "bold 12px Arial";
    ctx.fillText("▶ sneaking", px, y + (PORTRAIT ? 39*SC : 44));
  }
  // peg dots, right-aligned inside the card so long names never collide
  const dr = PORTRAIT ? 7*SC : 10, gap = PORTRAIT ? 18*SC : 30;
  const x1 = x + bw - (PORTRAIT ? 10*SC : 12) - dr;
  for(let i=0;i<TARGET;i++){
    const cx = x1 - (TARGET-1-i)*gap, cy = y + (PORTRAIT ? 26*SC : 26);
    // the one that just landed gives a little bounce
    const r = dr * (i===n-1 ? 1 + (pop||0)*0.65 : 1);
    ctx.beginPath(); ctx.arc(cx,cy,r,0,7);
    ctx.fillStyle = i<n ? col : "rgba(0,0,0,.12)"; ctx.fill();
    if(i<n){ ctx.fillStyle="rgba(255,255,255,.65)"; ctx.beginPath(); ctx.arc(cx-r*0.3,cy-r*0.3,r*0.3,0,7); ctx.fill(); }
  }
  ctx.restore();
}

/* `icon` is optional: {w, draw(x,y)} — drawn to the right of the title, with
   the two centred together as one unit rather than the title alone. */
function banner(title, subtitle, col, icon){
  ctx.save();
  ctx.fillStyle="rgba(0,0,0,.28)"; ctx.fillRect(0,0,W,H);
  const bw = Math.min(640, W-28);
  const tFont = PORTRAIT ? fnt(23, true) : "bold 40px Comic Sans MS, Arial";
  const sFont = PORTRAIT ? fnt(14)       : "18px Comic Sans MS, Arial";
  const tLh = PORTRAIT ? 30*TS/1.34 : 42, sLh = PORTRAIT ? 24*TS/1.34 : 25;
  const padT = PORTRAIT ? 30*TS/1.34 : 34, gap = PORTRAIT ? 16*TS/1.34 : 18;
  const padB = PORTRAIT ? 58*TS/1.34 : 60;      // room for the "carry on" line
  // The box is laid out from what's actually in it. The subtitle used to start
  // at a FIXED height, so any title long enough to wrap onto a second line was
  // drawn straight over the top of it.
  ctx.font = tFont; const tl = wrapLines(title, bw-40);
  ctx.font = sFont; const sl = wrapLines(subtitle, bw-44);
  const bh = Math.round(padT + tl.length*tLh + gap + sl.length*sLh + padB);
  const bx = (W-bw)/2, by = Math.max(8, (H-bh)/2 - 10);

  ctx.fillStyle="#fff"; ctx.strokeStyle=col; ctx.lineWidth=7;
  roundRect(bx,by,bw,bh,26,true,true);
  ctx.textAlign="center"; ctx.textBaseline="middle";

  ctx.font = tFont; ctx.fillStyle = col;
  let tx = W/2;
  if(icon && tl.length === 1){          // only pair the cat with a one-line title
    const tw = ctx.measureText(tl[0]).width, g = PORTRAIT ? 9*TS/1.34 : 14;
    tx = W/2 - (g + icon.w)/2;
    icon.draw(tx + tw/2 + g + icon.w/2, by + padT + tLh*0.5);
    ctx.fillStyle = col;                // the icon changed the fill
  }
  tl.forEach((l,i)=> ctx.fillText(l, tx, by + padT + tLh*(i+0.5)));

  ctx.font = sFont; ctx.fillStyle = "#7a5a3a";
  const sTop = by + padT + tl.length*tLh + gap;
  sl.forEach((l,i)=> ctx.fillText(l, W/2, sTop + sLh*(i+0.5)));

  // every popup waits for you — say so, and make it obvious when it's ready
  if(canAdvance()){
    ctx.fillStyle = (Math.sin(T*5)>0) ? col : "#ff8b3d";
    ctx.font = PORTRAIT ? fnt(15, true) : "bold 21px Comic Sans MS, Arial";
    ctx.fillText(TOUCH ? "tap to carry on ▸" : "press ENTER to carry on ▸",
                 W/2, by + bh - padB*0.44);
  }
  ctx.textBaseline="alphabetic";
  ctx.restore();
}
/* Split text the same way it will be drawn, so a caller can lay out from the
   real line count rather than assuming one. Uses the CURRENT ctx.font. */
function wrapLines(text, maxW){
  const words = String(text).split(" ");
  const lines = []; let line = "";
  for(const w of words){
    const test = line + w + " ";
    if(ctx.measureText(test).width > maxW && line){ lines.push(line.trim()); line = w + " "; }
    else line = test;
  }
  lines.push(line.trim());
  return lines;
}
function roundRect(x,y,w,h,r,fill,stroke){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
  if(fill) ctx.fill(); if(stroke) ctx.stroke();
}

/* ---------- particles ---------- */
function updateFx(dt){
  if(laU > 0) laU -= dt;
  if(immT > 0) immT -= dt;
  if(phewT > 0) phewT -= dt;
  dotPop.cushla = Math.max(0, dotPop.cushla - dt*3);
  dotPop.shonty = Math.max(0, dotPop.shonty - dt*3);
  for(let i=flyers.length-1; i>=0; i--){
    const f = flyers[i];
    f.t += dt;
    const p = Math.min(1, f.t/f.dur), e = p*p*(3-2*p);
    f.x = f.x0 + (f.tx-f.x0)*e;
    f.y = f.y0 + (f.ty-f.y0)*e - Math.sin(p*Math.PI)*70*SC;   // lobbed, not dragged
    if(p >= 1){
      dotPop[f.who] = 1; S.tick();
      flyers.splice(i,1);
    }
  }
  notes = notes.filter(n => (n.life -= dt) > 0);
  notes.forEach(n => { n.y += n.vy*dt; });
  if(flowerGiven && rainbow < 1) rainbow = Math.min(1, rainbow + dt*0.5);
  bubbles = bubbles.filter(b=>(b.life-=dt)>0);
  bubbles.forEach(b=>{ b.y+=b.vy*dt; b.x+=b.vx*dt; });
  sparks = sparks.filter(s=>(s.life-=dt)>0);
  sparks.forEach(s=>{ s.x+=s.vx*dt; s.y+=s.vy*dt; s.vy+=520*dt; });
  hearts = hearts.filter(h=>(h.life-=dt)>0);
  hearts.forEach(h=>{ h.y+=h.vy*dt; });
  confetti.forEach(c=>{ c.y+=c.vy*dt; c.x+=c.vx*dt; c.rot+=c.vr*dt; if(c.y>H+20){ c.y=-20; } });
  if(shake>0) shake-=dt; if(flash>0) flash-=dt; if(snapFx>0) snapFx-=dt*0.62;
  if(tapPeg>0) tapPeg-=dt;
  // the whipped-off apron, tumbling to the floor
  if(apronFall && !apronFall.landed){
    const a = apronFall;
    a.x += a.vx*dt; a.y += a.vy*dt; a.vy += 700*dt; a.rot += a.vr*dt;
    if(a.y >= a.ground){ a.y = a.ground; a.landed = true; a.rot = 0.3; }
  }
  // pegs that pinged off, tumbling to the floor
  for(let i=fallers.length-1;i>=0;i--){
    const f = fallers[i];
    f.x += f.vx*dt; f.y += f.vy*dt; f.vy += 900*dt; f.rot += f.vr*dt;
    if(f.y >= f.ground){
      floorPegs.push({x:f.x, y:f.ground, rot:Math.PI/2 + (Math.random()-.5)*0.7, col:f.col});
      fallers.splice(i,1);
    }
  }
  [cushla,shonty].forEach(p=>{
    if(p.squeal>0) p.squeal-=dt;
    if(p.hop>0) p.hop-=dt*1.6;
    p.pegsOn.forEach(pg=>{ if(pg.pop<1) pg.pop = Math.min(1, pg.pop+dt*4); });
  });
}
function drawPeg(x,y,rot,col,scale){
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot); if(scale) ctx.scale(scale,scale);
  ctx.fillStyle=col; roundRect(-5,-12,10,24,3,true,false);
  ctx.fillStyle="rgba(255,255,255,.55)"; roundRect(-3,-10,3,20,2,true,false);
  ctx.fillStyle="rgba(0,0,0,.22)"; ctx.fillRect(-5,-2,10,3);
  ctx.restore();
}
function drawApronFall(){
  if(!apronFall) return;
  const a = apronFall;
  ctx.save(); ctx.translate(a.x, a.y); ctx.rotate(a.rot);
  if(a.landed) ctx.scale(1, 0.5);              // flops flat on the floor
  ctx.fillStyle="#fff6ea";
  roundRect(-16,-14,32,24,6,true,false);
  roundRect(-22,8,44,26,6,true,false);
  ctx.fillStyle="#ff8fa3"; ctx.fillRect(-23,6,46,5);
  ctx.strokeStyle="#ff8fa3"; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(-13,-14); ctx.lineTo(-8,-24);
  ctx.moveTo(13,-14); ctx.lineTo(8,-24); ctx.stroke();
  ctx.fillStyle="rgba(255,143,163,.35)"; roundRect(-10,16,20,12,4,true,false);
  ctx.restore();
}
/* Lights out, ball down, and the room going off for five seconds. Drawn over
   the whole scene, so everyone in the kitchen dims together. */
function drawDisco(){
  if(discoT <= 0) return;
  // ramp up fast, drop back gently at the end
  const a = Math.min(1, (DISCO_TIME-discoT)/0.35, discoT/0.7);
  const bx = W/2, by = (FLOOR_TOP-58)*0.30 + 26*SC*a;
  ctx.save();
  ctx.fillStyle = "rgba(8,5,24," + (0.60*a) + ")";        // the lights go out
  ctx.fillRect(0, 0, W, H);

  ctx.globalCompositeOperation = "lighter";               // beams sweeping round
  const cols = ["#ff3d7f","#3ddcff","#ffe23d","#7dff5c","#c77dff","#ff9f45"];
  const len = Math.max(W, H)*1.25;
  for(let i=0;i<8;i++){
    const ang = T*0.85 + i*Math.PI/4;
    ctx.globalAlpha = 0.13*a;
    ctx.fillStyle = cols[i % cols.length];
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.lineTo(bx+Math.cos(ang)*len,      by+Math.sin(ang)*len);
    ctx.lineTo(bx+Math.cos(ang+0.17)*len, by+Math.sin(ang+0.17)*len);
    ctx.closePath(); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = "source-over";

  const r = 21*SC;
  ctx.strokeStyle = "rgba(255,255,255,.35)"; ctx.lineWidth = 2;   // its cable
  ctx.beginPath(); ctx.moveTo(bx, 0); ctx.lineTo(bx, by-r); ctx.stroke();
  ctx.save();                                                    // mirrored facets
  ctx.beginPath(); ctx.arc(bx, by, r, 0, 7); ctx.clip();
  const tile = r/3.1;
  for(let gx=-4; gx<=4; gx++) for(let gy=-4; gy<=4; gy++){
    const s = 0.4 + 0.6*Math.abs(Math.sin(T*2.4 + gx*0.9 + gy*0.55));
    ctx.fillStyle = "rgb(" + (150+95*s|0) + "," + (175+75*s|0) + "," + (215+40*s|0) + ")";
    ctx.fillRect(bx+gx*tile-tile*0.45, by+gy*tile-tile*0.45, tile*0.9, tile*0.9);
  }
  ctx.restore();
  ctx.strokeStyle = "rgba(255,255,255,.55)"; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(bx, by, r, 0, 7); ctx.stroke();
  ctx.restore();
}

function drawFx(){
  drawApronFall();
  floorPegs.forEach(p=>{
    ctx.fillStyle="rgba(120,70,30,.16)";
    ctx.beginPath(); ctx.ellipse(p.x,p.y+3,13,4,0,0,7); ctx.fill();
    drawPeg(p.x,p.y,p.rot,p.col,0.9);
  });
  fallers.forEach(f=> drawPeg(f.x,f.y,f.rot,f.col,1));
  bubbles.forEach(b=>{ ctx.fillStyle="rgba(255,255,255,.75)"; ctx.strokeStyle="rgba(150,220,255,.9)"; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,7); ctx.fill(); ctx.stroke(); });
  sparks.forEach(s=>{ ctx.fillStyle=s.col; ctx.globalAlpha=Math.min(1,s.life*1.6);
    ctx.fillRect(s.x,s.y,5,5); ctx.globalAlpha=1; });
  hearts.forEach(h=>{ ctx.globalAlpha=Math.min(1,h.life); ctx.fillStyle="#ff7aa2"; ctx.font="20px Arial";
    ctx.textAlign="center"; ctx.fillText("♥",h.x,h.y); ctx.globalAlpha=1; });
  notes.forEach(n=>{
    ctx.globalAlpha = Math.min(1, n.life)*0.95;
    ctx.font = "bold 23px Arial"; ctx.textAlign = "center";
    const g = n.ph>3 ? "♪" : "♫", nx = n.x + Math.sin(n.life*3.4+n.ph)*7;
    ctx.strokeStyle = "rgba(255,255,255,.9)"; ctx.lineWidth = 4;
    ctx.strokeText(g, nx, n.y);                       // halo, so they read anywhere
    ctx.fillStyle = "#6b5aa8"; ctx.fillText(g, nx, n.y);
    ctx.globalAlpha = 1;
  });
  confetti.forEach(c=>{ ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.rot); ctx.fillStyle=c.col;
    ctx.fillRect(-c.r/2,-c.r/2,c.r,c.r*1.6); ctx.restore(); });

  // "La u" — she says it as she hands it over
  if(laU > 0){
    const p = Math.min(1, (2.8-laU)*4), rise = (2.8-laU)*13;
    ctx.save();
    ctx.globalAlpha = Math.min(1, laU*1.6) * p;
    const bx = cushla.x, by = cushla.y - 132 - rise;
    ctx.font = fnt(19, true); ctx.textAlign="center"; ctx.textBaseline="middle";
    const w = ctx.measureText("La u").width + 30*TS, h = 34*TS;
    ctx.fillStyle="#fff"; ctx.strokeStyle="#ff8fb3"; ctx.lineWidth=3;
    roundRect(bx-w/2, by-h/2, w, h, h/2, true, true);
    ctx.beginPath();                                   // little tail on the bubble
    ctx.moveTo(bx-7, by+h/2-2); ctx.lineTo(bx+1, by+h/2+9); ctx.lineTo(bx+7, by+h/2-2);
    ctx.closePath(); ctx.fillStyle="#fff"; ctx.fill();
    ctx.fillStyle="#e0518f"; ctx.fillText("La u", bx, by+1);
    ctx.textBaseline="alphabetic";
    ctx.restore();
  }
}

/* the peg basket you reload from */
function drawPegBox(t){
  const x = PEGBOX.x, y = PEGBOX.y;
  const need = scene==="play" && !sneaker.hasPeg;
  ctx.save();
  ctx.fillStyle="rgba(120,70,30,.18)";
  ctx.beginPath(); ctx.ellipse(x,y+4,50,13,0,0,7); ctx.fill();
  if(need){                                  // glow when you need to come back
    const a = 0.25 + Math.sin(t*6)*0.18;
    ctx.fillStyle = "rgba(120,220,150,"+a+")";
    ctx.beginPath(); ctx.ellipse(x,y-8,74,40,0,0,7); ctx.fill();
  }
  // pegs poking out of the top
  for(let i=0;i<9;i++){
    const px = x-34 + i*8.5, ph = 16 + ((i*37)%11);
    ctx.save(); ctx.translate(px, y-30); ctx.rotate((i%3-1)*0.22);
    ctx.fillStyle = PEG_COLS[i % PEG_COLS.length];
    roundRect(-4,-ph,8,ph+8,3,true,false);
    ctx.fillStyle="rgba(255,255,255,.5)"; roundRect(-2.5,-ph+2,2.5,ph,1.5,true,false);
    ctx.restore();
  }
  // wicker basket
  ctx.fillStyle="#e8c07d"; roundRect(x-44,y-32,88,34,10,true,false);
  ctx.strokeStyle="#c79a54"; ctx.lineWidth=3;
  for(let i=1;i<5;i++){ ctx.beginPath(); ctx.moveTo(x-44+i*17.6,y-32); ctx.lineTo(x-44+i*17.6,y+2); ctx.stroke(); }
  ctx.beginPath(); ctx.moveTo(x-44,y-22); ctx.lineTo(x+44,y-22); ctx.stroke();
  ctx.fillStyle="#b98741"; roundRect(x-46,y-34,92,8,4,true,false);
  ctx.restore();
}

/* big, unmissable state banner across the top of the room (phones) */
function drawStatusStrip(){
  if(!PORTRAIT || scene!=="play") return;
  let text, col;
  if(humanWatch()){
    // your turn on the dishes
    if(isWatching()){ text = "👀  LOOKING — catch him moving!"; col = "#e63946"; }
    else if(peekE < PEEK_MIN){ text = "🫧  keep washing… get your breath back"; col = "#4d96ff"; }
    else { text = TOUCH ? "🫧  washing up — HOLD to spin round" : "🫧  washing up — HOLD SPACE to spin round"; col = "#2fa8a0"; }
  } else {
    if(isWatching()){ text = "👀  HE'S LOOKING — FREEZE!"; col = "#e63946"; }
    else if(LOOK.warn || LOOK.mode==="turnF"){ text = "❓  he's about to turn…"; col = "#ff8b3d"; }
    else if(!sneaker.hasPeg){ text = "🧺  out of pegs — back to the basket"; col = "#c9772a"; }
    else return;
  }
  const h = 34*SC, y = HUD_H + 6*SC;
  ctx.save();
  ctx.globalAlpha = 0.94;
  ctx.fillStyle = col; roundRect(8*SC, y, W-16*SC, h, 12*SC, true, false);
  ctx.globalAlpha = 1;
  ctx.fillStyle="#fff";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  // shrink to fit rather than run off the edge of a narrow phone
  let fs = 14;
  ctx.font = fnt(fs, true);
  while(ctx.measureText(text).width > W - 34*SC && fs > 9){
    fs -= 0.5; ctx.font = fnt(fs, true);
  }
  ctx.fillText(text, W/2, y + h/2 + 1);
  ctx.restore();
}

/* She's just lifted the flower. Say what it does — it doesn't block play or
   stop the clock, it just fades away after a couple of seconds. */
function drawImmunity(){
  if(immT <= 0 || scene!=="play") return;
  const a = Math.min(1, immT*2.2) * Math.min(1, (2.8-immT)*5);
  const bw = Math.min(400, W-32), bh = PORTRAIT ? 64*TS/1.34 : 74;
  const bx = W/2 - bw/2, by = PORTRAIT ? HUD_H + 46*SC : 74;
  ctx.save();
  ctx.globalAlpha = a;
  ctx.fillStyle="#fff"; ctx.strokeStyle="#e0518f"; ctx.lineWidth=5;
  roundRect(bx, by, bw, bh, 18, true, true);
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillStyle="#e0518f"; ctx.font = PORTRAIT ? fnt(20, true) : "bold 27px Comic Sans MS, Arial";
  ctx.fillText("Immunity!", W/2, by + bh*0.34);
  ctx.fillStyle="#7a5a3a";
  const sub2 = "he can't catch you — take the flower to Shonty";
  let fs2 = PORTRAIT ? 12 : 16;                       // shrink rather than overflow
  const setF = () => ctx.font = PORTRAIT ? fnt(fs2) : Math.round(fs2)+"px Comic Sans MS, Arial";
  setF();
  while(ctx.measureText(sub2).width > bw - 24 && fs2 > 8){ fs2 -= 0.5; setF(); }
  ctx.fillText(sub2, W/2, by + bh*0.72);
  ctx.textBaseline="alphabetic";
  ctx.restore();
}

/* the peek meter — how long you can keep watching before you must wash */
function drawPeekMeter(){
  if(scene!=="play" || !humanWatch()) return;
  const w = Math.min(250, W*0.60), h = 15*SC;
  const x = W/2 - w/2, y = washer.y + 46*SC;
  const lo = peekE < PEEK_MIN;
  const col = lo ? "#ff8b3d" : (isWatching() ? "#e63946" : "#2fa8a0");
  const label = lo ? "catching your breath…" : "how long you can look";
  ctx.save();
  ctx.textAlign="center"; ctx.textBaseline="middle";
  // label sits ABOVE the bar on its own white pill, so it's never washed out
  // by whatever colour the bar happens to be underneath it
  ctx.font = fnt(12, true);
  const tw = ctx.measureText(label).width + 18*TS, th = 19*TS;
  ctx.fillStyle = "rgba(255,255,255,.92)";
  roundRect(W/2-tw/2, y-th-5*SC, tw, th, th/2, true, false);
  ctx.fillStyle = col;
  ctx.fillText(label, W/2, y-th/2-5*SC+1);
  // the bar itself
  ctx.fillStyle="rgba(255,255,255,.92)"; roundRect(x-3,y-3,w+6,h+6,(h+6)/2,true,false);
  ctx.fillStyle="rgba(0,0,0,.13)"; roundRect(x,y,w,h,h/2,true,false);
  if(peekE > 0.02){
    ctx.fillStyle = col;
    roundRect(x,y,Math.max(h,w*peekE),h,h/2,true,false);
    ctx.fillStyle="rgba(255,255,255,.30)";     // a little gloss
    roundRect(x+2,y+2,Math.max(h-4,w*peekE-4),h*0.38,h*0.19,true,false);
  }
  ctx.restore();
}

function drawStick(){
  if(!stick.on) return;
  ctx.save();
  ctx.strokeStyle="rgba(255,255,255,.75)"; ctx.lineWidth=4;
  ctx.fillStyle="rgba(120,80,160,.16)";
  ctx.beginPath(); ctx.arc(stick.ox, stick.oy, STICK_MAX, 0, 7); ctx.fill(); ctx.stroke();
  const kx = stick.ox + stick.dx*stick.mag*STICK_MAX;
  const ky = stick.oy + stick.dy*stick.mag*STICK_MAX;
  ctx.fillStyle = stick.mag>0 ? "rgba(255,215,80,.92)" : "rgba(255,255,255,.85)";
  ctx.strokeStyle="rgba(230,57,70,.85)"; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(kx, ky, 26, 0, 7); ctx.fill(); ctx.stroke();
  ctx.restore();
}

// shared by the pause menu and its tap targets, so they can never drift apart
const PAUSE_ROW_H = PORTRAIT ? Math.round(42*SC) : 30;
const PAUSE_TOP   = PORTRAIT ? Math.round(70*TS/1.34) : 92;
function drawPause(){
  ctx.save();
  ctx.fillStyle="rgba(30,20,50,.45)"; ctx.fillRect(0,0,W,H);
  const RH = PAUSE_ROW_H, bw=Math.min(420, W-40), bh=PAUSE_TOP+RH*6+40;
  const bx=(W-bw)/2, by=(H-bh)/2;
  ctx.fillStyle="#fff"; ctx.strokeStyle="#4d96ff"; ctx.lineWidth=7;
  roundRect(bx,by,bw,bh,26,true,true);
  ctx.textAlign="center";
  ctx.fillStyle="#4d96ff"; ctx.font = PORTRAIT ? fnt(24, true) : "bold 36px Comic Sans MS, Arial";
  ctx.fillText("⏸  Paused", W/2, by+(PORTRAIT?44:52));
  const rows = TOUCH
    ? [["▶","keep playing"],["↺","restart the match"],["✨","fancy visuals "+(FANCY?"off":"on")],["♪","music "+(MUS.on?"off":"on")],["🔈","sound "+(muted?"on":"off")],["✕","back to the title"]]
    : [["P / ESC","keep playing"],["R","restart the match"],["V","fancy visuals on / off"],["N","music on / off"],["M","mute everything"],["Q","back to the title"]];
  rows.forEach((r,i)=>{
    const y = by+PAUSE_TOP+i*RH;
    if(TOUCH){ ctx.fillStyle="rgba(77,150,255,.10)"; roundRect(bx+14,y,bw-28,RH-4,10,true,false); }
    ctx.textAlign="left"; ctx.textBaseline="middle";
    ctx.fillStyle="#e63946"; ctx.font = PORTRAIT ? fnt(15, true) : "bold 17px Comic Sans MS, Arial";
    ctx.fillText(r[0], bx+30, y+(RH-4)/2);
    ctx.fillStyle="#7a5a3a"; ctx.font = PORTRAIT ? fnt(14) : "16px Comic Sans MS, Arial";
    ctx.fillText(r[1], bx+(TOUCH?78:150), y+(RH-4)/2);
    ctx.textBaseline="alphabetic";
  });
  if(TOUCH){
    ctx.textAlign="center"; ctx.fillStyle="#a08a70";
    ctx.font = PORTRAIT ? fnt(11) : "13px Comic Sans MS, Arial";
    ctx.fillText("tap a row, or anywhere else to resume", W/2, by+bh-14);
  }
  ctx.restore();
}

function drawSnapFx(){
  if(snapFx<=0) return;
  const grow = Math.min(1, (1-snapFx)*5);
  const s = grow * (1 + Math.sin(snapFx*30)*0.05) * Math.min(1, snapFx*3.2) * (PORTRAIT?1.3:1);
  ctx.save();
  ctx.translate(sneaker.x - 60*(PORTRAIT?1.1:1), sneaker.y - 132);
  ctx.rotate(-0.22 + Math.sin(snapFx*24)*0.05);
  ctx.scale(s,s);
  ctx.fillStyle="#ffd93d"; ctx.strokeStyle="#e63946"; ctx.lineWidth=5; ctx.lineJoin="round";
  ctx.beginPath();
  for(let i=0;i<14;i++){
    const a = i/14*Math.PI*2, r = (i%2 ? 30 : 58);
    const x=Math.cos(a)*r*1.25, y=Math.sin(a)*r*0.85;
    i ? ctx.lineTo(x,y) : ctx.moveTo(x,y);
  }
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.fillStyle="#e63946"; ctx.font="bold 21px Comic Sans MS, Arial";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText("UNDIE",0,-11); ctx.fillText("SNAP!",0,12);
  ctx.restore();
}

/* ---------- title ---------- */
// [heading, line, line, …] — drawn as tidy titled blocks on a phone
const TITLE_BLOCKS = TOUCH ? [
  ["YOUR TURN — sneak up on Shonty", [
    "👆  Swipe & hold to creep, let go to freeze.",
    "✋  When he turns: be still, or hide.",
    "🎨  Tap right behind him to peg him."
  ]],
  ["HIS TURN — you're on the dishes", [
    "🫧  Hold to spin round and catch him.",
    "      You can't watch for long!"
  ]],
  ["BEANBAGS — your one-minute clock", [
    "🐈  When her tree topples, the turn's up."
  ]],
  ["", [
    "😖  Caught? SNAP — and a peg pings off.",
    "🏆  2 pegs ends a turn. First to 5 wins."
  ]]
] : null;
const TITLE_LINES = TOUCH ? [] : [
  "YOUR TURN — sneaking",
  "🧺  Creep up behind Shonty with the arrow keys, then press SPACE",
  "      right behind him to clip a peg on.",
  "👀  When he spins round: STOP MOVING, or hide behind furniture.",
  "",
  "HIS TURN — you're on the dishes",
  "🫧  HOLD SPACE to spin round and catch him moving —",
  "      but you can't watch forever.",
  "",
  "BEANBAGS — your one-minute clock",
  "🐈  When her cat tree topples onto the pegs, the turn is up.",
  "",
  "😖  Caught either way? SNAP — and a peg pings off.",
  "🏆  Two pegs ends a turn. First to " + TARGET + " pegs wins."
];
// the card is sized from its contents so it can never overflow a small screen
function titleCard(){
  const bw = Math.min(680, W-24);
  const head = PORTRAIT ? Math.round(96*TS/1.34) : 130;
  // the foot has to clear the PLAY button AND the two mascots standing below it
  const foot = PORTRAIT ? Math.round(140*TS/1.34) : 150;
  // line-heights the body needs — must match how drawTitle advances y
  const units = TITLE_BLOCKS
    ? TITLE_BLOCKS.reduce((n,[h,ls]) => n + (h ? 1.35 : 0) + ls.length + 0.5, 0)
    : TITLE_LINES.length;
  const baseLh = PORTRAIT ? Math.round(19*TS) : 27;
  // This card used to size itself to its contents and simply trust that to fit,
  // which quietly ran off the bottom of the screen as soon as the rules grew a
  // few lines. Now it squeezes text and spacing together to stay on screen.
  const avail = H - 16 - head - foot;
  const k  = Math.max(0.62, Math.min(1, avail / (units*baseLh)));
  const lh = baseLh*k, body = units*lh;
  return {bw, bh: Math.round(head + body + foot), lh, head, k,
          bx:(W-bw)/2, by: Math.max(8, (H-(head+body+foot))/2 - (PORTRAIT?10:20))};
}
// Sits BELOW the card, centred. It used to live in the card's top-right
// corner, where the centred title ran straight underneath it.
function musicBtn(){
  const c = titleCard();
  const w = PORTRAIT ? Math.round(132*SC) : 156, h = PORTRAIT ? Math.round(36*SC) : 34;
  const y = Math.min(c.by + c.bh + 10*SC, H - h - 8);
  return {x: W/2 - w/2, y, w, h};
}
function titleBtns(){
  const c = titleCard();
  const h = PORTRAIT ? 64 : 56, y = c.by + c.bh - h - (PORTRAIT ? 42 : 32);
  const bw = Math.min(300, c.bw - 60);
  return [{x: c.bx + (c.bw-bw)/2, y, w:bw, h, label:"PLAY", sub:"first to five pegs"}];
}
function drawTitle(t){
  ctx.fillStyle="rgba(0,0,0,.30)"; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.textAlign="center";
  const bob = Math.sin(t*2)*6;
  const c = titleCard();
  const bw = c.bw, bh = c.bh, bx = c.bx, by = c.by;
  ctx.fillStyle="#fff"; ctx.strokeStyle="#e63946"; ctx.lineWidth=8;
  roundRect(bx,by,bw,bh,32,true,true);
  ctx.fillStyle="#e63946"; ctx.font = PORTRAIT ? fnt(30, true) : "bold 54px Comic Sans MS, Arial";
  ctx.fillText("Cushla Mushla", W/2, by+(PORTRAIT?52*TS/1.34:78));
  ctx.fillStyle="#2fa8a0"; ctx.font = PORTRAIT ? fnt(13, true) : "bold 22px Comic Sans MS, Arial";
  ctx.fillText("…the great kitchen peg caper!", W/2, by+(PORTRAIT?78*TS/1.34:114));

  ctx.textAlign="left";
  if(TITLE_BLOCKS){
    let y = by + c.head;
    const px = bx + 16;
    for(const [head, lines] of TITLE_BLOCKS){
      if(head){
        ctx.fillStyle="#e63946"; ctx.font = fnt(11*c.k, true);
        ctx.fillText(head.toUpperCase(), px, y);
        ctx.strokeStyle="rgba(230,57,70,.20)"; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.moveTo(px, y+5); ctx.lineTo(bx+c.bw-16, y+5); ctx.stroke();
        y += c.lh*1.35;
      }
      ctx.fillStyle="#7a5a3a"; ctx.font = fnt(12*c.k);
      for(const l of lines){ ctx.fillText(l, px, y); y += c.lh; }
      y += c.lh*0.5;
    }
  } else {
    ctx.fillStyle="#7a5a3a"; ctx.font = Math.round(17*c.k) + "px Comic Sans MS, Arial";
    TITLE_LINES.forEach((l,i)=> ctx.fillText(l, bx+44, by+c.head+i*c.lh));
  }

  // music toggle — off by default, so make it easy to find
  const mb = musicBtn();
  ctx.fillStyle = MUS.on ? "#6bcB77" : "rgba(255,255,255,.88)";
  roundRect(mb.x, mb.y, mb.w, mb.h, mb.h/2, true, false);
  if(!MUS.on){ ctx.strokeStyle="rgba(0,0,0,.14)"; ctx.lineWidth=2;
               roundRect(mb.x, mb.y, mb.w, mb.h, mb.h/2, false, true); }
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillStyle = MUS.on ? "#fff" : "#8a7460";
  ctx.font = PORTRAIT ? fnt(12, true) : "bold 15px Comic Sans MS, Arial";
  ctx.fillText((MUS.on ? "♪  Music on" : "♪  Music off"), mb.x+mb.w/2, mb.y+mb.h/2+1);
  ctx.textBaseline="alphabetic";

  // mode buttons
  ctx.textAlign="center";
  titleBtns().forEach((b,i)=>{
    ctx.fillStyle = i===0 ? "#e63946" : "#2fa8a0";
    roundRect(b.x,b.y,b.w,b.h,16,true,false);
    ctx.fillStyle="rgba(255,255,255,.25)"; roundRect(b.x+4,b.y+4,b.w-8,b.h*0.42,12,true,false);
    ctx.fillStyle="#fff"; ctx.font = PORTRAIT ? fnt(15, true) : "bold 20px Comic Sans MS, Arial";
    ctx.fillText(b.label, b.x+b.w/2, b.y+b.h*0.44);
    ctx.font = PORTRAIT ? fnt(10) : "12px Comic Sans MS, Arial";
    ctx.fillStyle="rgba(255,255,255,.85)";
    ctx.fillText(b.sub, b.x+b.w/2, b.y+b.h-10);
  });
  ctx.fillStyle="#a08a70"; ctx.font = PORTRAIT ? fnt(10) : "13px Comic Sans MS, Arial";
  ctx.fillText(TOUCH ? "⏸ top-right to pause, restart or mute"
                     : "1 / 2 or ENTER to start  •  P pause  •  R restart  •  N music  •  M mute",
               W/2, by+bh-14);
  ctx.restore();
  // Mascots, flanking the PLAY button. They're pinned near the bottom of the
  // SCREEN, so on a phone — where the card fills it — they used to stand right
  // on top of the last line of the rules. Smaller, and further into the corners.
  const my = PORTRAIT ? H-56 : 566, ms = PORTRAIT ? 0.62 : 0.85;
  const mascot = (who, x) => {
    const p = {who, x:0, y:0, walk:t*4, moving:true, facing:1, pegsOn:[], squeal:0, hop:0, dir:1};
    ctx.save(); ctx.translate(x, my); ctx.scale(ms, ms); drawPerson(p, {}); ctx.restore();
  };
  mascot("Cushla", W*0.11); mascot("Shonty", W*0.89);
}

/* ---------- main loop ---------- */
let last = performance.now(), T = 0;
function frame(now){
  let dt = Math.min(0.05, (now-last)/1000); last = now;
  musicTick(); discoTick();
  if(paused) dt = 0; else T += dt;
  if(discoT > 0) discoT = Math.max(0, discoT - dt);
  sceneT += dt;

  if(paused){ /* everything frozen — just keep rendering */ }
  else if(scene==="play") updatePlay(dt);
  else if(scene==="intro"){ updateLook(dt); }
  else if(scene==="caught"){ updateCatch(dt); }
  else if(scene==="catfall"){ updateCatFall(dt); }
  // every popup now waits for a tap; these are just anti-softlock backstops
  else if(scene==="intro"   && sceneT>25) confirm_();
  else if(scene==="caught"  && sceneT>25) confirm_();
  else if(scene==="roundwin"&& sceneT>25) confirm_();
  updateFx(dt);
  if(!paused) updateCat(dt);
  if(!paused) updateAtmosphere(dt);

  // ---- render ----
  ctx.setTransform(RS,0,0,RS,0,0);            // logical px -> real screen px
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(shake>0){ const s=shake*14; ctx.translate((Math.random()-.5)*s,(Math.random()-.5)*s); }
  drawRoom(T);

  // hiding pockets (subtle shading so the player can read them)
  FURNITURE.forEach(f=>{
    const on = scene==="play" && sneaker.hidden && hiddenAt(sneaker.x,sneaker.y)===f;
    ctx.fillStyle = on ? "rgba(80,220,140,.30)" : "rgba(60,40,90,.09)";
    roundRect(f.hide.x, f.hide.y, f.hide.w, f.hide.h, 16, true, false);
  });

  drawSunbeam();
  drawSteam();

  if(scene!=="title"){
    // depth sort: washer is always at the sink (top), sneaker + furniture sort by y
    const items = [];
    items.push({y: washer.y, d:()=>drawPerson(washer,{
      apron: true,
      laugh: (scene==="caught" && catchAnim) ? catchAnim.laugh : 0,
      scrub: LOOK.mode==="wash",
      jig: playing > 0 ? 1 : 0,          // she can hear him from the sink
      warn: LOOK.warn || LOOK.mode==="turnF",
      eyeing: LOOK.mode==="look",
      scan: Math.sin(T*3)
    })});
    items.push({y: sneaker.y, d:()=>{
      ctx.save();
      if(scene==="play" && sneaker.hidden) ctx.globalAlpha = 0.55;
      drawPerson(sneaker,{});
      ctx.restore();
      // the peg she's carrying, held up ready to clip on
      if(sneaker.hasPeg && scene!=="caught"){
        const col = PEG_COLS[(sneaker===cushla?shonty:cushla).pegsOn.length % PEG_COLS.length];
        ctx.save();
        ctx.translate(sneaker.x + 30*sneaker.dir, sneaker.y - 58 + Math.sin(T*4)*2);
        ctx.rotate(0.5*sneaker.dir);
        ctx.fillStyle=col; roundRect(-5,-13,10,26,3,true,false);
        ctx.fillStyle="rgba(255,255,255,.55)"; roundRect(-3,-11,3,22,2,true,false);
        ctx.fillStyle="rgba(0,0,0,.22)"; ctx.fillRect(-5,-2,10,3);
        ctx.restore();
      }
      // the flower, held up in her other hand
      if(sneaker.hasFlower && scene!=="caught"){
        ctx.save();
        ctx.translate(sneaker.x - 28*sneaker.dir, sneaker.y - 62 + Math.sin(T*3.2)*2.5);
        ctx.rotate(-0.35*sneaker.dir);
        ctx.strokeStyle="#5ea45f"; ctx.lineWidth=2.4; ctx.lineCap="round";
        ctx.beginPath(); ctx.moveTo(0,14); ctx.lineTo(0,-4); ctx.stroke();
        ctx.lineCap="butt";
        ctx.fillStyle="#5ea45f";
        ctx.beginPath(); ctx.ellipse(-5,6,5.5,2.6,-0.5,0,7); ctx.fill();
        ctx.fillStyle="#ffd93d";
        for(let i=0;i<5;i++){
          const a = i*Math.PI*2/5 + Math.sin(T*2)*0.06;
          ctx.beginPath(); ctx.arc(Math.cos(a)*5.2, -6+Math.sin(a)*5.2, 4.4, 0, 7); ctx.fill();
        }
        ctx.fillStyle="#fff6c9"; ctx.beginPath(); ctx.arc(0,-6,3.2,0,7); ctx.fill();
        ctx.restore();
      }
      if(scene==="play" && !sneaker.hasPeg && !PORTRAIT){
        ctx.fillStyle="#c9772a"; ctx.font="bold 15px Comic Sans MS, Arial"; ctx.textAlign="center";
        ctx.fillText("out of pegs — back to the basket!", sneaker.x, sneaker.y-150);
      }
      // …but not mid-hug: nothing she presses does anything just now
      if(scene==="play" && !hug){
        const label = (txt, col, dy) => {
          ctx.font = fnt(15, true); ctx.textAlign="center"; ctx.textBaseline="middle";
          const w = ctx.measureText(txt).width + 18*TS, h = 24*TS;
          ctx.fillStyle="rgba(255,255,255,.86)";
          roundRect(sneaker.x-w/2, sneaker.y+dy-h/2, w, h, h/2, true, false);
          ctx.fillStyle=col; ctx.fillText(txt, sneaker.x, sneaker.y+dy+1);
          ctx.textBaseline="alphabetic";
        };
        if(phewT > 0 && !sneaker.hidden){
          ctx.globalAlpha = Math.min(1, phewT*1.6);
          label("phew!", "#2f80ed", -132);
          ctx.globalAlpha = 1;
        }
        else if(sneaker.hidden) label("hidden!", "#2f9e56", -132);
        else if(isWatching()) label(sneaker.moving ? "MOVING!" : "frozen…",
                                    sneaker.moving ? "#e63946" : "#2f9e56", -132);
        const tap = TOUCH ? "TAP — " : "SPACE — ";
        if(sneaker.hasFlower && nearWasher() && humanTurn()){
          ctx.globalAlpha = 0.65+Math.sin(T*10)*0.35;
          label(tap + "give him the flower", "#e0518f", -160);
          ctx.globalAlpha = 1;
        } else if(inPegRange() && !isWatching() && humanTurn()){
          ctx.globalAlpha = 0.65+Math.sin(T*10)*0.35;
          label(tap + "peg them!", "#d68300", -160);
          ctx.globalAlpha = 1;
        } else if(humanTurn() && !flowerPicked && behind(FLOWER_TABLE)){
          ctx.globalAlpha = 0.72+Math.sin(T*5)*0.22;      // a gentler nudge
          label(tap + "pick a flower", "#e0518f", -160);
          ctx.globalAlpha = 1;
        } else if(humanTurn() && behind(CAT_TREE_F)){
          ctx.globalAlpha = 0.72+Math.sin(T*5)*0.22;
          label(tap + "pat Beanbags", "#8a6bb8", -160);
          ctx.globalAlpha = 1;
        }
      }
    }});
    // The hiding pocket is in FRONT of a piece, so a sneaker stood behind the
    // guitar covers it completely. While he's playing, sort the guitar just
    // ahead of him instead, so you can actually see the thing he's playing.
    FURNITURE.forEach(f=> items.push({
      y: (f===GUITAR_F && playing>0) ? sneaker.y + 1 : f.y+f.h-12,
      d:()=>drawFurniture(f)
    }));
    items.push({y: PEGBOX.y-2, d:()=>drawPegBox(T)});
    items.sort((a,b)=>a.y-b.y).forEach(i=>i.d());
  }

  drawSnapFx();
  drawFx();
  drawDust();
  drawDisco();
  ctx.restore();
  drawGrade();

  if(flash>0){ ctx.fillStyle="rgba(255,255,220,"+(flash*0.7)+")"; ctx.fillRect(0,0,W,H); }

  if(scene==="title") drawTitle(T);
  else {
    drawHUD();
    if(scene==="intro")    banner(msg, sub, "#ff8b3d");
    // let the SNAP + squeal play out in full before the popup covers it
    if(scene==="caught" && sceneT>2.3) banner(msg, sub, "#e63946");
    // same again: the crash, the pegs and the cat land before the words do
    if(scene==="catfall" && sceneT>1.9){
      const s = PORTRAIT ? 0.70*TS/1.34 : 1;
      banner(msg, sub, "#9b7bd4", {w: 48*s, draw:(x,y)=>drawBeanbagsIcon(x,y,s)});
    }
    if(scene==="roundwin") banner(msg, sub, "#2f9e56");
    if(scene==="over"){
      const s = PORTRAIT ? 0.72*TS/1.34 : 1;
      banner(msg, sub, "#ffb703", {w: 48*s, draw:(x,y)=>drawRainbowIcon(x,y,s)});
    }
    drawFlyers();          // above the HUD, so a peg drops into its slot
    drawStatusStrip();
    drawImmunity();
    drawPeekMeter();
    if(scene==="play" && humanTurn()) drawStick();
    if(!TOUCH){
      ctx.fillStyle="rgba(90,50,20,.5)"; ctx.font="13px Arial"; ctx.textAlign="right";
      ctx.fillText((muted?"muted • ":"") + (MUS.on?"":"music off • ") + "P pause • R restart", W-20, H-14);
    } else if(scene==="play" && !stick.on){
      const txt = humanWatch() ? "hold anywhere to spin round  •  let go to wash"
                               : "swipe & hold to sneak  •  let go to freeze";
      ctx.font = fnt(14, true); ctx.textAlign="center"; ctx.textBaseline="middle";
      const w = ctx.measureText(txt).width + 26*TS, h = 30*TS, y = H - h/2 - 10*SC;
      ctx.fillStyle="rgba(255,255,255,.82)";
      roundRect(W/2-w/2, y-h/2, w, h, h/2, true, false);
      ctx.fillStyle="#8a5a2a"; ctx.fillText(txt, W/2, y+1);
      ctx.textBaseline="alphabetic";
    }
    if(paused) drawPause();
  }

  requestAnimationFrame(frame);
}
seedAtmosphere();
requestAnimationFrame(frame);
})();
</script>
