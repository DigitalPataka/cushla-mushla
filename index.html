<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<!-- Keep this page out of search results — it's a private family game.
     Anyone with the link can play; nobody can stumble across it. -->
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="googlebot" content="noindex, nofollow, noarchive">
<title>Cushla Mushla — the Peg Game!</title>
<style>
  html,body{margin:0;padding:0;height:100%;}
  body{
    background: radial-gradient(circle at 50% 20%, #ffe9a8 0%, #ffc978 45%, #ff9f6e 100%);
    font-family: "Comic Sans MS", "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100%; overflow:hidden; user-select:none;
    -webkit-user-select:none; -webkit-tap-highlight-color:transparent;
    overscroll-behavior:none; touch-action:none;
  }
  #wrap{ position:relative; display:flex; flex-direction:column; align-items:center; }
  h1{
    margin:0 0 8px; font-size:30px; letter-spacing:1px; text-align:center;
    color:#fff; text-shadow: 0 3px 0 #e0574f, 0 6px 10px rgba(0,0,0,.25);
  }
  canvas{
    display:block; border-radius:22px; background:#fff;
    box-shadow: 0 14px 40px rgba(120,60,20,.35), 0 0 0 6px #fff, 0 0 0 10px #ffd166;
    touch-action:none;
  }
  #hint{ margin-top:10px; color:#8a4a20; font-size:14px; text-align:center; }
  /* on a phone the canvas takes the whole screen — the chrome just steals room */
  body.mobile h1, body.mobile #hint{ display:none; }
  body.mobile{ background:#ffb27a; }
  body.mobile canvas{ border-radius:0; box-shadow:none; }
</style>
</head>
<body>
<div id="wrap">
  <h1>✨ Cushla Mushla ✨</h1>
  <canvas id="game" width="960" height="600"></canvas>
  <div id="hint">Your turn: ← → ↑ ↓ / WASD to sneak &nbsp;•&nbsp; SPACE to peg &nbsp;•&nbsp; his turn: hold SPACE to spin round<br><span style="opacity:.75">P pause &nbsp;•&nbsp; R restart &nbsp;•&nbsp; N music &nbsp;•&nbsp; M mute &nbsp;—&nbsp; on a phone: swipe &amp; hold to sneak, let go to freeze, tap to peg</span></div>
</div>
<script>
(() => {
"use strict";

/* ============================================================
   CUSHLA MUSHLA — a cheerful sneak-up-and-peg arcade game
   ============================================================ */

const cv = document.getElementById("game");
const ctx = cv.getContext("2d");

/* ---------- responsive stage ----------
   The canvas is built to the phone's OWN aspect ratio so it fills the screen
   1:1 and nothing gets shrunk. (A fixed 620x1040 canvas was being letterboxed
   down to ~69% on a typical phone — which is why all the text was tiny.)     */
const TOUCH = ("ontouchstart" in window) || navigator.maxTouchPoints > 0;
const VW = Math.max(300, window.innerWidth), VH = Math.max(420, window.innerHeight);
const PORTRAIT = (VH > VW * 1.02) || VW < 780;
const MOBILE = TOUCH || PORTRAIT;
if(MOBILE) document.body.classList.add("mobile");

const DPR = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
const W = PORTRAIT ? Math.round(Math.min(VW, 540)) : 960;
const H = PORTRAIT ? Math.round(Math.min(W*2.35, Math.max(W*1.45, W * VH / VW))) : 600;
// Backing store is sized to the REAL on-screen pixels (device ratio x fit scale),
// so the game is pixel-crisp whether it's shrunk on a small phone or blown up on
// a tablet. RS is re-derived in fitStage and re-applied every frame.
let FIT = 1, RS = DPR;

// Everything is authored against a 430px-wide phone and scaled from there.
const SC = PORTRAIT ? W/430 : 1;              // world / furniture scale
const TS = PORTRAIT ? 1.34*SC : 1;            // text scale — phones need big type
const fnt = (px, bold) => (bold?"bold ":"") + Math.round(px*TS) + "px 'Comic Sans MS', 'Trebuchet MS', Arial";

// iPhone notch / Android cutout, so the scoreboard never hides underneath it
let SAFE_TOP = 0;
(function(){
  try{
    const p = document.createElement("div");
    p.style.cssText = "position:fixed;top:0;left:0;width:0;height:0;visibility:hidden;padding-top:env(safe-area-inset-top,0px);";
    document.body.appendChild(p);
    SAFE_TOP = Math.min(48, parseFloat(getComputedStyle(p).paddingTop) || 0);
    p.remove();
  }catch(e){ SAFE_TOP = 0; }
})();

function fitStage(){
  const chromeH = MOBILE ? 0 : 116;
  const availW = window.innerWidth  - (MOBILE ? 0 : 40);
  const availH = window.innerHeight - chromeH;
  FIT = Math.min(availW / W, availH / H);
  RS  = DPR * FIT;
  cv.width  = Math.round(W * RS);      // note: this resets ctx state, so the
  cv.height = Math.round(H * RS);      // frame loop re-applies the transform
  cv.style.width  = Math.floor(W * FIT) + "px";
  cv.style.height = Math.floor(H * FIT) + "px";
}
addEventListener("resize", fitStage);
addEventListener("orientationchange", ()=>setTimeout(fitStage, 250));
fitStage();

/* ---------- tiny audio kit ---------- */
let AC = null, muted = false;
function ac(){ if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
function tone(freq, dur, type, vol, slideTo, delay){
  const a = ac(); if(!a || muted) return;
  const t0 = a.currentTime + (delay||0);
  const o = a.createOscillator(), g = a.createGain();
  o.type = type||"sine"; o.frequency.setValueAtTime(freq, t0);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20,slideTo), t0+dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol||0.2, t0+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  o.connect(g); g.connect(a.destination); o.start(t0); o.stop(t0+dur+0.05);
}
function noise(dur, vol, freq, q, delay){
  const a = ac(); if(!a || muted) return;
  const t0 = a.currentTime + (delay||0);
  const n = Math.floor(a.sampleRate*dur);
  const buf = a.createBuffer(1,n,a.sampleRate), d = buf.getChannelData(0);
  for(let i=0;i<n;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/n,2.2);
  const src = a.createBufferSource(); src.buffer = buf;
  const bp = a.createBiquadFilter(); bp.type="bandpass"; bp.frequency.setValueAtTime(freq||1400,t0);
  bp.frequency.exponentialRampToValueAtTime((freq||1400)*0.35, t0+dur);
  bp.Q.value = q||3;
  const g = a.createGain(); g.gain.value = vol||0.3;
  src.connect(bp); bp.connect(g); g.connect(a.destination); src.start(t0);
}
const S = {
  peg(){ tone(660,0.09,"square",0.14); tone(1320,0.12,"triangle",0.12,1760,0.05); },
  point(){ [523,659,784,1047].forEach((f,i)=>tone(f,0.16,"triangle",0.16,null,i*0.07)); },
  snap(){ noise(0.16,0.5,2600,6); tone(180,0.14,"sawtooth",0.18,60); },
  ow(){ // cartoon squeal
    tone(700,0.20,"sine",0.20,1180,0.08);
    tone(1400,0.18,"triangle",0.07,2000,0.09);
    tone(1050,0.22,"sine",0.16,760,0.30);
  },
  peek(){ tone(880,0.07,"square",0.07); },
  step(){ tone(160+Math.random()*40,0.04,"sine",0.05); },
  win(){ [523,659,784,1047,1319].forEach((f,i)=>tone(f,0.4,"triangle",0.18,null,i*0.11)); },
  lose(){ [400,340,280].forEach((f,i)=>tone(f,0.25,"sine",0.14,null,i*0.13)); },
  ui(){ tone(880,0.08,"triangle",0.12,1200); },
  laugh(){                       // a daft cartoon belly laugh: ha-ha-haaa
    [0, 0.17, 0.34, 0.55].forEach((d,i)=>{
      const f = [330, 300, 275, 250][i];
      tone(f, 0.13, "sawtooth", 0.09, f*0.78, d);
      tone(f*2, 0.10, "triangle", 0.04, f*1.5, d+0.01);
    });
  }
};

/* ---------- light, cheerful background music ----------
   A little 4-chord music box: C – G – Am – F, with a plucky
   arpeggio, a soft bass and a twinkle on the off-beats.      */
// starts OFF on purpose — nobody wants a phone at full volume suddenly
// playing music at them. Turn it on from the title screen, N, or the pause menu.
const MUS = { on:false, next:0, step:0, vol:0.055 };
const PROG = [0, 7, 9, 5];                 // C  G  Am  F
const ARP  = [0, 4, 7, 12, 7, 4, 7, 4];
const MEL  = [12, null, 16, null, 14, null, 12, 19, null, 16, 14, null, 12, null, 9, null];
const nf = s => 261.626 * Math.pow(2, s/12);

function at(freq, dur, type, vol, when, slideTo){
  const a = ac(); if(!a) return;
  const o = a.createOscillator(), g = a.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, when);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, when+dur);
  g.gain.setValueAtTime(0.0001, when);
  g.gain.exponentialRampToValueAtTime(vol, when+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, when+dur);
  o.connect(g); g.connect(a.destination); o.start(when); o.stop(when+dur+0.05);
}
function musicTick(){
  const a = ac();
  if(!a || a.state!=="running" || muted || !MUS.on){ MUS.next = 0; return; }
  const now = a.currentTime, SPB = 0.1875;          // ~160bpm eighth notes
  if(MUS.next < now) MUS.next = now + 0.06;
  while(MUS.next < now + 0.35){
    const s = MUS.step, t = MUS.next;
    const root = PROG[Math.floor(s/8) % 4];
    const V = MUS.vol * (paused ? 0.35 : 1);
    if(s % 8 === 0) at(nf(root-24), 0.42, "triangle", V*1.5, t);      // bass
    if(s % 8 === 4) at(nf(root-12), 0.30, "triangle", V*1.0, t);
    at(nf(root + ARP[s % 8] + 12), 0.22, "sine", V*0.85, t);          // arpeggio
    const m = MEL[s % 16];
    if(m !== null) at(nf(root + m + 12), 0.30, "triangle", V*0.55, t);// melody
    if(s % 8 === 6) at(nf(root + 24), 0.16, "sine", V*0.30, t);       // twinkle
    MUS.next += SPB; MUS.step++;
  }
}

/* ---------- input ---------- */
const keys = {};
addEventListener("keydown", e=>{
  if([" ","ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key)) e.preventDefault();
  if(e.repeat) return;
  keys[e.key.toLowerCase()] = true;
  ac(); if(AC && AC.state==="suspended") AC.resume();
  if(e.key.toLowerCase()==="m"){ muted = !muted; }
  onKey(e.key.toLowerCase());
});
addEventListener("keyup", e=>{ keys[e.key.toLowerCase()] = false; });
const down = (...k)=> k.some(x=>keys[x]);

/* ---------- swipe / drag controls ----------
   Press and swipe anywhere: Cushla creeps in that direction, at a speed
   set by how far you've dragged. LIFT YOUR FINGER TO FREEZE — which is
   exactly what you need when Shonty spins round. A quick tap places a
   peg (or starts the game / dismisses a banner).                      */
const stick = { on:false, id:null, ox:0, oy:0, x:0, y:0, dx:0, dy:0, mag:0, t0:0, moved:0 };
let tapPeg = 0;                       // frames-worth of "peg now" from a tap
const STICK_MAX = 62, STICK_DEAD = 9;

function canvasPos(e){
  const r = cv.getBoundingClientRect();
  return { x:(e.clientX - r.left) * (W / r.width), y:(e.clientY - r.top) * (H / r.height) };
}
function pauseBtn(){
  const r = PORTRAIT ? 21*SC : (MOBILE?30:22);
  return PORTRAIT ? {x: W-r-10*SC, y: SAFE_TOP + 6*SC + 13*SC, r}
                  : {x: W-r-16, y: r+16, r};
}
function hitBtn(b,p){ return Math.hypot(p.x-b.x, p.y-b.y) < b.r*1.5; }

cv.addEventListener("pointerdown", e=>{
  e.preventDefault();
  cv.setPointerCapture(e.pointerId);
  ac(); if(AC && AC.state==="suspended") AC.resume();
  const p = canvasPos(e);
  if(inMatch() && hitBtn(pauseBtn(), p)){ paused = !paused; S.ui(); return; }
  if(paused){ handlePauseTap(p); return; }
  if(stick.on) return;
  stick.on = true; stick.id = e.pointerId;
  stick.ox = stick.x = p.x; stick.oy = stick.y = p.y;
  stick.dx = stick.dy = stick.mag = 0; stick.moved = 0; stick.t0 = performance.now();
}, {passive:false});

cv.addEventListener("pointermove", e=>{
  if(!stick.on || e.pointerId !== stick.id) return;
  e.preventDefault();
  const p = canvasPos(e);
  stick.x = p.x; stick.y = p.y;
  let dx = p.x - stick.ox, dy = p.y - stick.oy;
  const d = Math.hypot(dx,dy);
  stick.moved = Math.max(stick.moved, d);
  // if the drag runs long, let the anchor trail the finger so you never run out of room
  if(d > STICK_MAX){
    stick.ox += dx * (1 - STICK_MAX/d);
    stick.oy += dy * (1 - STICK_MAX/d);
    dx = p.x - stick.ox; dy = p.y - stick.oy;
  }
  const dd = Math.hypot(dx,dy);
  if(dd < STICK_DEAD){ stick.dx = stick.dy = stick.mag = 0; return; }
  stick.dx = dx/dd; stick.dy = dy/dd;
  stick.mag = Math.min(1, (dd - STICK_DEAD) / (STICK_MAX - STICK_DEAD));
}, {passive:false});

function endStick(e){
  if(!stick.on || (e && e.pointerId !== stick.id)) return;
  const quick = performance.now() - stick.t0 < 260;
  if(quick && stick.moved < 16){          // a tap, not a swipe
    if(scene==="title"){
      const p = {x:stick.ox, y:stick.oy};
      const mb = musicBtn();
      if(p.x>mb.x && p.x<mb.x+mb.w && p.y>mb.y && p.y<mb.y+mb.h){
        MUS.on = !MUS.on; S.ui();                    // just the toggle — don't start yet
      } else { S.ui(); startGame(); }
    }
    else if(scene!=="play"){ confirm_(); }   // any popup: tap to carry on
    else if(!humanWatch()) tapPeg = 0.22;  // "peg him!" — held briefly so it can't be missed
  }
  stick.on = false; stick.id = null; stick.dx = stick.dy = stick.mag = 0;
}
cv.addEventListener("pointerup", endStick, {passive:false});
cv.addEventListener("pointercancel", endStick, {passive:false});
cv.addEventListener("contextmenu", e=>e.preventDefault());

function handlePauseTap(p){
  const RH = PAUSE_ROW_H, bw = Math.min(420, W-40);
  const bh = PAUSE_TOP+RH*6+40, bx = (W-bw)/2, by = (H-bh)/2;
  for(let i=0;i<6;i++){
    if(p.y > by+PAUSE_TOP+i*RH && p.y < by+PAUSE_TOP+(i+1)*RH && p.x>bx && p.x<bx+bw){
      const act = ["resume","restart","fancy","music","mute","quit"][i];
      S.ui();
      if(act==="resume") paused = false;
      else if(act==="restart"){ paused=false; confetti=[]; sparks=[]; hearts=[]; startGame(); }
      else if(act==="fancy") FANCY = !FANCY;
      else if(act==="music") MUS.on = !MUS.on;
      else if(act==="mute") muted = !muted;
      else if(act==="quit"){ paused=false; confetti=[]; scene="title"; sceneT=0; }
      return;
    }
  }
  paused = false;   // tap anywhere else to resume
}

/* ---------- world ---------- */
// On a phone the scoreboard gets its own band at the very top and the kitchen
// starts below it, so the HUD can never sit on top of Shonty or his warnings.
const HUD_H     = PORTRAIT ? Math.round(94*SC) + SAFE_TOP : 0;
// budget below the HUD band: ~40 for the status strip, then window, then counter
const FLOOR_TOP = PORTRAIT ? HUD_H + Math.round(190*SC) : 168;
const SINK_Y    = FLOOR_TOP + Math.round(32*SC);   // where the washer stands
const START     = {x: W*0.63, y: H - 46*SC};       // sneaker spawn, far end of the room
const PEGBOX    = {x: W*0.26, y: H - 34*SC};       // reload here after every peg
const PEG_COLS  = ["#ff5d73","#ffd93d","#5ec8ff","#8ce99a","#c77dff","#ff9f45","#4dd4ac"];

// Furniture is placed as a fraction of the room, so it lays out correctly on
// any screen shape: fx across, fy down the floor.
function furn(fx, fy, w, h, kind){
  const fw = w*SC, fh = h*SC;
  return {x: fx*W - fw/2, y: FLOOR_TOP + fy*(H-FLOOR_TOP) - fh/2, w:fw, h:fh, kind};
}
const FURNITURE = PORTRAIT ? [
  // A galley kitchen you have to weave through. Every piece is SOLID — you walk
  // around it, not through it — and each one casts a hiding pocket behind it.
  // They alternate sides so there's always a way past, but never a straight run.
  furn(0.30, 0.16, 196, 56, "table"),
  furn(0.85, 0.32,  84, 68, "plant"),
  furn(0.20, 0.49,  96, 66, "basket"),
  furn(0.79, 0.66,  88, 54, "chair"),
  furn(0.33, 0.83, 178, 56, "table")
] : [
  {x:300, y:300, w:280, h:60, kind:"table"},
  {x: 70, y:392, w: 92, h:74, kind:"plant"},
  {x:768, y:360, w: 98, h:66, kind:"basket"},
  {x:430, y:466, w: 96, h:56, kind:"chair"}
];
// the pocket behind a piece (further from the sink) is where you're invisible
FURNITURE.forEach(f => {
  f.solid = {x:f.x-4*SC, y:f.y+10*SC, w:f.w+8*SC, h:f.h-6*SC};
  f.hide  = {x:f.x-8*SC, y:f.y+f.h+2*SC, w:f.w+16*SC, h:54*SC};
});

function hiddenAt(x,y){
  for(const f of FURNITURE){
    const h = f.hide;
    if(x>h.x && x<h.x+h.w && y>h.y && y<h.y+h.h) return f;
  }
  return null;
}
// solid: a character's feet can't enter a piece of furniture
function blockedAt(x,y){
  for(const f of FURNITURE){
    const s = f.solid;
    if(x>s.x && x<s.x+s.w && y>s.y && y<s.y+s.h) return f;
  }
  return null;
}
/* ---------- navigation grid ----------
   Shonty used to steer greedily at his goal, which wedged him in a corner
   between two blocked directions and made him jitter on the spot forever.
   He now walks a real path: breadth-first search over a coarse grid.     */
const NAV_CELL = Math.max(10, Math.round(13*SC));
let navGrid = null, navW = 0, navH = 0;
function buildNav(){
  navW = Math.ceil(W/NAV_CELL); navH = Math.ceil(H/NAV_CELL);
  navGrid = new Uint8Array(navW*navH);
  for(let cy=0; cy<navH; cy++) for(let cx=0; cx<navW; cx++){
    const x = cx*NAV_CELL+NAV_CELL/2, y = cy*NAV_CELL+NAV_CELL/2;
    const ok = !blockedAt(x,y) && x>28*SC && x<W-28*SC && y>SINK_Y+2 && y<H-26*SC;
    navGrid[cy*navW+cx] = ok ? 0 : 1;
  }
}
const navCell = (x,y) => ({
  cx: Math.min(navW-1, Math.max(0, Math.round((x-NAV_CELL/2)/NAV_CELL))),
  cy: Math.min(navH-1, Math.max(0, Math.round((y-NAV_CELL/2)/NAV_CELL)))
});
let navFlow = null, navKey = "";      // cached "which way to the goal" field
function navField(tx,ty){
  if(!navGrid) buildNav();
  let {cx:gx, cy:gy} = navCell(tx,ty);
  if(navGrid[gy*navW+gx]){                        // goal sits in furniture
    let best=null, bd=1e9;
    for(let cy=0;cy<navH;cy++) for(let cx=0;cx<navW;cx++){
      if(navGrid[cy*navW+cx]) continue;
      const d=(cx-gx)*(cx-gx)+(cy-gy)*(cy-gy);
      if(d<bd){ bd=d; best=[cx,cy]; }
    }
    if(best){ gx=best[0]; gy=best[1]; }
  }
  const key = gx+":"+gy;
  if(key === navKey && navFlow) return navFlow;
  const prev = new Int32Array(navW*navH).fill(-1);
  const start = gy*navW+gx;
  prev[start] = -2;
  const q = [start];
  let head = 0;
  while(head < q.length){
    const cur = q[head++], cx = cur%navW, cy = (cur-cx)/navW;
    for(let k=0;k<4;k++){
      const nx = cx + (k===0?1:k===1?-1:0), ny = cy + (k===2?1:k===3?-1:0);
      if(nx<0||ny<0||nx>=navW||ny>=navH) continue;
      const ni = ny*navW+nx;
      if(navGrid[ni] || prev[ni]!==-1) continue;
      prev[ni] = cur; q.push(ni);
    }
  }
  navKey = key; navFlow = prev;
  return prev;
}
// unit direction from (x,y) toward the goal, routed around furniture
function navTo(x, y, tx, ty){
  const flow = navField(tx,ty);
  const {cx,cy} = navCell(x,y);
  const i = cy*navW+cx, nxt = flow[i];
  if(nxt === -2 || nxt === -1 || nxt === undefined){
    const dx=tx-x, dy=ty-y, l=Math.hypot(dx,dy)||1;   // adjacent or unreachable
    return {x:dx/l, y:dy/l};
  }
  const nx = nxt%navW, ny = (nxt-nx)/navW;
  const vx = (nx*NAV_CELL+NAV_CELL/2)-x, vy = (ny*NAV_CELL+NAV_CELL/2)-y;
  const l = Math.hypot(vx,vy)||1;
  return {x:vx/l, y:vy/l};
}

// move with sliding — running into a table edge slides you along it
function moveWithCollision(ch, dx, dy){
  const nx = Math.max(28*SC, Math.min(W-28*SC, ch.x + dx));
  if(!blockedAt(nx, ch.y)) ch.x = nx;
  const ny = Math.max(SINK_Y+2, Math.min(H-26*SC, ch.y + dy));
  if(!blockedAt(ch.x, ny)) ch.y = ny;
}

/* ---------- characters ---------- */
function makeChar(who){
  return {
    who,
    x: START.x, y: START.y,
    vx:0, vy:0, walk:0, moving:false,
    facing: 0,          // 0 = back to us, 1 = facing us
    turnT: 0,
    pegsOn: [],         // pegs stuck to THIS character
    hasPeg: true,       // carrying a peg? if not, sneak back to the basket
    squeal: 0, hop: 0,
    dir: 1
  };
}
const cushla = makeChar("Cushla");
const shonty = makeChar("Shonty");

const LOOK = {   // the washer's look-around cycle
  mode:"wash", t:0, dur:2.4, warn:false, drift:0
};

let sneaker = cushla, washer = shonty;   // Cushla goes first
let scene = "title";                     // title | intro | play | caught | roundwin | over
let sceneT = 0;
let msg = "", sub = "";
let bubbles = [], sparks = [], confetti = [], hearts = [];
let shake = 0, flash = 0, snapFx = 0;
let paused = false;
let FANCY = true;        // the visual pass — toggle with V, or from the pause menu
let aiThink = 0, aiSkill = 0.5, aiPause = 0;
// How long Shonty keeps moving after you spin round — your window to catch him.
// Deliberately generous: without it he'd freeze instantly and be uncatchable.
const AI_REACT = 0.55;
let aiReact = AI_REACT;
const AI_SPEED = 0.66;        // he creeps; you're quicker than he is

/* ---------- match structure ----------
   One player, always doing something. Your turn: sneak up and peg Shonty —
   TWO pegs and the turn passes. His turn: YOU'RE on the dishes, and you
   choose when to spin round and try to catch him. First to five wins.   */
const TARGET   = 5;    // pegs to win the whole game
const PER_TURN = 2;    // successful pegs before the turn passes over
let target = TARGET;
let turnPegs = 0;      // pegs placed so far this turn
let readyWait = false;

// the player IS Cushla: sneaking on her turn, on dish duty on his
const humanTurn  = () => sneaker === cushla;   // player is the one sneaking
const humanWatch = () => washer  === cushla;   // player is on the dishes

/* ---------- flow ---------- */
function startGame(){
  cushla.pegsOn = []; shonty.pegsOn = [];
  floorPegs = [];
  sneaker = cushla; washer = shonty;           // Cushla sneaks first
  beginTurn(true);
}
function gameOver(winner){
  scene = "over"; sceneT = 0; readyWait = false;
  S.win();
  for(let i=0;i<170;i++) confetti.push({x:Math.random()*W,y:-Math.random()*H,vy:60+Math.random()*180,vx:(Math.random()-.5)*60,r:Math.random()*6+3,rot:Math.random()*6,vr:(Math.random()-.5)*8,col:PEG_COLS[i%PEG_COLS.length]});
  msg = (winner===cushla ? "You win! 🏆" : "Shonty wins! 🧦");
  sub = (winner===cushla
      ? "Five pegs on Shonty and he never felt a thing."
      : "He got five on you. Rematch?")
    + (TOUCH ? " Tap to play again." : " Press ENTER to play again.");
}
// the turn passes: after PER_TURN pegs, or the moment someone's caught
function passTurn(){
  sneaker = (sneaker===cushla) ? shonty : cushla;
  washer  = (washer ===cushla) ? shonty : cushla;
  beginTurn(false);
}
let floorPegs = [];      // pegs that have pinged off and are lying on the floor
let fallers = [];        // …while they're still tumbling through the air

function beginTurn(first){
  resetPositions();
  turnPegs = 0;
  scene = "intro"; sceneT = 0;
  readyWait = false;
  if(sneaker === cushla){
    msg = "Your turn to sneak!";
    sub = "Creep up behind Shonty and peg him. Freeze or hide when he looks — "
        + PER_TURN + " pegs and it's his go.";
  } else {
    msg = "You're on the dishes!";
    sub = TOUCH
      ? "Shonty's sneaking up on you. HOLD anywhere to spin round and catch him — but you can't watch forever."
      : "Shonty's sneaking up on you. HOLD SPACE to spin round and catch him — but you can't watch forever.";
  }
  if(first) sub = "Sneak up behind Shonty and clip a peg on his back. "
                + PER_TURN + " pegs and it's his turn. First to " + target + " wins!";
}
function resetPositions(){
  sneaker.x = START.x; sneaker.y = START.y; sneaker.facing = 0; sneaker.turnT = 0;
  sneaker.hasPeg = true;
  catchAnim = null; apronFall = null;
  cushla.apronOff = false; shonty.apronOff = false;
  washer.x = W/2; washer.y = SINK_Y; washer.facing = 0; washer.turnT = 0;
  LOOK.mode = "wash"; LOOK.t = 0; LOOK.dur = 2.6; LOOK.warn = false; LOOK.drift = 0;
  LOOK._pinged = false;
  peekE = 1; peekHeld = false;
  aiThink = 0; aiPause = 0.9;
  aiSkill = 0.42 + Math.random()*0.3;
  // He starts his turn ALERT (not mid-reaction), so if you're already holding
  // the look when he appears he waits it out instead of walking into it.
  aiBurst = 0; aiRest = 0; aiCover = null; aiWatchT = 9; aiWind = 0;
  aiPatience = 0; aiPatienceMax = 1.6 + Math.random()*1.3;
  graceT = 0.7;                       // brief no-catch grace as a turn opens
  turnT = 0;
  aiReact = AI_REACT * (0.85 + Math.random()*0.3);
  navFlow = null; navKey = "";
}
const inMatch = () => scene!=="title" && scene!=="over";

/* Popups wait for YOU — they never time out from under you mid-sentence.
   Each has a short minimum so a stray tap can't skip it before it's drawn. */
function minWait(){
  if(scene==="intro")    return 0.7;
  if(scene==="caught")   return 3.1;   // let the whole gag play out first
  if(scene==="roundwin") return 0.9;
  if(scene==="over")     return 1.2;
  return 0;
}
const canAdvance = () => sceneT >= minWait();

/* one shared "go on then" action: ENTER on desktop, a tap on a phone */
function confirm_(){
  if(paused) return;
  if(scene==="title"){ S.ui(); startGame(); return; }
  if(!canAdvance()) return;
  S.ui();
  if(scene==="over"){ confetti=[]; scene="title"; sceneT=0; return; }
  if(scene==="intro"){ readyWait = false; scene="play"; sceneT=0; return; }
  if(scene==="caught"){ passTurn(); return; }
  if(scene==="roundwin"){
    if(turnPegs >= PER_TURN) passTurn();
    else { scene="play"; sceneT=0; }
    return;
  }
}
function onKey(k){
  if(k==="enter"){ confirm_(); return; }
  if(k==="p" || k==="escape"){
    if(inMatch()){ paused = !paused; S.ui(); }
    return;
  }
  if(k==="n"){ MUS.on = !MUS.on; S.ui(); return; }
  if(k==="v"){ FANCY = !FANCY; S.ui(); return; }
  if(k==="r"){                       // restart the whole match
    if(scene!=="title"){ paused=false; confetti=[]; sparks=[]; hearts=[]; S.ui(); startGame(); }
    return;
  }
  if(k==="q" && paused){             // quit out to the title screen
    paused=false; confetti=[]; scene="title"; sceneT=0; S.ui();
  }
}

/* ---------- difficulty ---------- */
function pace(){
  const total = cushla.pegsOn.length + shonty.pegsOn.length;
  return Math.max(0.55, 1 - total*0.055);
}

/* ---------- YOUR turn on the dishes ----------
   You decide when to spin round. You can't watch forever: peeking drains a
   meter, washing refills it, and when it runs dry you're spun back to the
   sink. That's the tension — peek too early and he just freezes; peek too
   late and he's already clipped a peg on you.                            */
let peekE = 1;            // 1 = full, 0 = empty
let peekHeld = false;
const PEEK_DRAIN = 1/2.1, PEEK_REFILL = 1/2.6, PEEK_MIN = 0.45;
const PEEK_COST = 0.30;   // up-front cost of each spin-round — stops peek-spamming being free

function updatePlayerLook(dt){
  LOOK.drift += dt;
  washer.x = W/2 + Math.sin(LOOK.drift*0.5)*(PORTRAIT?54:66);

  const wants = peekHeld && peekE > 0.01;
  // once you're spun round you keep looking until you let go or run dry
  const looking = (LOOK.mode==="look" || LOOK.mode==="turnF")
    ? wants
    : (wants && peekE >= PEEK_MIN);

  if(looking){
    peekE = Math.max(0, peekE - PEEK_DRAIN*dt);
    if(LOOK.mode==="wash"){
      //Each spin costs a chunk up front, not just per-second. Without this,
      // machine-gunning tiny peeks is free and beats playing properly.
      peekE = Math.max(0, peekE - PEEK_COST);
      LOOK.mode="turnF"; LOOK.t=0; LOOK.dur=0.15; S.peek();
    }
    else if(LOOK.mode==="turnF"){
      LOOK.t += dt; washer.turnT = LOOK.t/LOOK.dur;
      if(LOOK.t>=LOOK.dur){ LOOK.mode="look"; washer.turnT=1; }
    }
  } else {
    peekE = Math.min(1, peekE + PEEK_REFILL*dt);
    if(LOOK.mode==="look" || LOOK.mode==="turnF"){ LOOK.mode="turnB"; LOOK.t=0; LOOK.dur=0.15; }
    else if(LOOK.mode==="turnB"){
      LOOK.t += dt; washer.turnT = 1 - LOOK.t/LOOK.dur;
      if(LOOK.t>=LOOK.dur){ LOOK.mode="wash"; washer.turnT=0; }
    }
  }
  LOOK.warn = false;
  LOOK.seen = (LOOK.mode==="look") ? (LOOK.seen||0)+dt : 0;
  washer.facing = (LOOK.mode==="look") ? 1 : washer.turnT;
  if(LOOK.mode==="wash" && Math.random()<0.35){
    bubbles.push({x:washer.x-20+Math.random()*40, y:SINK_Y-92, r:2+Math.random()*5, vy:-14-Math.random()*22, vx:(Math.random()-.5)*10, life:1.6});
  }
}

/* ---------- the AI washer's look cycle (your sneaking turn) ---------- */
function updateLook(dt){
  if(humanWatch()){ updatePlayerLook(dt); return; }
  const p = pace();
  LOOK.t += dt;
  LOOK.drift += dt;
  // gentle shuffle along the sink
  washer.x = W/2 + Math.sin(LOOK.drift*0.5)*(PORTRAIT?54:66);

  if(LOOK.mode==="wash"){
    LOOK.warn = LOOK.t > LOOK.dur - 0.55;
    if(LOOK.warn && !LOOK._pinged){ LOOK._pinged = true; S.peek(); }
    if(LOOK.t >= LOOK.dur){ LOOK.mode="turnF"; LOOK.t=0; LOOK.dur=0.34; LOOK.warn=false; LOOK._pinged=false; }
  } else if(LOOK.mode==="turnF"){
    washer.turnT = LOOK.t/LOOK.dur;
    if(LOOK.t>=LOOK.dur){ LOOK.mode="look"; LOOK.t=0; LOOK.dur=(1.0+Math.random()*1.1)*p; washer.turnT=1; }
  } else if(LOOK.mode==="look"){
    if(LOOK.t>=LOOK.dur){ LOOK.mode="turnB"; LOOK.t=0; LOOK.dur=0.34; }
  } else if(LOOK.mode==="turnB"){
    washer.turnT = 1 - LOOK.t/LOOK.dur;
    if(LOOK.t>=LOOK.dur){ LOOK.mode="wash"; LOOK.t=0; LOOK.dur=(1.5+Math.random()*1.9)*p; washer.turnT=0; }
  }
  LOOK.seen = (LOOK.mode==="look") ? (LOOK.seen||0)+dt : 0;
  washer.facing = (LOOK.mode==="look") ? 1 : washer.turnT;
  // suds while scrubbing
  if(LOOK.mode==="wash" && Math.random()<0.35){
    bubbles.push({x:washer.x-20+Math.random()*40, y:SINK_Y-92, r:2+Math.random()*5, vy:-14-Math.random()*22, vx:(Math.random()-.5)*10, life:1.6});
  }
}
const isWatching = () => LOOK.mode==="look";
// A look has to actually LAND before it can catch anyone — otherwise flicking
// round for a fraction of a second is as good as a proper look, and spamming
// tiny peeks beats playing properly.
const CATCH_MIN = 0.17;
const lookLanded = () => LOOK.mode==="look" && LOOK.seen > CATCH_MIN;

/* ---------- gameplay ---------- */
function inPegRange(){
  if(!sneaker.hasPeg) return false;
  const dx = sneaker.x - washer.x, dy = sneaker.y - washer.y;
  return Math.hypot(dx, dy*1.4) < 82 && sneaker.y > washer.y - 8;
}
function atPegBox(){
  return Math.hypot(sneaker.x - PEGBOX.x, (sneaker.y - PEGBOX.y)*1.3) < 76;
}
function reload(){
  sneaker.hasPeg = true;
  S.peg();
  for(let i=0;i<10;i++) sparks.push({x:PEGBOX.x,y:PEGBOX.y-30,vx:(Math.random()-.5)*140,vy:-Math.random()*140-20,life:0.6,col:PEG_COLS[i%PEG_COLS.length]});
}
function placePeg(){
  const pal = PEG_COLS;
  sneaker.hasPeg = false;
  washer.pegsOn.push({
    ox:(Math.random()-0.5)*36, oy:-84+Math.random()*54,
    col: pal[washer.pegsOn.length % pal.length],
    rot:(Math.random()-0.5)*1.3, pop:0
  });
  S.peg(); S.point();
  for(let i=0;i<22;i++) sparks.push({x:washer.x,y:washer.y-70,vx:(Math.random()-.5)*260,vy:-Math.random()*220-40,life:0.8,col:pal[i%pal.length]});
  for(let i=0;i<4;i++) hearts.push({x:washer.x+(Math.random()-.5)*40,y:washer.y-90,vy:-40,life:1.2});
  flash = 0.35;
  turnPegs++;
  if(washer.pegsOn.length >= target){
    gameOver(sneaker);
  } else if(turnPegs >= PER_TURN){
    // two pegs is a turn — hand over
    scene = "roundwin"; sceneT = 0;
    msg = sneaker===cushla ? "You pegged Shonty — that's two!" : "Shonty pegged you — that's two!";
    sub = sneaker===cushla
        ? "Your turn's done. Back to the sink — now he's coming for you."
        : "That's his turn done. Your turn to sneak up on him!";
  } else {
    const left = PER_TURN - turnPegs;
    scene = "roundwin"; sceneT = 0;
    msg = sneaker===cushla ? "PEGGED! You got one on Shonty." : "PEGGED! Shonty got one on you.";
    sub = sneaker===cushla
        ? "Sneak back to the basket for another — " + left + " more this turn."
        : "He's off to fetch another peg — he can get " + left + " more this turn.";
    // he's happily scrubbing again — a little grace before the next look
    LOOK.mode="wash"; LOOK.t=0; LOOK.dur=2.2*pace(); LOOK.warn=false; LOOK._pinged=false;
    washer.turnT=0; washer.facing=0;
  }
}
/* ---------- the catch, as a little sequence ----------
   whips the apron off → marches over → TWANG → doubles up laughing        */
let catchAnim = null, apronFall = null;

function updateCatch(dt){
  const ca = catchAnim; if(!ca) return;
  ca.t += dt;
  washer.facing = 1; washer.turnT = 1;

  // 1. off comes the apron
  if(ca.t > 0.28 && !ca.dropped){
    ca.dropped = true; washer.apronOff = true;
    apronFall = {x: washer.x, y: washer.y - 40, vy: -40, vx:(Math.random()-.5)*40,
                 rot: 0, vr: 2.2, ground: washer.y + 4};
    tone(300,0.12,"triangle",0.10,180);
  }
  // 2. marches over to the culprit
  if(ca.t < 0.95){
    const tx = sneaker.x + (washer.x > sneaker.x ? 40*SC : -40*SC);
    const ty = sneaker.y - 4;
    washer.x += (tx - washer.x) * Math.min(1, dt*5.5);
    washer.y += (ty - washer.y) * Math.min(1, dt*5.5);
    washer.moving = true; washer.walk += dt*11;
  } else washer.moving = false;

  // 3. TWANG
  if(ca.t > 0.95 && !ca.snapped){
    ca.snapped = true;
    snapFx = 1; shake = 0.6;
    sneaker.squeal = 2.0; sneaker.hop = 1.7;
    for(let i=0;i<18;i++) sparks.push({x:sneaker.x,y:sneaker.y-46,vx:(Math.random()-.5)*300,vy:-Math.random()*180-30,life:0.7,col:"#ffd93d"});
    S.snap(); setTimeout(()=>S.ow(), 140);
    dropAPeg();
  }
  // 4. cracks up
  if(ca.t > 1.35){
    ca.laugh = Math.min(1, ca.laugh + dt*3);
    if(!ca.laughed){ ca.laughed = true; S.laugh(); }
    if(Math.random() < 0.05) hearts.push({x:washer.x+(Math.random()-.5)*50, y:washer.y-110, vy:-34, life:1.1});
  }
}

// the twang shakes one of the pegs clean off — there goes a point
function dropAPeg(){
  if(washer.pegsOn.length === 0) return;
  const lost = washer.pegsOn.pop();
  fallers.push({
    x: washer.x + lost.ox, y: washer.y + lost.oy,
    vx: (Math.random()-0.5)*120 + (sneaker.x>washer.x?-40:40), vy: -90,
    rot: lost.rot, vr: (Math.random()-0.5)*12, col: lost.col,
    ground: washer.y + 6 + Math.random()*10
  });
  setTimeout(()=>{ tone(520,0.10,"square",0.12,300); }, 420);
}

function getCaught(){
  scene = "caught"; sceneT = 0;
  catchAnim = {t:0, dropped:false, snapped:false, laugh:0, laughed:false};
  msg = sneaker===cushla ? "UNDIE SNAP! 😖" : "UNDIE SNAP! You got him! 😄";
  sub = sneaker===cushla
      ? "Caught you! Shonty grabbed the elastic of your undies, stretched it right out and — TWANG — let it go. \"OW!\""
      : "Got him! You grabbed the elastic of Shonty's undies, pulled it way out and — TWANG — let go. \"OW!\"";

  if(washer.pegsOn.length > 0){
    sub += (sneaker===cushla ? " And one of your pegs pinged right off him."
                             : " And one of his pegs pinged right off you.");
  }
}

function updatePlay(dt){
  // when it's YOUR turn on the dishes, hold to spin round
  if(humanWatch()) peekHeld = down(" ") || stick.on;
  updateLook(dt);

  // Watchdog: on HIS turn you have limited agency, so if he somehow fails to
  // make progress we hand the turn back rather than leave you stuck at a sink.
  turnT += dt;
  if(humanWatch() && turnT > 40){
    scene = "roundwin"; sceneT = 0; turnPegs = PER_TURN;
    msg = "Shonty gave up!";
    sub = "He got bored of creeping about and wandered off. Your turn to sneak.";
    return;
  }

  // ----- movement -----
  const SPD = PORTRAIT ? 250 : 168;      // longer room, longer stride
  let mx=0, my=0, throttle=1;
  if(humanTurn()){
    if(down("arrowleft","a")) mx-=1;
    if(down("arrowright","d")) mx+=1;
    if(down("arrowup","w")) my-=1;
    if(down("arrowdown","s")) my+=1;
    if(!mx && !my && stick.mag > 0){     // swipe / drag steering
      mx = stick.dx; my = stick.dy; throttle = 0.34 + stick.mag*0.66;
    }
    if((down(" ") || tapPeg>0) && inPegRange() && !isWatching()){ tapPeg = 0; placePeg(); return; }
  } else {
    const ai = aiMove(dt); mx = ai.x; my = ai.y;
    if(ai.peg){ placePeg(); return; }
    throttle = AI_SPEED;               // he creeps rather than marches
  }
  const len = Math.hypot(mx,my) || 1;
  sneaker.vx = mx/len*SPD*throttle; sneaker.vy = my/len*SPD*throttle;
  sneaker.moving = (mx||my) ? true : false;
  if(mx) sneaker.dir = mx>0 ? 1 : -1;

  moveWithCollision(sneaker, sneaker.vx*dt, sneaker.vy*dt);

  if(sneaker.moving){
    const was = Math.floor(sneaker.walk);
    sneaker.walk += dt*9;
    if(Math.floor(sneaker.walk)!==was && Math.floor(sneaker.walk)%2===0) S.step();
  } else sneaker.walk += dt*0.6;

  // ----- back at the basket? grab a fresh peg -----
  if(!sneaker.hasPeg && atPegBox()) reload();

  // ----- the rule: while he's looking, be STILL or be HIDDEN -----
  if(graceT > 0) graceT -= dt;
  const hide = hiddenAt(sneaker.x, sneaker.y);
  sneaker.hidden = !!hide;
  if(graceT <= 0 && lookLanded() && sneaker.moving && !hide){ getCaught(); return; }
}

/* ---------- Shonty's AI sneak ----------
   He should look like he's SNEAKING, not marching: he creeps in short dashes
   between hiding pockets and pauses in cover to see if you'll turn. And he's
   deliberately slow to react when you do spin round — that reaction window is
   your whole chance of catching him, so it must be generous.               */
let aiBurst = 0;        // >0: currently dashing
let aiRest  = 0;        // >0: currently holding still
let aiCover = null;     // the pocket he's making for
let aiWatchT = 0;       // how long you've been looking at him
let aiWind = 0;         // winding up to clip a peg on
let aiSinceWatch = 0;   // how long since you last looked — he breaks cover then
let graceT = 0;         // no catches for a moment as a turn opens
let turnT = 0;          // how long the current turn has run
let aiPatience = 0;     // how long he's been holding back waiting for an opening
let aiPatienceMax = 2;  // …after which he chances it anyway

function nearestCover(){
  let best=null, bd=1e9;
  for(const f of FURNITURE){
    const cx=f.hide.x+f.hide.w/2, cy=f.hide.y+f.hide.h/2;
    // only cover that's actually on the way — nearer the sink than he is
    if(cy > sneaker.y + 20*SC) continue;
    const d = Math.hypot(cx-sneaker.x, cy-sneaker.y);
    if(d<bd){ bd=d; best={x:cx,y:cy,d}; }
  }
  return best;
}

function aiMove(dt){
  if(aiPause>0){ aiPause -= dt; return {x:0,y:0,peg:false}; }

  const watching = isWatching();
  const hide = hiddenAt(sneaker.x, sneaker.y);
  const goal = sneaker.hasPeg ? {x:washer.x, y:washer.y+58*SC} : {x:PEGBOX.x, y:PEGBOX.y};

  // --- you're looking at him ---
  if(watching){
    aiWatchT += dt; aiSinceWatch = 0;
    aiWind = 0;
    if(hide) return {x:0,y:0,peg:false};       // safe in cover, just waits
    // REACTION WINDOW: he carries on for a beat before he notices you turned
    if(aiWatchT < aiReact){
      const d = navTo(sneaker.x, sneaker.y, goal.x, goal.y);
      return {x:d.x, y:d.y, peg:false};
    }
    return {x:0,y:0,peg:false};                // rumbled — freezes
  }
  aiWatchT = 0;

  // --- clipping a peg on takes a moment, so you can see it happening ---
  if(inPegRange()){
    aiWind += dt;
    if(aiWind > 0.28){ aiWind = 0; return {x:0,y:0,peg:true}; }
    return {x:0,y:0,peg:false};
  }
  aiWind = 0;

  // --- he watches your meter: won't commit to the last few steps while
  //     you've still got plenty of puff left to spin round with.
  //     BUT his patience is finite — otherwise a player who simply never
  //     looks would leave him waiting forever and the turn would deadlock. ---
  if(humanWatch() && sneaker.hasPeg){
    const close = Math.hypot(sneaker.x-washer.x, sneaker.y-washer.y) < 150*SC;
    if(close && peekE > 0.62 && !hide && aiPatience < aiPatienceMax){
      aiPatience += dt;
      aiRest = Math.max(aiRest, 0.25);
      return {x:0,y:0,peg:false};
    }
  }
  if(aiPatience >= aiPatienceMax) aiPatience = aiPatienceMax;   // committed now

  // --- creep in dashes, resting in cover between them ---
  aiSinceWatch += dt;
  if(aiRest > 0){
    aiRest -= dt;
    if(aiRest <= 0){ aiBurst = 0.75 + Math.random()*0.95; aiCover = null; }
    return {x:0,y:0,peg:false};
  }
  if(aiBurst <= 0){
    // he watches YOUR rhythm: breaks cover just after you turn back to the sink
    if(aiSinceWatch < 0.28 && Math.random() < 0.7){ return {x:0,y:0,peg:false}; }
    // pick the next hop: a hiding pocket on the way, or straight on
    const cover = nearestCover();
    aiCover = (cover && cover.d < 190*SC && !hide && Math.random() < 0.62) ? cover : null;
    aiBurst = 0.75 + Math.random()*0.95;
  }
  aiBurst -= dt;
  const tgt = aiCover || goal;
  const d = navTo(sneaker.x, sneaker.y, tgt.x, tgt.y);
  // reached the pocket he was making for? settle in and wait
  if(aiCover && Math.hypot(aiCover.x-sneaker.x, aiCover.y-sneaker.y) < 26*SC){
    aiCover = null; aiBurst = 0; aiRest = 0.45 + Math.random()*0.9;
    return {x:0,y:0,peg:false};
  }
  if(aiBurst <= 0){ aiRest = 0.35 + Math.random()*0.7; }
  return {x:d.x, y:d.y, peg:false};
}
