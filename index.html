function drawRoom(t){
  const cTop = FLOOR_TOP - 58;              // counter top
  // wall
  const g = ctx.createLinearGradient(0,0,0,FLOOR_TOP);
  if(FANCY){ g.addColorStop(0,"#d8f2ff"); g.addColorStop(0.6,"#a9e0f7"); g.addColorStop(1,"#8ccbe8"); }
  else { g.addColorStop(0,"#bfe9ff"); g.addColorStop(1,"#8fd6f5"); }
  ctx.fillStyle=g; ctx.fillRect(0,0,W,FLOOR_TOP);
  if(FANCY){
    // wallpaper stripes, and a tiled splashback above the counter
    ctx.fillStyle="rgba(255,255,255,.16)";
    for(let x=0; x<W; x+=34) ctx.fillRect(x, 0, 16, cTop);
    const tileTop = Math.max(0, cTop-46);
    ctx.fillStyle="rgba(255,255,255,.55)"; ctx.fillRect(0,tileTop,W,46);
    ctx.strokeStyle="rgba(140,180,200,.45)"; ctx.lineWidth=1.5;
    ctx.beginPath();
    for(let x=0;x<=W;x+=23){ ctx.moveTo(x,tileTop); ctx.lineTo(x,cTop); }
    ctx.moveTo(0,tileTop+23); ctx.lineTo(W,tileTop+23);
    ctx.moveTo(0,tileTop); ctx.lineTo(W,tileTop);
    ctx.stroke();
  }
  // window — on a phone it sits below the scoreboard band and status strip,
  // and shrinks to fit rather than growing into the counter
  const wy = PORTRAIT ? HUD_H + 46*SC : 18;
  const ww = Math.min(240, W*0.52), wh = cTop - wy - 10, wx = W/2-ww/2;
  if(wh >= 42){
    ctx.fillStyle="#fff9e6"; roundRect(wx,wy,ww,wh,10,true,false);
    const gx=wx+8, gy=wy+8, gw=ww-16, gh=wh-16;
    if(FANCY){
      // a garden out there: sky, hills, a tree, and the sun
      ctx.save();
      ctx.beginPath(); roundRect(gx,gy,gw,gh,7,false,false); ctx.clip();
      const sky = ctx.createLinearGradient(0,gy,0,gy+gh);
      sky.addColorStop(0,"#9ad9ff"); sky.addColorStop(0.62,"#cdefff"); sky.addColorStop(0.63,"#8fcf72");
      sky.addColorStop(1,"#5faa50");
      ctx.fillStyle=sky; ctx.fillRect(gx,gy,gw,gh);
      const sunR = Math.min(16, gh*0.2);
      ctx.fillStyle="rgba(255,246,180,.95)";
      ctx.beginPath(); ctx.arc(gx+gw*0.24, gy+gh*0.26, sunR, 0, 7); ctx.fill();
      ctx.fillStyle="rgba(255,246,180,.35)";
      ctx.beginPath(); ctx.arc(gx+gw*0.24, gy+gh*0.26, sunR*1.7, 0, 7); ctx.fill();
      ctx.fillStyle="rgba(255,255,255,.85)";
      for(let i=0;i<3;i++){
        const cx2 = gx + ((t*7 + i*70) % (gw+50)) - 25;
        ctx.beginPath(); ctx.arc(cx2, gy+gh*0.22+i*7, 11-i*2, 0, 7);
        ctx.arc(cx2+12, gy+gh*0.22+i*7, 8-i, 0, 7); ctx.fill();
      }
      // out it comes after she gives him the flower, and stays for the match
      if(rainbow > 0){
        ctx.save();
        ctx.globalAlpha = rainbow*0.8;
        const rcx = gx+gw*0.46, rcy = gy+gh*0.74, band = Math.max(2.2, gh*0.042);
        ctx.lineWidth = band;
        ["#ff5d73","#ff9f45","#ffd93d","#8ce99a","#5ec8ff","#c77dff"].forEach((c,i)=>{
          ctx.strokeStyle = c;
          ctx.beginPath();
          ctx.arc(rcx, rcy, gw*0.40 - i*band, Math.PI, 0);
          ctx.stroke();
        });
        ctx.restore();
      }
      // a tree, leaning gently in the breeze
      const tx2 = gx+gw*0.74, ty2 = gy+gh*0.63, sway = Math.sin(t*0.9)*2;
      ctx.strokeStyle="#8a5a34"; ctx.lineWidth=5; ctx.lineCap="round";
      ctx.beginPath(); ctx.moveTo(tx2,ty2+14); ctx.quadraticCurveTo(tx2+sway,ty2-4,tx2+sway*1.5,ty2-14); ctx.stroke();
      ctx.fillStyle="#57a24a";
      ctx.beginPath(); ctx.arc(tx2+sway*1.5, ty2-22, 15, 0, 7);
      ctx.arc(tx2+sway*1.5-11, ty2-15, 10, 0, 7); ctx.arc(tx2+sway*1.5+11, ty2-15, 10, 0, 7); ctx.fill();
      ctx.fillStyle="rgba(255,255,255,.16)"; ctx.fillRect(gx,gy,gw,gh*0.5);   // glass sheen
      ctx.restore();
    } else {
      ctx.fillStyle="#a8e6ff"; roundRect(gx,gy,gw,gh,7,true,false);
      const sunR = Math.min(20, wh*0.24);
      ctx.fillStyle="#ffe98a"; ctx.beginPath(); ctx.arc(wx+ww*0.29,wy+wh*0.40,sunR,0,7); ctx.fill();
      ctx.fillStyle="#fff";
      for(let i=0;i<3;i++){
        ctx.beginPath();
        ctx.arc(wx+ww*0.58+i*24, wy+wh*0.46+Math.sin(t*0.6+i)*4, Math.min(15-i*2, wh*0.2), 0, 7);
        ctx.fill();
      }
    }
    ctx.strokeStyle="#fff"; ctx.lineWidth=7;
    ctx.beginPath();
    ctx.moveTo(wx+ww/2,wy+4); ctx.lineTo(wx+ww/2,wy+wh-4);
    ctx.moveTo(wx+4,wy+wh/2); ctx.lineTo(wx+ww-4,wy+wh/2); ctx.stroke();
    if(FANCY){
      // gingham curtains tied back either side
      for(const side of [-1, 1]){
        const cxx = side<0 ? wx-4 : wx+ww+4;
        ctx.save(); ctx.translate(cxx, wy-2);
        ctx.fillStyle="#ffd3dd";
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.quadraticCurveTo(side*26, wh*0.30, side*14, wh*0.62);
        ctx.quadraticCurveTo(side*6, wh*0.85, side*20, wh+2);
        ctx.lineTo(0, wh+2); ctx.closePath(); ctx.fill();
        ctx.strokeStyle="rgba(255,255,255,.55)"; ctx.lineWidth=2;
        for(let i=1;i<4;i++){
          ctx.beginPath(); ctx.moveTo(side*i*4, 0);
          ctx.quadraticCurveTo(side*(i*4+16), wh*0.4, side*(i*3+8), wh+2); ctx.stroke();
        }
        ctx.restore();
      }
      ctx.fillStyle="#e8b0be"; ctx.fillRect(wx-10, wy-8, ww+20, 8);   // curtain rail
    }
  }
  // bunting (desktop only — on a phone that strip belongs to the scoreboard)
  if(!PORTRAIT){
    const flags = Math.ceil(W/62);
    for(let i=0;i<flags;i++){
      const x=i*62+14, y=6+Math.sin(i*0.9)*5;
      ctx.fillStyle=["#ff6b81","#ffd93d","#6bcB77","#4d96ff","#c77dff"][i%5];
      ctx.beginPath(); ctx.moveTo(x-14,y); ctx.lineTo(x+14,y); ctx.lineTo(x,y+24); ctx.closePath(); ctx.fill();
    }
  }
  // the light switch, on the wall down the quiet end of the bench
  ctx.fillStyle="rgba(0,0,0,.10)";
  roundRect(SWITCH_X-10, SWITCH_Y-11, 22, 30, 5, true, false);
  ctx.fillStyle="#f6f1e8"; roundRect(SWITCH_X-11, SWITCH_Y-13, 22, 30, 5, true, false);
  ctx.fillStyle="#e2dacd"; roundRect(SWITCH_X-8, SWITCH_Y-10, 16, 24, 3, true, false);
  ctx.fillStyle = discoT>0 ? "#b9ae9c" : "#fffdf9";      // the rocker, up or down
  roundRect(SWITCH_X-5.5, SWITCH_Y + (discoT>0 ? 1 : -8), 11, 11, 2, true, false);

  // counter + sink
  const sx = washerSinkX();
  ctx.fillStyle="#f3d9b8"; ctx.fillRect(0,cTop,W,58);
  if(FANCY){
    // butcher-block worktop: grain, a lit front edge, and cupboards below
    ctx.strokeStyle="rgba(160,110,60,.16)"; ctx.lineWidth=1.5;
    ctx.beginPath();
    for(let i=0;i<9;i++){
      const yy = cTop + 5 + i*5.5;
      ctx.moveTo(0,yy);
      for(let x=0;x<W;x+=44) ctx.quadraticCurveTo(x+22, yy+(i%2?1.6:-1.6), x+44, yy);
    }
    ctx.stroke();
    const cg = ctx.createLinearGradient(0,cTop,0,cTop+58);
    cg.addColorStop(0,"rgba(255,255,255,.35)"); cg.addColorStop(0.45,"rgba(255,255,255,0)");
    cg.addColorStop(1,"rgba(120,70,30,.20)");
    ctx.fillStyle=cg; ctx.fillRect(0,cTop,W,58);
    ctx.fillStyle="rgba(255,255,255,.45)"; ctx.fillRect(0,cTop,W,3);
  }
  ctx.fillStyle="#e2bd91"; ctx.fillRect(0,FLOOR_TOP-10,W,10);
  ctx.fillStyle="#cfd8e3"; roundRect(sx-92,cTop+6,184,44,8,true,false);
  ctx.fillStyle="#9fd7f2"; roundRect(sx-84,cTop+12,168,34,6,true,false);
  // --- dishes in the sink ---
  ctx.save();
  ctx.beginPath(); roundRect(sx-84,cTop+12,168,34,6,false,false); ctx.clip();
  ctx.fillStyle="#eef4f8"; ctx.strokeStyle="#c3d2dd"; ctx.lineWidth=3;
  [[-56,20,0.32],[-34,15,-0.22],[46,18,0.16]].forEach(([dx,r,rot])=>{   // plates on edge
    ctx.save(); ctx.translate(sx+dx, cTop+34); ctx.rotate(rot);
    ctx.beginPath(); ctx.ellipse(0,0,r*0.42,r,0,0,7); ctx.fill(); ctx.stroke(); ctx.restore();
  });
  ctx.fillStyle="#ffd9e0";                                              // a mug
  roundRect(sx+8,cTop+18,20,18,4,true,false);
  ctx.strokeStyle="#ffb3c1"; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(sx+31,cTop+27,7,-1.2,1.2); ctx.stroke();
  ctx.fillStyle="#cfe9a8"; roundRect(sx-14,cTop+22,16,14,3,true,false); // a little bowl
  // foam on the water
  ctx.fillStyle="rgba(255,255,255,.95)";
  for(let i=0;i<16;i++){
    const fx = sx-80 + i*10.5, fr = 7 + ((i*53)%9);
    ctx.beginPath(); ctx.arc(fx, cTop+16 + Math.sin(t*1.6+i)*1.6, fr*0.62, 0, 7); ctx.fill();
  }
  ctx.restore();
  ctx.strokeStyle="#b9c4d1"; ctx.lineWidth=6; ctx.beginPath();
  ctx.moveTo(sx,cTop+6); ctx.lineTo(sx,cTop-20);
  ctx.arc(sx-16,cTop-20,16,0,Math.PI,true); ctx.stroke();
  // draining rack of clean plates beside the sink
  ctx.save();
  const rx = sx + 118;
  ctx.fillStyle="#eef4f8"; ctx.strokeStyle="#c3d2dd"; ctx.lineWidth=3;
  for(let i=0;i<3;i++){
    ctx.beginPath(); ctx.ellipse(rx+i*15, cTop+26, 5, 19, 0.06, 0, 7); ctx.fill(); ctx.stroke();
  }
  ctx.strokeStyle="#9fb3c4"; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(rx-14,cTop+46); ctx.lineTo(rx+44,cTop+46); ctx.stroke();
  ctx.restore();
  // He kept it. Her flower stands in a glass of water on the bench for the
  // rest of the match, same as the rainbow — the kitchen remembers.
  if(flowerGiven){
    const fgx = sx - 132, fgb = cTop + 50;
    ctx.save();
    ctx.strokeStyle="#5ea45f"; ctx.lineWidth=2.4; ctx.lineCap="round";
    ctx.beginPath();
    ctx.moveTo(fgx, fgb-14);
    ctx.quadraticCurveTo(fgx-4, fgb-32, fgx+1 + Math.sin(t*1.1)*1.2, fgb-42);
    ctx.stroke(); ctx.lineCap="butt";
    ctx.fillStyle="#5ea45f";
    ctx.beginPath(); ctx.ellipse(fgx-7, fgb-27, 6, 2.8, -0.5, 0, 7); ctx.fill();
    const bx2 = fgx+1 + Math.sin(t*1.1)*1.2, by2 = fgb-42;
    ctx.fillStyle="#ffd93d";
    for(let i=0;i<5;i++){
      const a = i*Math.PI*2/5;
      ctx.beginPath(); ctx.arc(bx2+Math.cos(a)*5, by2+Math.sin(a)*5, 4.2, 0, 7); ctx.fill();
    }
    ctx.fillStyle="#fff6c9"; ctx.beginPath(); ctx.arc(bx2, by2, 3, 0, 7); ctx.fill();
    // the glass goes over the stem, so it reads as standing in the water
    ctx.fillStyle="rgba(214,238,248,.60)"; roundRect(fgx-8, fgb-17, 16, 17, 3, true, false);
    ctx.fillStyle="rgba(140,200,232,.70)"; roundRect(fgx-7, fgb-9,  14,  8, 2, true, false);
    ctx.strokeStyle="rgba(255,255,255,.9)"; ctx.lineWidth=1.6;
    roundRect(fgx-8, fgb-17, 16, 17, 3, false, true);
    ctx.restore();
  }
  // floor
  const cols = Math.ceil(W/70), rows = Math.ceil((H-FLOOR_TOP)/50);
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    ctx.fillStyle = ((r+c)%2) ? "#ffe6c9" : "#ffd4a8";
    ctx.fillRect(c*70, FLOOR_TOP + r*50, 70, 50);
  }
  ctx.fillStyle="rgba(255,255,255,.18)"; ctx.fillRect(0,FLOOR_TOP,W,H-FLOOR_TOP);

  // Cupboards under the bench. The worktop used to just stop, with the floor
  // running straight up to meet it, so the whole bench looked like it was
  // floating. This band is above the walk line, so nobody stands on it.
  const cupH = 48*SC, cupY = FLOOR_TOP;
  ctx.fillStyle = "#cfa878"; ctx.fillRect(0, cupY, W, cupH);          // carcass
  ctx.fillStyle = "rgba(90,56,22,.30)"; ctx.fillRect(0, cupY, W, 4*SC); // worktop lip
  const doors = Math.max(3, Math.round(W/(104*SC))), dw = W/doors;
  for(let i=0;i<doors;i++){
    const x = i*dw;
    ctx.fillStyle = "#e5c193";                                        // door
    roundRect(x+4*SC, cupY+8*SC, dw-8*SC, cupH-16*SC, 4*SC, true, false);
    ctx.fillStyle = "#f0d3ac";                                        // sunken panel
    roundRect(x+11*SC, cupY+14*SC, dw-22*SC, cupH-28*SC, 3*SC, true, false);
    ctx.strokeStyle = "rgba(120,80,40,.30)"; ctx.lineWidth = 1.4;
    roundRect(x+11*SC, cupY+14*SC, dw-22*SC, cupH-28*SC, 3*SC, false, true);
    ctx.fillStyle = "#8a6a44";                                        // handle
    roundRect(x+dw-19*SC, cupY+19*SC, 10*SC, 3.4*SC, 1.7*SC, true, false);
  }
  ctx.fillStyle = "rgba(90,56,22,.30)";                               // kick plinth
  ctx.fillRect(0, cupY+cupH-5*SC, W, 5*SC);

  if(FANCY){
    // grout lines give the tiles some bite
    ctx.strokeStyle="rgba(150,100,60,.10)"; ctx.lineWidth=1;
    ctx.beginPath();
    for(let c=0;c<=cols;c++){ ctx.moveTo(c*70,FLOOR_TOP); ctx.lineTo(c*70,H); }
    for(let r=0;r<=rows;r++){ ctx.moveTo(0,FLOOR_TOP+r*50); ctx.lineTo(W,FLOOR_TOP+r*50); }
    ctx.stroke();
    // polished sheen sliding down the floor
    const gl = ctx.createLinearGradient(0,FLOOR_TOP,0,H);
    gl.addColorStop(0,"rgba(255,255,255,.30)");
    gl.addColorStop(0.35,"rgba(255,255,255,.06)");
    gl.addColorStop(1,"rgba(120,70,30,.10)");
    ctx.fillStyle=gl; ctx.fillRect(0,FLOOR_TOP,W,H-FLOOR_TOP);
    // skirting board where wall meets floor
    ctx.fillStyle="#f5e2c8"; ctx.fillRect(0,FLOOR_TOP-6,W,7);
    ctx.fillStyle="rgba(150,100,60,.22)"; ctx.fillRect(0,FLOOR_TOP+1,W,3);
  }
}
function washerSinkX(){ return W/2; }

/* ---------- atmosphere ----------
   Drawn OVER the scene: a shaft of sun from the window with dust turning in
   it, steam off the hot water, and a warm vignette to pull it all together. */
let dust = [], steam = [];
function seedAtmosphere(){
  dust = []; steam = [];
  for(let i=0;i<26;i++) dust.push({
    x: Math.random()*W, y: FLOOR_TOP + Math.random()*(H-FLOOR_TOP),
    r: 0.8 + Math.random()*1.9, ph: Math.random()*7, sp: 0.15 + Math.random()*0.5
  });
}
function updateAtmosphere(dt){
  if(!FANCY) return;
  for(const d of dust){
    d.y -= d.sp*10*dt; d.ph += dt*0.7;
    if(d.y < FLOOR_TOP-10){ d.y = H + 8; d.x = Math.random()*W; }
  }
  if(steam.length < 14 && Math.random() < 0.35){
    steam.push({x: washerSinkX() + (Math.random()-0.5)*120, y: FLOOR_TOP-70,
                r: 6+Math.random()*10, life: 1, vy: -16-Math.random()*14, vx:(Math.random()-.5)*9});
  }
  for(let i=steam.length-1;i>=0;i--){
    const s2 = steam[i];
    s2.y += s2.vy*dt; s2.x += s2.vx*dt; s2.r += dt*9; s2.life -= dt*0.42;
    if(s2.life <= 0) steam.splice(i,1);
  }
}
/* Soft morning light on the FLOOR — drawn early, underneath the characters,
   so it can never wash out a speech bubble or a label the way an overlay did. */
function drawSunbeam(){
  if(!FANCY) return;
  const ww = Math.min(240, W*0.52), wx = W/2-ww/2;
  const wy = PORTRAIT ? HUD_H + 46*SC : 18;
  ctx.save();
  const g = ctx.createLinearGradient(wx, wy, wx+ww*0.4, H);
  g.addColorStop(0,"rgba(255,244,206,.13)");
  g.addColorStop(0.45,"rgba(255,238,190,.055)");
  g.addColorStop(1,"rgba(255,232,175,0)");
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(wx+6, wy+8); ctx.lineTo(wx+ww-6, wy+8);
  ctx.lineTo(wx+ww*1.35, H); ctx.lineTo(wx-ww*0.30, H);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}
// dust is the one bit worth keeping in front — it's tiny and reads as air
function drawDust(){
  if(!FANCY) return;
  const ww = Math.min(240, W*0.52), wx = W/2-ww/2;
  ctx.save();
  for(const d of dust){
    if(d.x < wx-ww*0.30 || d.x > wx+ww*1.35) continue;
    ctx.globalAlpha = 0.10 + Math.sin(d.ph)*0.07;
    ctx.fillStyle = "#fff8e2";
    ctx.beginPath(); ctx.arc(d.x + Math.sin(d.ph)*5, d.y, d.r*0.8, 0, 7); ctx.fill();
  }
  ctx.restore();
}
function drawSteam(){
  if(!FANCY) return;
  ctx.save();
  for(const s2 of steam){
    ctx.globalAlpha = Math.max(0, s2.life)*0.20;
    ctx.fillStyle = "#ffffff";
    ctx.beginPath(); ctx.arc(s2.x, s2.y, s2.r, 0, 7); ctx.fill();
  }
  ctx.restore();
}
/* Just a gentle vignette. The warm "overlay" wash that used to be here
   flattened contrast across the whole screen and made text hard to read. */
function drawGrade(){
  if(!FANCY) return;
  ctx.save();
  const v = ctx.createRadialGradient(W/2, H*0.48, Math.min(W,H)*0.34, W/2, H*0.5, Math.max(W,H)*0.75);
  v.addColorStop(0,"rgba(60,30,10,0)");
  v.addColorStop(1,"rgba(60,30,10,.16)");
  ctx.fillStyle = v; ctx.fillRect(0,0,W,H);
  ctx.restore();
}

/* ---------- the cat tree ----------
   Drawn from the foot of the post and rotated about it, so the whole thing —
   post, pom-pom, platform and cat — leans as one piece as the minute runs out. */
function drawCatTree(){
  const tilt = cat.lean + cat.wob;
  // how far she's finished landing: once down, she rights herself and sits up
  const settle = catFall ? Math.min(1, Math.max(0, (catFall.t-0.45)/0.40)) : 0;
  const u = inMatch() && !catFall ? 1 - Math.max(0, turnClock)/TURN_TIME : (catFall?1:0);

  ctx.save();
  // the canopy shadow swings out across the floor as the tree goes over
  ctx.fillStyle = "rgba(120,70,30,.15)";
  ctx.beginPath();
  ctx.ellipse(CATTREE.x + Math.sin(tilt)*96*SC, CATTREE.y + 4*SC,
              (30 + Math.sin(tilt)*34)*SC, 11*SC, 0, 0, 7);
  ctx.fill();

  ctx.translate(CATTREE.x, CATTREE.y);
  ctx.rotate(tilt);
  // everything below is authored at 430px-phone size, like the rest of the room,
  // so she stays in proportion — and still lands on the basket — at any size
  ctx.scale(SC, SC);

  // base slab
  ctx.fillStyle="#8b5e3c"; roundRect(-32,-13,64,17,6,true,false);
  ctx.fillStyle="#a5744d"; roundRect(-30,-16,60,10,5,true,false);

  // the post, wrapped in sisal rope
  ctx.fillStyle="#c9a06a"; roundRect(-9,-96,18,84,5,true,false);
  ctx.strokeStyle="rgba(150,110,60,.5)"; ctx.lineWidth=2;
  for(let i=0;i<11;i++){
    const y = -92 + i*7.6;
    ctx.beginPath(); ctx.moveTo(-9,y); ctx.lineTo(9,y+3); ctx.stroke();
  }
  // a strained little bend shows in the post near the top
  if(u > 0.5){
    ctx.fillStyle = "rgba(90,55,25,"+((u-0.5)*0.30)+")";
    roundRect(-9,-96,6,84,5,true,false);
  }

  // pom-pom on a string, swinging against the lean
  ctx.save();
  ctx.translate(15,-90); ctx.rotate(-tilt + Math.sin(T*2.2)*0.22);
  ctx.strokeStyle="#b98741"; ctx.lineWidth=1.6;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,20); ctx.stroke();
  ctx.fillStyle="#ff8fab"; ctx.beginPath(); ctx.arc(0,26,6,0,7); ctx.fill();
  ctx.fillStyle="rgba(255,255,255,.45)"; ctx.beginPath(); ctx.arc(-2,24,2.2,0,7); ctx.fill();
  ctx.restore();

  // the top platform she's asleep on
  ctx.fillStyle="#8b5e3c"; roundRect(-31,-108,62,13,5,true,false);
  ctx.fillStyle="#a5744d"; roundRect(-30,-111,60,8,4,true,false);

  // and the cat — she rights herself as she lands, because of course she does
  ctx.save();
  ctx.translate(0,-111);
  ctx.rotate(-tilt*settle);
  drawCat(u, settle);
  ctx.restore();

  ctx.restore();
}

/* Beanbags herself: very grey, very fat, very asleep, white belly and face. */
function drawCat(u, settle){
  const purring = cat.purr > 0;
  // she breathes slowly, and buzzes when she's being fussed over
  const breathe = Math.sin(T*1.7)*1.1 + (purring ? Math.sin(T*24)*0.8 : 0);
  const grey = "#9aa1a9", greyD = "#7f868e", cream = "#f4f6f8";
  ctx.save();

  // tail, curled right round the front of her
  ctx.strokeStyle = grey; ctx.lineWidth = 9; ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(-28,-8);
  ctx.quadraticCurveTo(-40,-2 + Math.sin(T*1.5)*2, -22,2 + Math.sin(T*1.5)*3);
  ctx.quadraticCurveTo(-8,5, 4,1);
  ctx.stroke();
  ctx.strokeStyle = cream; ctx.lineWidth = 8;
  ctx.beginPath(); ctx.moveTo(-2,2); ctx.lineTo(4,1); ctx.stroke();
  ctx.lineCap = "butt";

  // the loaf — enormous
  ctx.fillStyle = grey;
  ctx.beginPath(); ctx.ellipse(-2,-20+breathe*0.2, 36, 20+breathe*0.35, 0,0,7); ctx.fill();
  ctx.fillStyle = greyD;                    // a soft shade along her back
  ctx.beginPath(); ctx.ellipse(-6,-30, 26, 8, -0.06, 0,7); ctx.fill();

  // white belly, spilling over the edge of the platform
  ctx.fillStyle = cream;
  ctx.beginPath(); ctx.ellipse(0,-11+breathe*0.3, 28, 11, 0,0,7); ctx.fill();
  // front paws tucked under her chin
  ctx.beginPath(); ctx.ellipse(14,-5, 9, 5, 0,0,7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(1,-4, 9, 5, 0,0,7); ctx.fill();

  // head
  ctx.save();
  ctx.translate(24,-34+breathe*0.3);
  ctx.rotate(purring ? Math.sin(T*3)*0.05 : Math.sin(T*0.8)*0.02);
  // ears
  ctx.fillStyle = grey;
  ctx.beginPath(); ctx.moveTo(-13,-9); ctx.lineTo(-16,-22); ctx.lineTo(-3,-14); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo( 9,-13); ctx.lineTo(13,-24); ctx.lineTo(16,-10); ctx.closePath(); ctx.fill();
  ctx.fillStyle = "#f0a9b8";
  ctx.beginPath(); ctx.moveTo(-12,-11); ctx.lineTo(-14,-19); ctx.lineTo(-6,-14); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(10,-14); ctx.lineTo(12,-21); ctx.lineTo(14,-12); ctx.closePath(); ctx.fill();
  // fat cheeks
  ctx.fillStyle = grey;
  ctx.beginPath(); ctx.ellipse(0,0, 17, 15, 0,0,7); ctx.fill();
  // white face
  ctx.fillStyle = cream;
  ctx.beginPath(); ctx.ellipse(1,3, 14, 12, 0,0,7); ctx.fill();

  // eyes. Fast asleep, until the post starts really going — then one eye
  // opens — and once she's landed she looks around, entirely unbothered.
  const wide = settle;
  ctx.strokeStyle = "#4a4f55"; ctx.lineWidth = 2; ctx.lineCap = "round";
  const eye = (ex, open) => {
    if(open > 0.15){
      ctx.fillStyle = "#3c4147";
      ctx.beginPath(); ctx.ellipse(ex,-1, 2.6, 3.4*open, 0,0,7); ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(ex, -3, 4.2, 0.35, Math.PI-0.35); ctx.stroke();
    }
  };
  eye(-6, Math.max(wide, u > 0.84 ? (u-0.84)/0.16 : 0));   // the one that cracks open
  eye( 8, wide);
  // nose and a mouth that curls up when she's fussed
  ctx.fillStyle = "#f0a9b8";
  ctx.beginPath(); ctx.moveTo(1,3); ctx.lineTo(5,3); ctx.lineTo(3,6); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = "#8d939a"; ctx.lineWidth = 1.6;
  ctx.beginPath(); ctx.arc(0, 6 - cat.smile*1.5, 4 + cat.smile*1.6, 0.15, Math.PI-0.15); ctx.stroke();
  ctx.beginPath(); ctx.arc(7, 6 - cat.smile*1.5, 4 + cat.smile*1.6, 0.15, Math.PI-0.15); ctx.stroke();
  // whiskers
  ctx.strokeStyle = "rgba(255,255,255,.85)"; ctx.lineWidth = 1.4;
  for(let i=-1;i<2;i++){
    ctx.beginPath(); ctx.moveTo(-6,3+i*3); ctx.lineTo(-22,1+i*5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(10,3+i*3); ctx.lineTo(25,1+i*5); ctx.stroke();
  }
  ctx.lineCap = "butt";
  ctx.restore();

  // sleepy z's, only while she's genuinely asleep and not being fussed
  if(!purring && !catFall && u < 0.84){
    ctx.fillStyle = "rgba(90,110,140,.55)";
    ctx.textAlign = "center";
    for(let i=0;i<3;i++){
      const ph = (T*0.5 + i*0.33) % 1;
      ctx.globalAlpha = 0.55 * Math.sin(ph*Math.PI);
      ctx.font = Math.round(10 + ph*9) + "px 'Comic Sans MS', Arial";
      ctx.fillText("z", 40 + ph*16, -50 - ph*30);
    }
    ctx.globalAlpha = 1;
  }
  // and the purr, as little curls coming off her
  if(purring){
    ctx.strokeStyle = "rgba(255,140,175,.75)"; ctx.lineWidth = 2;
    for(let i=0;i<3;i++){
      const ph = (T*1.4 + i*0.33) % 1;
      ctx.globalAlpha = 0.8 * Math.sin(ph*Math.PI);
      ctx.beginPath();
      const yy = -46 - ph*26, xx = 42 + ph*8;
      ctx.moveTo(xx, yy); ctx.quadraticCurveTo(xx+5, yy-4, xx+10, yy);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

/* Signs off the end of a match. A rainbow means Shonty, so it belongs here. */
function drawRainbowIcon(x, y, s){
  ctx.save();
  ctx.translate(x, y+7*s); ctx.scale(s, s);
  // Radii must stay POSITIVE — ctx.arc throws on a negative one, which aborts
  // the whole frame and takes the game loop down with it.
  const band = 3.1;
  ctx.lineWidth = band; ctx.lineCap = "butt";
  ["#ff5d73","#ff9f45","#ffd93d","#8ce99a","#5ec8ff","#c77dff"].forEach((c,i)=>{
    const r = 21 - i*band;
    if(r <= band*0.5) return;
    ctx.strokeStyle = c;
    ctx.beginPath(); ctx.arc(0, 0, r, Math.PI, 0); ctx.stroke();
  });
  ctx.restore();
}

  ctx.fillStyle="#f0a9b8";
  ctx.beginPath(); ctx.moveTo(-10,-12); ctx.lineTo(-11.5,-18); ctx.lineTo(-5.5,-13.5); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(9,-13);   ctx.lineTo(11,-18.5); ctx.lineTo(12.5,-11); ctx.closePath(); ctx.fill();
  // fat cheeks, white face
  ctx.fillStyle=grey;  ctx.beginPath(); ctx.ellipse(1,-5,14,12,0,0,7); ctx.fill();
  ctx.fillStyle=cream; ctx.beginPath(); ctx.ellipse(2,-2,11,9.5,0,0,7); ctx.fill();
  // fast asleep, and pleased with herself
  ctx.strokeStyle="#4a4f55"; ctx.lineWidth=1.8; ctx.lineCap="round";
  ctx.beginPath(); ctx.arc(-3,-5,3.4,0.35,Math.PI-0.35); ctx.stroke();
  ctx.beginPath(); ctx.arc( 8,-5,3.4,0.35,Math.PI-0.35); ctx.stroke();
  ctx.fillStyle="#f0a9b8";
  ctx.beginPath(); ctx.moveTo(0.5,-1); ctx.lineTo(4.5,-1); ctx.lineTo(2.5,2); ctx.closePath(); ctx.fill();
  ctx.strokeStyle="#8d939a"; ctx.lineWidth=1.3;
  ctx.beginPath(); ctx.arc(0,2,3,0.15,Math.PI-0.15); ctx.stroke();

  ctx.strokeStyle="rgba(255,255,255,.9)"; ctx.lineWidth=1.1;
  ctx.beginPath(); ctx.moveTo(-6,-1); ctx.lineTo(-17,-3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-6,2);  ctx.lineTo(-17,3);  ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10,-1); ctx.lineTo(20,-3);  ctx.stroke();
