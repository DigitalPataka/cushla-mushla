<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<!-- Keep this page out of search results — it's a private family game.
     Anyone with the link can play; nobody can stumble across it. -->
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="googlebot" content="noindex, nofollow, noarchive">
<title>Cushla Mushla — the Peg Game!</title>
<style>
  html,body{margin:0;padding:0;height:100%;}
  body{
    background: radial-gradient(circle at 50% 20%, #ffe9a8 0%, #ffc978 45%, #ff9f6e 100%);
    font-family: "Comic Sans MS", "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100%; overflow:hidden; user-select:none;
    -webkit-user-select:none; -webkit-tap-highlight-color:transparent;
    overscroll-behavior:none; touch-action:none;
  }
  #wrap{ position:relative; display:flex; flex-direction:column; align-items:center; }
  h1{
    margin:0 0 8px; font-size:30px; letter-spacing:1px; text-align:center;
    color:#fff; text-shadow: 0 3px 0 #e0574f, 0 6px 10px rgba(0,0,0,.25);
  }
  canvas{
    display:block; border-radius:22px; background:#fff;
    box-shadow: 0 14px 40px rgba(120,60,20,.35), 0 0 0 6px #fff, 0 0 0 10px #ffd166;
    touch-action:none;
  }
  #hint{ margin-top:10px; color:#8a4a20; font-size:14px; text-align:center; }
  /* on a phone the canvas takes the whole screen — the chrome just steals room */
  body.mobile h1, body.mobile #hint{ display:none; }
  body.mobile{ background:#ffb27a; }
  body.mobile canvas{ border-radius:0; box-shadow:none; }
</style>
</head>
<body>
<div id="wrap">
  <h1>✨ Cushla Mushla ✨</h1>
  <canvas id="game" width="960" height="600"></canvas>
  <div id="hint">Your turn: ← → ↑ ↓ / WASD to sneak &nbsp;•&nbsp; SPACE to peg &nbsp;•&nbsp; his turn: hold SPACE to spin round<br><span style="opacity:.75">One minute a turn — watch Beanbags lean &nbsp;•&nbsp; P pause &nbsp;•&nbsp; R restart &nbsp;•&nbsp; N music &nbsp;•&nbsp; M mute &nbsp;—&nbsp; on a phone: swipe &amp; hold to sneak, let go to freeze, tap to peg</span></div>
</div>
<script>
(() => {
"use strict";

/* ============================================================
   CUSHLA MUSHLA — a cheerful sneak-up-and-peg arcade game
   ============================================================ */

const cv = document.getElementById("game");
const ctx = cv.getContext("2d");

/* ---------- responsive stage ----------
   The canvas is built to the phone's OWN aspect ratio so it fills the screen
   1:1 and nothing gets shrunk. (A fixed 620x1040 canvas was being letterboxed
   down to ~69% on a typical phone — which is why all the text was tiny.)     */
const TOUCH = ("ontouchstart" in window) || navigator.maxTouchPoints > 0;
const VW = Math.max(300, window.innerWidth), VH = Math.max(420, window.innerHeight);
const PORTRAIT = (VH > VW * 1.02) || VW < 780;
const MOBILE = TOUCH || PORTRAIT;
if(MOBILE) document.body.classList.add("mobile");

const DPR = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
const W = PORTRAIT ? Math.round(Math.min(VW, 540)) : 960;
const H = PORTRAIT ? Math.round(Math.min(W*2.35, Math.max(W*1.45, W * VH / VW))) : 600;
// Backing store is sized to the REAL on-screen pixels (device ratio x fit scale),
// so the game is pixel-crisp whether it's shrunk on a small phone or blown up on
// a tablet. RS is re-derived in fitStage and re-applied every frame.
let FIT = 1, RS = DPR;

// Everything is authored against a 430px-wide phone and scaled from there.
const SC = PORTRAIT ? W/430 : 1;              // world / furniture scale
const TS = PORTRAIT ? 1.34*SC : 1;            // text scale — phones need big type
const fnt = (px, bold) => (bold?"bold ":"") + Math.round(px*TS) + "px 'Comic Sans MS', 'Trebuchet MS', Arial";

// iPhone notch / Android cutout, so the scoreboard never hides underneath it
let SAFE_TOP = 0;
(function(){
  try{
    const p = document.createElement("div");
    p.style.cssText = "position:fixed;top:0;left:0;width:0;height:0;visibility:hidden;padding-top:env(safe-area-inset-top,0px);";
    document.body.appendChild(p);
    SAFE_TOP = Math.min(48, parseFloat(getComputedStyle(p).paddingTop) || 0);
    p.remove();
  }catch(e){ SAFE_TOP = 0; }
})();

function fitStage(){
  const chromeH = MOBILE ? 0 : 116;
  const availW = window.innerWidth  - (MOBILE ? 0 : 40);
  const availH = window.innerHeight - chromeH;
  FIT = Math.min(availW / W, availH / H);
  RS  = DPR * FIT;
  cv.width  = Math.round(W * RS);      // note: this resets ctx state, so the
  cv.height = Math.round(H * RS);      // frame loop re-applies the transform
  cv.style.width  = Math.floor(W * FIT) + "px";
  cv.style.height = Math.floor(H * FIT) + "px";
}
addEventListener("resize", fitStage);
addEventListener("orientationchange", ()=>setTimeout(fitStage, 250));
fitStage();

/* ---------- tiny audio kit ---------- */
let AC = null, muted = false, MASTER = null;
/* One master bus: every voice goes through a single point, mastered for the
   thing it's actually being played on, with a safety limiter last.

   Measured peak in heavy play is only ~0.31, so nothing was clipping — the
   limiter sits well above that and stays out of the way.

   Deliberately NOT tuned for a phone's built-in speaker. Rolling off the bass
   and lifting 2–3kHz is right for a bare handset, but there's no way to tell
   whether the output is the speaker or Bluetooth headphones, and on AirPods
   that EQ strips the low end they can actually reproduce and sounds thin and
   harsh. So the chain stays full-range: a subsonic filter for rumble nothing
   can play anyway, and a limiter. The parts that help a small speaker are done
   in the writing instead — see the octave-up bass and the kick's click. */
function ac(){
  if(!AC){
    try{
      AC = new (window.AudioContext||window.webkitAudioContext)();
      const comp = AC.createDynamicsCompressor();
      comp.threshold.value = -3; comp.knee.value = 6; comp.ratio.value = 12;
      comp.attack.value = 0.003; comp.release.value = 0.15;
      comp.connect(AC.destination);
      const hp = AC.createBiquadFilter();      // subsonic only — inaudible either way
      hp.type = "highpass"; hp.frequency.value = 35; hp.Q.value = 0.7;
      hp.connect(comp);
      MASTER = AC.createGain(); MASTER.gain.value = 1;
      MASTER.connect(hp);
    }catch(e){ AC = null; }
  }
  return AC;
}
const out = () => MASTER || (AC && AC.destination);

/* Noise buffers were allocated and filled sample-by-sample on EVERY call —
   the disco hats alone fire about ten a second. A few are baked per length
   and reused, picked at random so repeated hits still don't sound identical. */
const noiseBufs = new Map();
function noiseBuf(a, dur){
  const key = Math.round(dur*100);
  let set = noiseBufs.get(key);
  if(!set){
    set = [];
    const n = Math.max(1, Math.floor(a.sampleRate*dur));
    for(let v=0; v<3; v++){
      const b = a.createBuffer(1, n, a.sampleRate), d = b.getChannelData(0);
      for(let i=0;i<n;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/n, 2.2);
      set.push(b);
    }
    noiseBufs.set(key, set);
  }
  return set[(Math.random()*set.length)|0];
}
function tone(freq, dur, type, vol, slideTo, delay){
  const a = ac(); if(!a || muted) return;
  const t0 = a.currentTime + (delay||0);
  const o = a.createOscillator(), g = a.createGain();
  o.type = type||"sine"; o.frequency.setValueAtTime(freq, t0);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20,slideTo), t0+dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol||0.2, t0+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  o.connect(g); g.connect(out()); o.start(t0); o.stop(t0+dur+0.05);
  // let go of the nodes as soon as they've finished, rather than leaving a
  // long tail of dead voices hanging off the graph
  o.onended = () => { try{ o.disconnect(); g.disconnect(); }catch(e){} };
}
function noise(dur, vol, freq, q, delay){
  const a = ac(); if(!a || muted) return;
  const t0 = a.currentTime + (delay||0);
  const src = a.createBufferSource(); src.buffer = noiseBuf(a, dur);
  const bp = a.createBiquadFilter(); bp.type="bandpass"; bp.frequency.setValueAtTime(freq||1400,t0);
  bp.frequency.exponentialRampToValueAtTime((freq||1400)*0.35, t0+dur);
  bp.Q.value = q||3;
  const g = a.createGain(); g.gain.value = vol||0.3;
  src.connect(bp); bp.connect(g); g.connect(out()); src.start(t0);
  src.onended = () => { try{ src.disconnect(); bp.disconnect(); g.disconnect(); }catch(e){} };
}
const S = {
  peg(){ tone(660,0.09,"square",0.14); tone(1320,0.12,"triangle",0.12,1760,0.05); },
  point(){ [523,659,784,1047].forEach((f,i)=>tone(f,0.16,"triangle",0.16,null,i*0.07)); },
  snap(){ noise(0.16,0.5,2600,6); tone(180,0.14,"sawtooth",0.18,60); },
  ow(){ // cartoon squeal
    tone(700,0.20,"sine",0.20,1180,0.08);
    tone(1400,0.18,"triangle",0.07,2000,0.09);
    tone(1050,0.22,"sine",0.16,760,0.30);
  },
  peek(){ tone(880,0.07,"square",0.07); },
  step(){ tone(160+Math.random()*40,0.04,"sine",0.05); },
  win(){                         // ta — daaaaa!
    [523,659,784].forEach((f,i)=> tone(f, 0.12, "triangle", 0.15, null, i*0.075));  // the run up
    [523,659,784,1047].forEach(f=> tone(f, 0.95, "triangle", 0.125, null, 0.25));   // and the chord
    [1047,1319,1568].forEach((f,i)=> tone(f, 0.6, "sine", 0.045, null, 0.28+i*0.05));
    tone(98, 0.55, "sine", 0.13, 65, 0.25);                                         // a thump under it
    tone(2093, 0.5, "sine", 0.035, null, 0.42);                                     // shimmer on top
  },
  lose(){ [400,340,280].forEach((f,i)=>tone(f,0.25,"sine",0.14,null,i*0.13)); },
  ui(){ tone(880,0.08,"triangle",0.12,1200); },
  laugh(){                       // a daft cartoon belly laugh: ha-ha-haaa
    [0, 0.17, 0.34, 0.55].forEach((d,i)=>{
      const f = [330, 300, 275, 250][i];
      tone(f, 0.13, "sawtooth", 0.09, f*0.78, d);
      tone(f*2, 0.10, "triangle", 0.04, f*1.5, d+0.01);
    });
  },
  /* ----- the cat on the cat tree: your one-minute clock ----- */
  creak(u){                      // u = 0..1 through the minute; leans get nastier
    // A dry little wooden tick. This was a low sawtooth drone, which on a phone
    // just read as a bass note — wood is a short resonant scrape, not a pitch.
    noise(0.05 + u*0.03, 0.035 + u*0.04, 1600 - u*500, 12);
    tone(420 - u*90, 0.045, "triangle", 0.008 + u*0.010, 340 - u*70, 0.012);
  },
  purr(){                        // a fat, contented rumble
    for(let i=0;i<8;i++) tone(66 + (i%2)*9, 0.10, "sawtooth", 0.05, null, i*0.072);
    tone(500, 0.20, "sine", 0.045, 640, 0.10);
  },
  flower(){                      // a little glitter as she lifts it from the vase
    [784,988,1175].forEach((f,i)=> tone(f, 0.16, "sine", 0.075, f*1.2, i*0.06));
  },
  strum(i){                      // one lazy plucked note at a time
    const notes = [392, 440, 494, 587, 659, 494];      // G A B D E B
    const f = notes[i % notes.length];
    tone(f, 0.55, "triangle", 0.050);
    tone(f*2, 0.34, "sine", 0.018, null, 0.02);
  },
  love(){                        // "la u" — a soft, warm little phrase
    [523,659,784,880].forEach((f,i)=> tone(f, 0.34, "sine", 0.10, null, i*0.10));
    tone(1319, 0.5, "triangle", 0.045, 1568, 0.30);
  },
  tick(){                        // a peg dropping into its slot on the scoreboard
    tone(1320, 0.07, "triangle", 0.10, 1760);
    tone(660, 0.05, "square", 0.05);
  },
  phew(){                        // froze just in time
    tone(300, 0.16, "sine", 0.055, 200);
    tone(210, 0.20, "sine", 0.035, 160, 0.05);
  },
  disco(){                       // clack, and the place goes off
    tone(96, 0.07, "square", 0.10);
    [523,659,784,1047].forEach((f,i)=> tone(f, 0.22, "sawtooth", 0.045, null, 0.07+i*0.07));
    tone(65, 0.5, "sine", 0.09, 49, 0.10);
  },
  crash(){                       // timber! — and a very put-out cat
    noise(0.55, 0.55, 760, 1.2);
    tone(120, 0.50, "sawtooth", 0.20, 46);
    [0.10,0.20,0.31,0.44,0.58].forEach(d=> tone(360+Math.random()*380, 0.09, "square", 0.11, null, d));
    tone(660, 0.28, "sine", 0.17, 1180, 0.34);      // "mrrOW!"
    tone(990, 0.20, "triangle", 0.07, 1500, 0.36);
  }
};

/* ---------- light, cheerful background music ----------
   A little 4-chord music box: C – G – Am – F, with a plucky
   arpeggio, a soft bass and a twinkle on the off-beats.      */
// starts OFF on purpose — nobody wants a phone at full volume suddenly
// playing music at them. Turn it on from the title screen, N, or the pause menu.
const MUS = { on:false, next:0, step:0, vol:0.055 };
const PROG = [0, 7, 9, 5];                 // C  G  Am  F
const ARP  = [0, 4, 7, 12, 7, 4, 7, 4];
const MEL  = [12, null, 16, null, 14, null, 12, 19, null, 16, 14, null, 12, null, 9, null];
const nf = s => 261.626 * Math.pow(2, s/12);

function at(freq, dur, type, vol, when, slideTo){
  const a = ac(); if(!a) return;
  const o = a.createOscillator(), g = a.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, when);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, when+dur);
  g.gain.setValueAtTime(0.0001, when);
  g.gain.exponentialRampToValueAtTime(vol, when+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, when+dur);
  o.connect(g); g.connect(out()); o.start(when); o.stop(when+dur+0.05);
  o.onended = () => { try{ o.disconnect(); g.disconnect(); }catch(e){} };
}
/* ---------- five seconds of deep house, for the disco ----------
   Four on the floor, an offbeat bass, offbeat hats and a trance arpeggio over
   Am – F – C – G. Scheduled on the audio clock like the music box, so it
   doesn't drift with the frame rate. Plays whether or not the music is on. */
const DBPM = 128, DSPB = 60/DBPM/4;          // one sixteenth
let discoNext = 0, discoStep = 0;
function dkick(when){
  const a = ac(); if(!a || muted) return;
  const o = a.createOscillator(), g = a.createGain();
  o.type = "sine";
  o.frequency.setValueAtTime(125, when);
  o.frequency.exponentialRampToValueAtTime(44, when+0.11);
  g.gain.setValueAtTime(0.0001, when);
  g.gain.exponentialRampToValueAtTime(0.17, when+0.006);
  g.gain.exponentialRampToValueAtTime(0.0001, when+0.22);
  o.connect(g); g.connect(out()); o.start(when); o.stop(when+0.26);
  o.onended = () => { try{ o.disconnect(); g.disconnect(); }catch(e){} };
  // A phone speaker can reproduce none of the above, so the beat also gets a
  // mid-range body and a click — that's the part that actually lands on a
  // handset, and it's what stops the four-to-the-floor vanishing entirely.
  at(300, 0.075, "triangle", 0.075, when, 140);
  noise(0.012, 0.045, 2300, 1.0, Math.max(0, when - a.currentTime));
}
function discoTick(){
  const a = ac();
  if(!a || a.state!=="running" || muted || discoT <= 0){ discoNext = 0; return; }
  const now = a.currentTime;
  if(discoNext < now) discoNext = now + 0.05;
  const ARP2 = [0,4,7,12,7,4,7,12];
  while(discoNext < now + 0.30){
    const s = discoStep, t = discoNext;
    const root = [9, 5, 0, 7][Math.floor(s/16) % 4];      // Am  F  C  G
    if(s % 4 === 0) dkick(t);                             // four on the floor
    if(s % 4 === 2) noise(0.05, 0.070, 9000, 0.9, Math.max(0, t-now));
    if(s % 2 === 1){                                     // offbeat bass…
      at(nf(root-24), 0.15, "sawtooth", 0.100, t);
      at(nf(root-12), 0.14, "sawtooth", 0.062, t);       // …and an octave up, so a
    }                                                    // phone still hears the line
    at(nf(root + ARP2[s % 8] + 12), 0.12, "sawtooth", 0.058, t);   // arpeggio
    if(s % 16 === 0) at(nf(root + 12), 1.0, "triangle", 0.040, t); // pad
    discoNext += DSPB; discoStep++;
  }
}

function musicTick(){
  const a = ac();
  // the music box gets out of the way while the disco is on
  // The music box stands down for the disco, and for the win — the fanfare
  // should have the room to itself. It comes back when the next match starts.
  if(!a || a.state!=="running" || muted || !MUS.on || discoT > 0 || scene === "over"){
    MUS.next = 0; return;
  }
  const now = a.currentTime, SPB = 0.1875;          // ~160bpm eighth notes
  if(MUS.next < now) MUS.next = now + 0.06;
  while(MUS.next < now + 0.35){
    const s = MUS.step, t = MUS.next;
    const root = PROG[Math.floor(s/8) % 4];
    const V = MUS.vol * (paused ? 0.35 : 1);
    if(s % 8 === 0) at(nf(root-24), 0.42, "triangle", V*1.5, t);      // bass
    if(s % 8 === 4) at(nf(root-12), 0.30, "triangle", V*1.0, t);
    at(nf(root + ARP[s % 8] + 12), 0.22, "sine", V*0.85, t);          // arpeggio
    const m = MEL[s % 16];
    if(m !== null) at(nf(root + m + 12), 0.30, "triangle", V*0.55, t);// melody
    if(s % 8 === 6) at(nf(root + 24), 0.16, "sine", V*0.30, t);       // twinkle
    MUS.next += SPB; MUS.step++;
  }
}

/* ---------- input ---------- */
const keys = {};
addEventListener("keydown", e=>{
  if([" ","ArrowLeft","ArrowRight","ArrowUp","ArrowDown"].includes(e.key)) e.preventDefault();
  if(e.repeat) return;
  keys[e.key.toLowerCase()] = true;
  ac(); if(AC && AC.state==="suspended") AC.resume();
  if(e.key.toLowerCase()==="m"){ muted = !muted; }
  onKey(e.key.toLowerCase());
});
addEventListener("keyup", e=>{ keys[e.key.toLowerCase()] = false; });
const down = (...k)=> k.some(x=>keys[x]);

/* ---------- swipe / drag controls ----------
   Press and swipe anywhere: Cushla creeps in that direction, at a speed
   set by how far you've dragged. LIFT YOUR FINGER TO FREEZE — which is
   exactly what you need when Shonty spins round. A quick tap places a
   peg (or starts the game / dismisses a banner).                      */
const stick = { on:false, id:null, ox:0, oy:0, x:0, y:0, dx:0, dy:0, mag:0, t0:0, moved:0 };
let tapPeg = 0;                       // frames-worth of "peg now" from a tap
const STICK_MAX = 62, STICK_DEAD = 9;

function canvasPos(e){
  const r = cv.getBoundingClientRect();
  return { x:(e.clientX - r.left) * (W / r.width), y:(e.clientY - r.top) * (H / r.height) };
}
function pauseBtn(){
  const r = PORTRAIT ? 21*SC : (MOBILE?30:22);
  return PORTRAIT ? {x: W-r-10*SC, y: SAFE_TOP + 6*SC + 13*SC, r}
                  : {x: W-r-16, y: r+16, r};
}
function hitBtn(b,p){ return Math.hypot(p.x-b.x, p.y-b.y) < b.r*1.5; }

cv.addEventListener("pointerdown", e=>{
  e.preventDefault();
  cv.setPointerCapture(e.pointerId);
  ac(); if(AC && AC.state==="suspended") AC.resume();
  const p = canvasPos(e);
  if(inMatch() && hitBtn(pauseBtn(), p)){ paused = !paused; S.ui(); return; }
  if(paused){ handlePauseTap(p); return; }
  if(stick.on) return;
  stick.on = true; stick.id = e.pointerId;
  stick.ox = stick.x = p.x; stick.oy = stick.y = p.y;
  stick.dx = stick.dy = stick.mag = 0; stick.moved = 0; stick.t0 = performance.now();
}, {passive:false});

cv.addEventListener("pointermove", e=>{
  if(!stick.on || e.pointerId !== stick.id) return;
  e.preventDefault();
  const p = canvasPos(e);
  stick.x = p.x; stick.y = p.y;
  let dx = p.x - stick.ox, dy = p.y - stick.oy;
  const d = Math.hypot(dx,dy);
  stick.moved = Math.max(stick.moved, d);
  // if the drag runs long, let the anchor trail the finger so you never run out of room
  if(d > STICK_MAX){
    stick.ox += dx * (1 - STICK_MAX/d);
    stick.oy += dy * (1 - STICK_MAX/d);
    dx = p.x - stick.ox; dy = p.y - stick.oy;
  }
  const dd = Math.hypot(dx,dy);
  if(dd < STICK_DEAD){ stick.dx = stick.dy = stick.mag = 0; return; }
  stick.dx = dx/dd; stick.dy = dy/dd;
  stick.mag = Math.min(1, (dd - STICK_DEAD) / (STICK_MAX - STICK_DEAD));
}, {passive:false});

function endStick(e){
  if(!stick.on || (e && e.pointerId !== stick.id)) return;
  const quick = performance.now() - stick.t0 < 260;
  if(quick && stick.moved < 16){          // a tap, not a swipe
    if(scene==="title"){
      const p = {x:stick.ox, y:stick.oy};
      const mb = musicBtn();
      if(p.x>mb.x && p.x<mb.x+mb.w && p.y>mb.y && p.y<mb.y+mb.h){
        MUS.on = !MUS.on; S.ui();                    // just the toggle — don't start yet
      } else { S.ui(); startGame(); }
    }
    else if(scene!=="play"){ confirm_(); }   // any popup: tap to carry on
    else if(!humanWatch()) tapPeg = 0.22;  // "peg him!" — held briefly so it can't be missed
  }
  stick.on = false; stick.id = null; stick.dx = stick.dy = stick.mag = 0;
}
cv.addEventListener("pointerup", endStick, {passive:false});
cv.addEventListener("pointercancel", endStick, {passive:false});
cv.addEventListener("contextmenu", e=>e.preventDefault());

function handlePauseTap(p){
  const RH = PAUSE_ROW_H, bw = Math.min(420, W-40);
  const bh = PAUSE_TOP+RH*6+40, bx = (W-bw)/2, by = (H-bh)/2;
  for(let i=0;i<6;i++){
    if(p.y > by+PAUSE_TOP+i*RH && p.y < by+PAUSE_TOP+(i+1)*RH && p.x>bx && p.x<bx+bw){
      const act = ["resume","restart","fancy","music","mute","quit"][i];
      S.ui();
      if(act==="resume") paused = false;
      else if(act==="restart"){ paused=false; confetti=[]; sparks=[]; hearts=[]; startGame(); }
      else if(act==="fancy") FANCY = !FANCY;
      else if(act==="music") MUS.on = !MUS.on;
      else if(act==="mute") muted = !muted;
      else if(act==="quit"){ paused=false; confetti=[]; scene="title"; sceneT=0; }
      return;
    }
  }
  paused = false;   // tap anywhere else to resume
}

/* ---------- world ---------- */
// On a phone the scoreboard gets its own band at the very top and the kitchen
// starts below it, so the HUD can never sit on top of Shonty or his warnings.
const HUD_H     = PORTRAIT ? Math.round(94*SC) + SAFE_TOP : 0;
// budget below the HUD band: ~40 for the status strip, then window, then counter
const FLOOR_TOP = PORTRAIT ? HUD_H + Math.round(190*SC) : 168;
const SINK_Y    = FLOOR_TOP + Math.round(32*SC);   // where the washer stands
const START     = {x: W*0.63, y: H - 46*SC};       // sneaker spawn, far end of the room
const PEGBOX    = {x: W*0.26, y: H - 34*SC};       // reload here after every peg
const PEG_COLS  = ["#ff5d73","#ffd93d","#5ec8ff","#8ce99a","#c77dff","#ff9f45","#4dd4ac"];

/* ---------- the light switch ----------
   On the wall by the bench, over at the right-hand end where nobody has any
   reason to go. Stand in front of it and flick it and the kitchen lights go
   out, a disco ball comes down and the place goes off for five seconds.
   No prompt — it's there to be found. Flick it as often as you like.     */
const SWITCH_X  = W - 38*SC;
const SWITCH_Y  = (FLOOR_TOP - 58) - 34*SC;     // on the wall above the counter
const DISCO_TIME = 5;
let discoT = 0;         // seconds of disco left to run

// Furniture is placed as a fraction of the room, so it lays out correctly on
// any screen shape: fx across, fy down the floor.
function furn(fx, fy, w, h, kind){
  const fw = w*SC, fh = h*SC;
  return {x: fx*W - fw/2, y: FLOOR_TOP + fy*(H-FLOOR_TOP) - fh/2, w:fw, h:fh, kind};
}
const FURNITURE = PORTRAIT ? [
  // A galley kitchen you have to weave through. Every piece is SOLID — you walk
  // around it, not through it — and each one casts a hiding pocket behind it.
  // They alternate sides so there's always a way past, but never a straight run.
  furn(0.30, 0.16, 196, 56, "table"),
  furn(0.85, 0.32,  84, 68, "guitar"),
  // The flowers and the ottoman swapped places: the vase sat a few steps from
  // where she starts, so the flower was a free grab off the opening whistle.
  // Up here she has to cross the room for it, past him, like everything else.
  furn(0.20, 0.37,  92, 52, "flowers"),
  furn(0.79, 0.66,  96, 66, "basket"),
  // Out in the middle of the floor, which was a big empty dance floor on a
  // phone. It used to sit at the front, but a piece down there has to clear
  // BOTH the cat tree and the spawn — a wide table there sat over START on
  // short screens (Safari with its address bar showing), which wedged the
  // sneaker solid and froze the game. Checked against every phone shape.
  furn(0.48, 0.56,  88, 54, "chair")
] : [
  {x:300, y:300, w:280, h:60, kind:"table"},
  // up from its old y:392 — the bottom-left corner is the cat's now
  {x: 96, y:232, w: 92, h:74, kind:"guitar"},
  {x:768, y:360, w: 92, h:52, kind:"flowers"},
  {x:430, y:466, w: 96, h:56, kind:"chair"},
  {x:620, y:452, w: 98, h:66, kind:"basket"}
];

/* ---------- the cat tree, and Beanbags asleep on top ----------
   Beanbags is the game's clock. Over one minute her considerable weight bends
   the post further and further over the peg basket, until the whole lot goes
   down with an almighty clatter and the turn is up. You can duck in behind
   her, and you can stop for a pat — she'll purr, which costs you nothing but
   the seconds you spend standing there.                                   */
// She stands exactly one tree-length to the left of the basket, so when she
// finally goes over the whole lot comes down flat across the pegs.
const CATTREE = {x: Math.max(64*SC, PEGBOX.x - 104*SC), y: PEGBOX.y - 62*SC};
FURNITURE.push({x: CATTREE.x - 30*SC, y: CATTREE.y - 26*SC,
                w: 60*SC, h: 30*SC, kind:"cattree"});
const cat = {lean:0, wob:0, purr:0, smile:0, blink:0, patCd:0, creakT:0};

// the pocket behind a piece (further from the sink) is where you're invisible
FURNITURE.forEach(f => {
  f.solid = {x:f.x-4*SC, y:f.y+10*SC, w:f.w+8*SC, h:f.h-6*SC};
  f.hide  = {x:f.x-8*SC, y:f.y+f.h+2*SC, w:f.w+16*SC, h:54*SC};
});

function hiddenAt(x,y){
  for(const f of FURNITURE){
    const h = f.hide;
    if(x>h.x && x<h.x+h.w && y>h.y && y<h.y+h.h) return f;
  }
  return null;
}
// solid: a character's feet can't enter a piece of furniture
function blockedAt(x,y){
  for(const f of FURNITURE){
    const s = f.solid;
    if(x>s.x && x<s.x+s.w && y>s.y && y<s.y+s.h) return f;
  }
  return null;
}
/* ---------- navigation grid ----------
   Shonty used to steer greedily at his goal, which wedged him in a corner
   between two blocked directions and made him jitter on the spot forever.
   He now walks a real path: breadth-first search over a coarse grid.     */
const NAV_CELL = Math.max(10, Math.round(13*SC));
let navGrid = null, navW = 0, navH = 0;
function buildNav(){
  navW = Math.ceil(W/NAV_CELL); navH = Math.ceil(H/NAV_CELL);
  navGrid = new Uint8Array(navW*navH);
  for(let cy=0; cy<navH; cy++) for(let cx=0; cx<navW; cx++){
    const x = cx*NAV_CELL+NAV_CELL/2, y = cy*NAV_CELL+NAV_CELL/2;
    const ok = !blockedAt(x,y) && x>28*SC && x<W-28*SC && y>SINK_Y+2 && y<H-26*SC;
    navGrid[cy*navW+cx] = ok ? 0 : 1;
  }
}
const navCell = (x,y) => ({
  cx: Math.min(navW-1, Math.max(0, Math.round((x-NAV_CELL/2)/NAV_CELL))),
  cy: Math.min(navH-1, Math.max(0, Math.round((y-NAV_CELL/2)/NAV_CELL)))
});
let navFlow = null, navKey = "";      // cached "which way to the goal" field
function navField(tx,ty){
  if(!navGrid) buildNav();
  let {cx:gx, cy:gy} = navCell(tx,ty);
  if(navGrid[gy*navW+gx]){                        // goal sits in furniture
    let best=null, bd=1e9;
    for(let cy=0;cy<navH;cy++) for(let cx=0;cx<navW;cx++){
      if(navGrid[cy*navW+cx]) continue;
      const d=(cx-gx)*(cx-gx)+(cy-gy)*(cy-gy);
      if(d<bd){ bd=d; best=[cx,cy]; }
    }
    if(best){ gx=best[0]; gy=best[1]; }
  }
  const key = gx+":"+gy;
  if(key === navKey && navFlow) return navFlow;
  const prev = new Int32Array(navW*navH).fill(-1);
  const start = gy*navW+gx;
  prev[start] = -2;
  const q = [start];
  let head = 0;
  while(head < q.length){
    const cur = q[head++], cx = cur%navW, cy = (cur-cx)/navW;
    for(let k=0;k<4;k++){
      const nx = cx + (k===0?1:k===1?-1:0), ny = cy + (k===2?1:k===3?-1:0);
      if(nx<0||ny<0||nx>=navW||ny>=navH) continue;
      const ni = ny*navW+nx;
      if(navGrid[ni] || prev[ni]!==-1) continue;
      prev[ni] = cur; q.push(ni);
    }
  }
  navKey = key; navFlow = prev;
  return prev;
}
// unit direction from (x,y) toward the goal, routed around furniture
function navTo(x, y, tx, ty){
  const flow = navField(tx,ty);
  const {cx,cy} = navCell(x,y);
  const i = cy*navW+cx, nxt = flow[i];
  if(nxt === -2 || nxt === -1 || nxt === undefined){
    const dx=tx-x, dy=ty-y, l=Math.hypot(dx,dy)||1;   // adjacent or unreachable
    return {x:dx/l, y:dy/l};
  }
  const nx = nxt%navW, ny = (nxt-nx)/navW;
  const vx = (nx*NAV_CELL+NAV_CELL/2)-x, vy = (ny*NAV_CELL+NAV_CELL/2)-y;
  const l = Math.hypot(vx,vy)||1;
  return {x:vx/l, y:vy/l};
}

/* Safety net for spawn points. moveWithCollision refuses BOTH axes from inside
   a solid box, so anyone who starts in furniture is wedged forever — no walking
   out of it. That froze the sneaker completely on short phone screens once, so
   now we always shake a start position loose before using it. */
function freeSpot(x, y){
  if(!blockedAt(x, y)) return {x, y};
  for(let r = 12*SC; r <= 240*SC; r += 12*SC){
    for(let a = 0; a < 12; a++){
      const t = a*Math.PI/6;
      const nx = Math.max(28*SC, Math.min(W-28*SC, x + Math.cos(t)*r));
      const ny = Math.max(SINK_Y+2, Math.min(H-26*SC, y + Math.sin(t)*r));
      if(!blockedAt(nx, ny)) return {x:nx, y:ny};
    }
  }
  return {x, y};                       // nowhere free at all — shouldn't happen
}

// move with sliding — running into a table edge slides you along it
function moveWithCollision(ch, dx, dy){
  const nx = Math.max(28*SC, Math.min(W-28*SC, ch.x + dx));
  if(!blockedAt(nx, ch.y)) ch.x = nx;
  const ny = Math.max(SINK_Y+2, Math.min(H-26*SC, ch.y + dy));
  if(!blockedAt(ch.x, ny)) ch.y = ny;
}

/* ---------- characters ---------- */
function makeChar(who){
  return {
    who,
    x: START.x, y: START.y,
    vx:0, vy:0, walk:0, moving:false,
    facing: 0,          // 0 = back to us, 1 = facing us
    turnT: 0,
    pegsOn: [],         // pegs stuck to THIS character
    hasPeg: true,       // carrying a peg? if not, sneak back to the basket
    hasFlower: false,   // …or a flower, which is instead of a peg, never as well
    squeal: 0, hop: 0,
    dir: 1
  };
}
const cushla = makeChar("Cushla");
const shonty = makeChar("Shonty");

const LOOK = {   // the washer's look-around cycle
  mode:"wash", t:0, dur:2.4, warn:false, drift:0
};

let sneaker = cushla, washer = shonty;   // Cushla goes first
let scene = "title";                     // title | intro | play | caught | roundwin | over
let sceneT = 0;
let msg = "", sub = "";
let bubbles = [], sparks = [], confetti = [], hearts = [];
let shake = 0, flash = 0, snapFx = 0;
let paused = false;
let FANCY = true;        // the visual pass — toggle with V, or from the pause menu
let aiThink = 0, aiSkill = 0.5, aiPause = 0;
// How long Shonty keeps moving after you spin round — your window to catch him.
// Deliberately generous: without it he'd freeze instantly and be uncatchable.
const AI_REACT = 0.55;
let aiReact = AI_REACT;
const AI_SPEED = 0.66;        // he creeps; you're quicker than he is

/* ---------- match structure ----------
   One player, always doing something. Your turn: sneak up and peg Shonty —
   TWO pegs and the turn passes. His turn: YOU'RE on the dishes, and you
   choose when to spin round and try to catch him. First to five wins.   */
const TARGET   = 5;    // pegs to win the whole game
const PER_TURN = 2;    // successful pegs before the turn passes over
const TURN_TIME = 60;  // …or one minute, whichever comes first — see the cat
let target = TARGET;
let turnPegs = 0;      // pegs placed so far this turn
let turnClock = TURN_TIME;   // seconds left before the cat tree goes over
let catFall = null;    // the topple, while it's happening
let readyWait = false;

/* ---------- the flower ----------
   Once a game, Cushla can lift a flower from the vase. Carrying it she can't
   be caught — she can walk straight up to Shonty while he's looking and give
   it to him. That's the whole of its power: handing it over ends the immunity
   and leaves her empty-handed, so she still has to trail back to the basket
   for a peg. Which she will, because she's going to peg him anyway.        */
let actHeld = false;         // action button already spent on this press
let hug = null;              // his thank-you: he turns round and squeezes her

/* ---------- Shonty and the guitar ----------
   He cannot walk past a guitar. On his turn, tucked in the pocket behind it,
   he stops sneaking and plays until he moves off again — which costs him a
   few seconds of his creep, and gives Cushla something to jig to at the sink. */
const GUITAR_F = FURNITURE.find(f => f.kind === "guitar");
let playing = 0;             // seconds he's been playing (0 = not playing)
let strumT  = 0;             // time to the next plucked note
let notes   = [];            // ♪ drifting up off the strings
let flowerPicked = false;    // lifted from the vase (which is then a bloom short)
let flowerGiven  = false;    // handed over — the rainbow is out for the match
let rainbow = 0;             // 0..1, fades in and stays
let laU = 0;                 // "La u" bubble timer
let immT = 0;                // "Immunity!" popup timer, on picking the flower

// the player IS Cushla: sneaking on her turn, on dish duty on his
const humanTurn  = () => sneaker === cushla;   // player is the one sneaking
const humanWatch = () => washer  === cushla;   // player is on the dishes

/* ---------- flow ---------- */
function startGame(){
  cushla.pegsOn = []; shonty.pegsOn = [];
  floorPegs = [];
  cushla.hasFlower = shonty.hasFlower = false;
  flowerPicked = flowerGiven = false; rainbow = 0; laU = 0;
  discoT = 0; discoStep = 0; discoNext = 0;
  tally = {crashes:0, guitar:0, discos:0, pats:0};
  flyers = []; dotPop = {cushla:0, shonty:0}; phewT = 0; stillT = 0; wasLanded = false;
  tally = {crashes:0, guitar:0, discos:0, pats:0};
  flyers = []; dotPop = {cushla:0, shonty:0}; phewT = 0;
  sneaker = cushla; washer = shonty;           // Cushla sneaks first
  beginTurn(true);
}
/* What you'll actually remember isn't 5–3, it's what happened on the way. */
function matchRecap(){
  const n = x => x===1 ? "once" : x===2 ? "twice" : x + " times";
  const bits = [];
  if(flowerGiven)   bits.push("you gave him a flower");
  if(tally.crashes) bits.push("Beanbags brought her tree down " + n(tally.crashes));
  if(tally.guitar)  bits.push("he stopped to play the guitar " + n(tally.guitar));
  if(tally.discos)  bits.push("the lights went out " + n(tally.discos));
  if(tally.pats)    bits.push("Beanbags got " + (tally.pats===1 ? "a pat" : tally.pats + " pats"));
  if(!bits.length) return "";
  const last = bits.pop();
  return " Along the way: " + (bits.length ? bits.join(", ") + " and " + last : last) + ".";
}
function gameOver(winner){
  scene = "over"; sceneT = 0; readyWait = false;
  S.win();
  for(let i=0;i<170;i++) confetti.push({x:Math.random()*W,y:-Math.random()*H,vy:60+Math.random()*180,vx:(Math.random()-.5)*60,r:Math.random()*6+3,rot:Math.random()*6,vr:(Math.random()-.5)*8,col:PEG_COLS[i%PEG_COLS.length]});
  msg = (winner===cushla ? "You win!" : "Shonty wins!");
  sub = (winner===cushla
      ? "Five pegs on Shonty and he never felt a thing."
      : "Five on you, and he is unbearably pleased with himself.")
    + matchRecap();      // the banner already says how to carry on
}
// the turn passes: after PER_TURN pegs, or the moment someone's caught
function passTurn(){
  sneaker = (sneaker===cushla) ? shonty : cushla;
  washer  = (washer ===cushla) ? shonty : cushla;
  beginTurn(false);
}
/* Pegs fly up to the scoreboard and drop into their slot, which is a lot more
   satisfying than a dot silently becoming filled. */
let flyers = [];
let dotPop = {cushla:0, shonty:0};      // the slot bounces as one lands
let phewT = 0;                          // froze JUST in time
let stillT = 0;                         // how long she's been stood still
let wasLanded = false;                  // his look had already landed last frame
// what happened this match, for the round-up at the end
let tally = {crashes:0, guitar:0, discos:0, pats:0};

/* where peg number i sits on someone's scoreboard — must match drawScore */
function scoreDot(forCushla, i){
  let x, y, bwv, dr, gap;
  if(PORTRAIT){
    const top = SAFE_TOP + 6*SC, g = 8*SC;
    bwv = (W - 20*SC - g)/2;
    x = forCushla ? 10*SC : 10*SC + bwv + g;
    y = top + 28*SC; dr = 7*SC; gap = 18*SC;
  } else {
    const pad = 18;
    bwv = Math.min(300, (W - pad*2 - 76)/2);
    x = forCushla ? pad : W - pad - bwv;
    y = 12; dr = 10; gap = 30;
  }
  const x1 = x + bwv - (PORTRAIT ? 10*SC : 12) - dr;
  return {x: x1 - (TARGET-1-i)*gap, y: y + (PORTRAIT ? 26*SC : 26)};
}

let floorPegs = [];      // pegs that have pinged off and are lying on the floor
let fallers = [];        // …while they're still tumbling through the air

function beginTurn(first){
  resetPositions();
  turnPegs = 0;
  scene = "intro"; sceneT = 0;
  readyWait = false;
  // Every turn is also on a one-minute clock, and the only thing that tells you
  // so is Beanbags leaning — so the intro has to actually say it.
  const CLOCK = "You've got a minute — watch Beanbags lean.";
  if(sneaker === cushla){
    msg = "Your turn to sneak!";
    sub = "Creep up behind Shonty and peg him. Freeze or hide when he looks — "
        + PER_TURN + " pegs and it's his go. " + CLOCK;
  } else {
    msg = "You're on the dishes!";
    sub = (TOUCH
      ? "Shonty's sneaking up on you. HOLD anywhere to spin round and catch him. "
      : "Shonty's sneaking up on you. HOLD SPACE to spin round and catch him. ")
      + CLOCK;
  }
  if(first) sub = "Sneak up behind Shonty and clip a peg on his back. "
                + PER_TURN + " pegs and it's his turn. " + CLOCK
                + " First to " + target + " wins!";
}
function resetPositions(){
  const sp = freeSpot(START.x, START.y);
  sneaker.x = sp.x; sneaker.y = sp.y; sneaker.facing = 0; sneaker.turnT = 0;
  sneaker.hasPeg = true;      // she's two-handed: a peg in one, maybe a flower in the other
  catchAnim = null; apronFall = null;
  cushla.apronOff = false; shonty.apronOff = false;
  washer.x = W/2; washer.y = SINK_Y; washer.facing = 0; washer.turnT = 0;
  LOOK.mode = "wash"; LOOK.t = 0; LOOK.dur = 2.6; LOOK.warn = false; LOOK.drift = 0;
  LOOK._pinged = false;
  peekE = 1; peekHeld = false;
  aiThink = 0; aiPause = 0.9;
  aiSkill = 0.42 + Math.random()*0.3;
  // He starts his turn ALERT (not mid-reaction), so if you're already holding
  // the look when he appears he waits it out instead of walking into it.
  aiBurst = 0; aiRest = 0; aiCover = null; aiWatchT = 9; aiWind = 0;
  aiPatience = 0; aiPatienceMax = 1.6 + Math.random()*1.3;
  actHeld = false; hug = null;
  playing = 0; strumT = 0; notes = [];
  guitarPlan = Math.random() < 0.8; guitarGoing = false; guitarT = 0;
  graceT = 0.7;                       // brief no-catch grace as a turn opens
  turnT = 0;
  // a fresh minute, and the cat sits up straight again
  turnClock = TURN_TIME; catFall = null;
  cat.lean = 0; cat.wob = 0; cat.purr = 0; cat.smile = 0; cat.patCd = 0; cat.creakT = 0;
  aiReact = AI_REACT * (0.85 + Math.random()*0.3);
  navFlow = null; navKey = "";
}
const inMatch = () => scene!=="title" && scene!=="over";

/* Popups wait for YOU — they never time out from under you mid-sentence.
   Each has a short minimum so a stray tap can't skip it before it's drawn. */
function minWait(){
  if(scene==="intro")    return 0.7;
  if(scene==="caught")   return 3.1;   // let the whole gag play out first
  if(scene==="catfall")  return 2.4;   // ditto — hear the crash before the words
  if(scene==="roundwin") return 0.9;
  if(scene==="over")     return 1.2;
  return 0;
}
const canAdvance = () => sceneT >= minWait();

/* one shared "go on then" action: ENTER on desktop, a tap on a phone */
function confirm_(){
  if(paused) return;
  if(scene==="title"){ S.ui(); startGame(); return; }
  if(!canAdvance()) return;
  S.ui();
  if(scene==="over"){ confetti=[]; scene="title"; sceneT=0; return; }
  if(scene==="intro"){ readyWait = false; scene="play"; sceneT=0; return; }
  if(scene==="caught"){ passTurn(); return; }
  if(scene==="catfall"){ passTurn(); return; }
  if(scene==="roundwin"){
    if(turnPegs >= PER_TURN) passTurn();
    else { scene="play"; sceneT=0; }
    return;
  }
}
function onKey(k){
  if(k==="enter"){ confirm_(); return; }
  if(k==="p" || k==="escape"){
    if(inMatch()){ paused = !paused; S.ui(); }
    return;
  }
  if(k==="n"){ MUS.on = !MUS.on; S.ui(); return; }
  if(k==="v"){ FANCY = !FANCY; S.ui(); return; }
  if(k==="r"){                       // restart the whole match
    if(scene!=="title"){ paused=false; confetti=[]; sparks=[]; hearts=[]; S.ui(); startGame(); }
    return;
  }
  if(k==="q" && paused){             // quit out to the title screen
    paused=false; confetti=[]; scene="title"; sceneT=0; S.ui();
  }
}

/* ---------- difficulty ---------- */
function pace(){
  const total = cushla.pegsOn.length + shonty.pegsOn.length;
  return Math.max(0.55, 1 - total*0.055);
}

/* ---------- YOUR turn on the dishes ----------
   You decide when to spin round. You can't watch forever: peeking drains a
   meter, washing refills it, and when it runs dry you're spun back to the
   sink. That's the tension — peek too early and he just freezes; peek too
   late and he's already clipped a peg on you.                            */
let peekE = 1;            // 1 = full, 0 = empty
let peekHeld = false;
const PEEK_DRAIN = 1/2.1, PEEK_REFILL = 1/2.6, PEEK_MIN = 0.45;
const PEEK_COST = 0.30;   // up-front cost of each spin-round — stops peek-spamming being free

function updatePlayerLook(dt){
  LOOK.drift += dt;
  washer.x = W/2 + Math.sin(LOOK.drift*0.5)*(PORTRAIT?54:66);

  const wants = peekHeld && peekE > 0.01;
  // once you're spun round you keep looking until you let go or run dry
  const looking = (LOOK.mode==="look" || LOOK.mode==="turnF")
    ? wants
    : (wants && peekE >= PEEK_MIN);

  if(looking){
    peekE = Math.max(0, peekE - PEEK_DRAIN*dt);
    if(LOOK.mode==="wash"){
      //Each spin costs a chunk up front, not just per-second. Without this,
      // machine-gunning tiny peeks is free and beats playing properly.
      peekE = Math.max(0, peekE - PEEK_COST);
      LOOK.mode="turnF"; LOOK.t=0; LOOK.dur=0.15; S.peek();
    }
    else if(LOOK.mode==="turnF"){
      LOOK.t += dt; washer.turnT = LOOK.t/LOOK.dur;
      if(LOOK.t>=LOOK.dur){ LOOK.mode="look"; washer.turnT=1; }
    }
  } else {
    peekE = Math.min(1, peekE + PEEK_REFILL*dt);
    if(LOOK.mode==="look" || LOOK.mode==="turnF"){ LOOK.mode="turnB"; LOOK.t=0; LOOK.dur=0.15; }
    else if(LOOK.mode==="turnB"){
      LOOK.t += dt; washer.turnT = 1 - LOOK.t/LOOK.dur;
      if(LOOK.t>=LOOK.dur){ LOOK.mode="wash"; washer.turnT=0; }
    }
  }
  LOOK.warn = false;
  LOOK.seen = (LOOK.mode==="look") ? (LOOK.seen||0)+dt : 0;
  washer.facing = (LOOK.mode==="look") ? 1 : washer.turnT;
  if(LOOK.mode==="wash" && Math.random()<0.35){
    bubbles.push({x:washer.x-20+Math.random()*40, y:SINK_Y-92, r:2+Math.random()*5, vy:-14-Math.random()*22, vx:(Math.random()-.5)*10, life:1.6});
  }
}

/* ---------- the AI washer's look cycle (your sneaking turn) ---------- */
function updateLook(dt){
  if(humanWatch()){ updatePlayerLook(dt); return; }
  const p = pace();
  LOOK.t += dt;
  LOOK.drift += dt;
  // gentle shuffle along the sink
  washer.x = W/2 + Math.sin(LOOK.drift*0.5)*(PORTRAIT?54:66);

  if(LOOK.mode==="wash"){
    LOOK.warn = LOOK.t > LOOK.dur - 0.55;
    if(LOOK.warn && !LOOK._pinged){ LOOK._pinged = true; S.peek(); }
    if(LOOK.t >= LOOK.dur){ LOOK.mode="turnF"; LOOK.t=0; LOOK.dur=0.34; LOOK.warn=false; LOOK._pinged=false; }
  } else if(LOOK.mode==="turnF"){
    washer.turnT = LOOK.t/LOOK.dur;
    if(LOOK.t>=LOOK.dur){ LOOK.mode="look"; LOOK.t=0; LOOK.dur=(1.0+Math.random()*1.1)*p; washer.turnT=1; }
  } else if(LOOK.mode==="look"){
    if(LOOK.t>=LOOK.dur){ LOOK.mode="turnB"; LOOK.t=0; LOOK.dur=0.34; }
  } else if(LOOK.mode==="turnB"){
    washer.turnT = 1 - LOOK.t/LOOK.dur;
    if(LOOK.t>=LOOK.dur){ LOOK.mode="wash"; LOOK.t=0; LOOK.dur=(1.5+Math.random()*1.9)*p; washer.turnT=0; }
  }
  LOOK.seen = (LOOK.mode==="look") ? (LOOK.seen||0)+dt : 0;
  washer.facing = (LOOK.mode==="look") ? 1 : washer.turnT;
  // suds while scrubbing
  if(LOOK.mode==="wash" && Math.random()<0.35){
    bubbles.push({x:washer.x-20+Math.random()*40, y:SINK_Y-92, r:2+Math.random()*5, vy:-14-Math.random()*22, vx:(Math.random()-.5)*10, life:1.6});
  }
}
const isWatching = () => LOOK.mode==="look";
// A look has to actually LAND before it can catch anyone — otherwise flicking
// round for a fraction of a second is as good as a proper look, and spamming
// tiny peeks beats playing properly.
const CATCH_MIN = 0.17;
const lookLanded = () => LOOK.mode==="look" && LOOK.seen > CATCH_MIN;

/* ---------- gameplay ---------- */
// close enough behind them to reach — for a peg, or for a flower
function nearWasher(){
  const dx = sneaker.x - washer.x, dy = sneaker.y - washer.y;
  return Math.hypot(dx, dy*1.4) < 82 && sneaker.y > washer.y - 8;
}
function inPegRange(){ return sneaker.hasPeg && nearWasher(); }
function atPegBox(){
  return Math.hypot(sneaker.x - PEGBOX.x, (sneaker.y - PEGBOX.y)*1.3) < 76;
}
/* close enough to reach up and give her a scratch */
function atCat(){
  return Math.hypot(sneaker.x - CATTREE.x, (sneaker.y - CATTREE.y - 16*SC)*1.2) < 84*SC;
}
/* within reach of the vase on the little side table */
const FLOWER_TABLE = FURNITURE.find(f => f.kind === "flowers");
const CAT_TREE_F   = FURNITURE.find(f => f.kind === "cattree");
// tucked in the shaded pocket behind a particular piece — the prompts for both
// easter eggs key off this, since ducking behind furniture is something the
// player does constantly anyway, so they'll find them without being told
const behind = f => f && hiddenAt(sneaker.x, sneaker.y) === f;
function atFlowers(){
  if(!FLOWER_TABLE) return false;
  const cx = FLOWER_TABLE.x + FLOWER_TABLE.w/2, cy = FLOWER_TABLE.y + FLOWER_TABLE.h/2;
  return Math.hypot(sneaker.x - cx, (sneaker.y - cy)*1.2) < 84*SC;
}
function pickFlower(){
  flowerPicked = true;
  sneaker.hasFlower = true;          // she keeps her peg too — two hands
  immT = 2.8;                        // …and say so, or she'll never dare use it
  S.flower();
  for(let i=0;i<14;i++) sparks.push({
    x: FLOWER_TABLE.x + FLOWER_TABLE.w/2 + (Math.random()-.5)*40,
    y: FLOWER_TABLE.y - 30*SC, vx:(Math.random()-.5)*90, vy:-Math.random()*90-20,
    life:0.8, col:["#ff8fab","#ffd93d","#c77dff"][i%3]});
}
function giveFlower(){
  sneaker.hasFlower = false;         // and with it goes the immunity
  flowerGiven = true;
  laU = 2.8;
  S.love();
  for(let i=0;i<10;i++) hearts.push({
    x: (sneaker.x + washer.x)/2 + (Math.random()-.5)*54,
    y: washer.y - 80 - Math.random()*30, vy:-30-Math.random()*26, life:1.5});
  hug = {t:0};                       // he turns round and gives her a squeeze
}
/* The hug. He steps in, holds on a moment, then goes back to the dishes — which
   is of course the moment she's been waiting for. Costs her a few seconds of
   her minute, which is the only thing it costs. */
function updateHug(dt){
  hug.t += dt;
  washer.facing = 1; washer.turnT = 1;
  sneaker.facing = 1; sneaker.moving = false;
  const side = washer.x > sneaker.x ? 1 : -1;
  if(hug.t < 0.75){                                   // steps in
    const tx = sneaker.x + 30*SC*side;
    washer.x += (tx - washer.x) * Math.min(1, dt*7);
    washer.y += (sneaker.y - washer.y) * Math.min(1, dt*7);
    washer.moving = true; washer.walk += dt*10;
  } else if(hug.t < 2.0){                             // holds on
    washer.moving = false; washer.walk += dt*1.2;
    if(Math.random() < 0.14) hearts.push({
      x:(washer.x+sneaker.x)/2 + (Math.random()-.5)*46,
      y: washer.y - 104, vy:-28, life:1.3});
  } else {                                            // and back to the sink
    washer.x += (washerSinkX() - washer.x) * Math.min(1, dt*6);
    washer.y += (SINK_Y - washer.y) * Math.min(1, dt*6);
    washer.moving = true; washer.walk += dt*9;
    if(Math.hypot(washer.x-washerSinkX(), washer.y-SINK_Y) < 3){
      washer.x = washerSinkX(); washer.y = SINK_Y;
      washer.moving = false; washer.facing = 0; washer.turnT = 0;
      // …and she turns her back to us again. Without this she stayed facing
      // front for the rest of the turn, so she looked like she was creeping
      // about backwards.
      sneaker.facing = 0; sneaker.turnT = 0;
      LOOK.mode="wash"; LOOK.t=0; LOOK.dur=2.4*pace(); LOOK.warn=false; LOOK._pinged=false;
      hug = null; graceT = 0.6;
    }
  }
}
/* stood at the right-hand end of the bench, within reach of the switch */
function atSwitch(){
  return Math.abs(sneaker.x - SWITCH_X) < 36*SC && sneaker.y < SINK_Y + 54*SC;
}
function flickSwitch(){
  tally.discos++;
  discoT = DISCO_TIME;
  discoStep = 0; discoNext = 0;      // the loop starts from the top each time
  S.disco();
}
function patCat(){
  tally.pats++;
  cat.purr = Math.min(2.6, cat.purr + 1.6);
  cat.patCd = 0.5;
  S.purr();
  for(let i=0;i<3;i++)
    hearts.push({x: CATTREE.x + (Math.random()-.5)*44*SC, y: CATTREE.y - 116*SC, vy:-32, life:1.3});
}
function reload(){
  sneaker.hasPeg = true;
  S.peg();
  for(let i=0;i<10;i++) sparks.push({x:PEGBOX.x,y:PEGBOX.y-30,vx:(Math.random()-.5)*140,vy:-Math.random()*140-20,life:0.6,col:PEG_COLS[i%PEG_COLS.length]});
}
function placePeg(){
  const pal = PEG_COLS;
  sneaker.hasPeg = false;
  const col = pal[washer.pegsOn.length % pal.length];
  washer.pegsOn.push({
    ox:(Math.random()-0.5)*36, oy:-84+Math.random()*54,
    col, rot:(Math.random()-0.5)*1.3, pop:0
  });
  S.peg(); S.point();
  for(let i=0;i<22;i++) sparks.push({x:washer.x,y:washer.y-70,vx:(Math.random()-.5)*260,vy:-Math.random()*220-40,life:0.8,col:pal[i%pal.length]});
  for(let i=0;i<4;i++) hearts.push({x:washer.x+(Math.random()-.5)*40,y:washer.y-90,vy:-40,life:1.2});
  flash = 0.35;
  turnPegs++;
  // send it up to the scoreboard, so the point physically arrives somewhere
  const mine = (sneaker === cushla);
  const d = scoreDot(mine, washer.pegsOn.length - 1);
  flyers.push({x0: washer.x, y0: washer.y-70, x: washer.x, y: washer.y-70,
               tx: d.x, ty: d.y, t: 0, dur: 0.55, col,
               who: mine ? "cushla" : "shonty", last: washer.pegsOn.length >= target});
  if(washer.pegsOn.length >= target){
    // the fifth peg IS the match — it shouldn't land like the first one
    flash = 0.9; shake = 0.55;
    for(let i=0;i<46;i++) sparks.push({x:washer.x,y:washer.y-70,
      vx:(Math.random()-.5)*440, vy:-Math.random()*340-60, life:1.1, col:pal[i%pal.length]});
    gameOver(sneaker);
  } else if(turnPegs >= PER_TURN){
    // two pegs is a turn — hand over
    scene = "roundwin"; sceneT = 0;
    msg = sneaker===cushla ? "That's two on Shonty!" : "That's two on you!";
    sub = sneaker===cushla
        ? "Your turn's done. Back to the sink — now he's coming for you."
        : "That's his turn done. Your turn to sneak up on him!";
  } else {
    const left = PER_TURN - turnPegs;
    scene = "roundwin"; sceneT = 0;
    msg = sneaker===cushla ? "PEGGED! You got Shonty." : "PEGGED! Shonty got you.";
    sub = sneaker===cushla
        ? "Sneak back to the basket for another — " + left + " more this turn."
        : "He's off to fetch another peg — he can get " + left + " more this turn.";
    // he's happily scrubbing again — a little grace before the next look
    LOOK.mode="wash"; LOOK.t=0; LOOK.dur=2.2*pace(); LOOK.warn=false; LOOK._pinged=false;
    washer.turnT=0; washer.facing=0;
  }
}
/* ---------- the catch, as a little sequence ----------
   whips the apron off → marches over → TWANG → doubles up laughing        */
let catchAnim = null, apronFall = null;

function updateCatch(dt){
  const ca = catchAnim; if(!ca) return;
  ca.t += dt;
  washer.facing = 1; washer.turnT = 1;

  // 1. off comes the apron
  if(ca.t > 0.28 && !ca.dropped){
    ca.dropped = true; washer.apronOff = true;
    apronFall = {x: washer.x, y: washer.y - 40, vy: -40, vx:(Math.random()-.5)*40,
                 rot: 0, vr: 2.2, ground: washer.y + 4};
    tone(300,0.12,"triangle",0.10,180);
  }
  // 2. marches over to the culprit
  if(ca.t < 0.95){
    const tx = sneaker.x + (washer.x > sneaker.x ? 40*SC : -40*SC);
    const ty = sneaker.y - 4;
    washer.x += (tx - washer.x) * Math.min(1, dt*5.5);
    washer.y += (ty - washer.y) * Math.min(1, dt*5.5);
    washer.moving = true; washer.walk += dt*11;
  } else washer.moving = false;

  // 3. TWANG
  if(ca.t > 0.95 && !ca.snapped){
    ca.snapped = true;
    snapFx = 1; shake = 0.6;
    sneaker.squeal = 2.0; sneaker.hop = 1.7;
    for(let i=0;i<18;i++) sparks.push({x:sneaker.x,y:sneaker.y-46,vx:(Math.random()-.5)*300,vy:-Math.random()*180-30,life:0.7,col:"#ffd93d"});
    S.snap(); setTimeout(()=>S.ow(), 140);
    dropAPeg();
  }
  // 4. cracks up
  if(ca.t > 1.35){
    ca.laugh = Math.min(1, ca.laugh + dt*3);
    if(!ca.laughed){ ca.laughed = true; S.laugh(); }
    if(Math.random() < 0.05) hearts.push({x:washer.x+(Math.random()-.5)*50, y:washer.y-110, vy:-34, life:1.1});
  }
}

// the twang shakes one of the pegs clean off — there goes a point
function dropAPeg(){
  if(washer.pegsOn.length === 0) return;
  const lost = washer.pegsOn.pop();
  fallers.push({
    x: washer.x + lost.ox, y: washer.y + lost.oy,
    vx: (Math.random()-0.5)*120 + (sneaker.x>washer.x?-40:40), vy: -90,
    rot: lost.rot, vr: (Math.random()-0.5)*12, col: lost.col,
    ground: washer.y + 6 + Math.random()*10
  });
  setTimeout(()=>{ tone(520,0.10,"square",0.12,300); }, 420);
}

function getCaught(){
  scene = "caught"; sceneT = 0;
  catchAnim = {t:0, dropped:false, snapped:false, laugh:0, laughed:false};
  // kept short enough to sit on one line — see banner()'s wrapping
  msg = sneaker===cushla ? "UNDIE SNAP! 😖" : "UNDIE SNAP! Got him! 😄";
  sub = sneaker===cushla
      ? "Caught you! Shonty grabbed the elastic of your undies, stretched it right out and — TWANG — let it go. \"OW!\""
      : "Got him! You grabbed the elastic of Shonty's undies, pulled it way out and — TWANG — let go. \"OW!\"";

  if(washer.pegsOn.length > 0){
    sub += (sneaker===cushla ? " And one of your pegs pinged right off him."
                             : " And one of his pegs pinged right off you.");
  }
}

/* ---------- the cat tree goes over ----------
   A minute of Beanbags is more than any post can take. Down it comes on top
   of the peg basket, everyone in the kitchen hears it, and that's the turn —
   whatever you'd managed to peg on by then, you keep.                    */
function catTimeUp(){
  tally.crashes++;
  scene = "catfall"; sceneT = 0;
  catFall = {t:0, crashed:false};
  msg = "TIMBER!";
  sub = "Down came Beanbags and her cat tree, right on the pegs — "
      + (sneaker===cushla ? "your minute's up. On the dishes with you!"
                          : "his minute's up. Your go to sneak!");
}
function updateCatFall(dt){
  const cf = catFall; if(!cf) return;
  cf.t += dt;
  if(cf.t > 0.5 && !cf.crashed){
    cf.crashed = true;
    shake = 0.85; flash = 0.14;
    S.crash();
    // pegs everywhere
    for(let i=0;i<26;i++) sparks.push({
      x: PEGBOX.x + (Math.random()-.5)*70, y: PEGBOX.y - 24,
      vx:(Math.random()-.5)*300, vy:-Math.random()*230-30,
      life:0.9, col: PEG_COLS[i%PEG_COLS.length]});
    for(let i=0;i<6;i++) floorPegs.push({
      x: PEGBOX.x + (Math.random()-.5)*130, y: PEGBOX.y + (Math.random()-.5)*26,
      rot:(Math.random()-.5)*3, col: PEG_COLS[Math.floor(Math.random()*PEG_COLS.length)]});
    if(floorPegs.length > 28) floorPegs.splice(0, floorPegs.length-28);
    // nobody sleeps through that — whoever's at the sink spins straight round
    LOOK.mode = "look"; LOOK.t = 0; LOOK.warn = false;
  }
  if(cf.crashed){ washer.facing = 1; washer.turnT = 1; washer.moving = false; }
}
/* the lean, the purr and the sleepy face — ticked every frame, every scene */
function updateCat(dt){
  cat.patCd = Math.max(0, cat.patCd - dt);
  cat.purr  = Math.max(0, cat.purr  - dt);
  const want = cat.purr > 0 ? 1 : 0;
  cat.smile += (want - cat.smile) * Math.min(1, dt*6);
  if(catFall){
    // over she goes — a fast topple with a little settle at the end
    const k = Math.min(1, catFall.t/0.55);
    cat.lean = 0.34 + (1.53-0.34) * (1 - Math.pow(1-k, 3));
    const after = catFall.t - 0.55;
    if(after > 0) cat.lean = 1.53 + Math.sin(after*13) * 0.05 * Math.max(0, 1 - after*1.6);
    cat.wob = 0;
  } else {
    const u = inMatch() ? 1 - Math.max(0, turnClock)/TURN_TIME : 0;
    cat.lean = 0.34 * Math.pow(u, 1.7);
    // she wobbles harder and faster the further over she gets
    cat.wob = Math.sin(T*(1.4 + u*5)) * (0.006 + u*0.030)
            + (cat.purr > 0 ? Math.sin(T*26)*0.007 : 0);
  }
}

function updatePlay(dt){
  // when it's YOUR turn on the dishes, hold to spin round
  if(humanWatch()) peekHeld = down(" ") || stick.on;
  if(!hug) updateLook(dt);        // he's not watching for sneaks, he's hugging

  // ----- the cat clock -----
  // A minute a turn, in both directions: it's the whole reason a game has a
  // shape. It also does the job the old 40-second "Shonty gave up" watchdog
  // used to bodge, except now you can watch it coming.
  turnT += dt;
  turnClock -= dt;
  const u = 1 - Math.max(0, turnClock)/TURN_TIME;      // 0 at the off, 1 when she goes
  cat.creakT -= dt;
  if(cat.creakT <= 0){
    if(u > 0.12) S.creak(u);
    cat.creakT = 4.0 - u*2.6 + Math.random()*0.7;      // groans quicken as she tips
  }
  if(turnClock <= 0){ catTimeUp(); return; }

  // the hug plays out on its own — no creeping, no pegging, no catching
  if(hug){ updateHug(dt); return; }

  // ----- movement -----
  const SPD = PORTRAIT ? 250 : 168;      // longer room, longer stride
  let mx=0, my=0, throttle=1;
  if(humanTurn()){
    if(down("arrowleft","a")) mx-=1;
    if(down("arrowright","d")) mx+=1;
    if(down("arrowup","w")) my-=1;
    if(down("arrowdown","s")) my+=1;
    if(!mx && !my && stick.mag > 0){     // swipe / drag steering
      mx = stick.dx; my = stick.dy; throttle = 0.34 + stick.mag*0.66;
    }
    // ONE action per press. Held down, this used to fire twice in consecutive
    // frames — handing over the flower and then instantly pegging him with the
    // same jab of the button, which is the free peg the flower isn't meant to be.
    const rawAct = down(" ") || tapPeg>0;
    if(!rawAct) actHeld = false;
    const act = rawAct && !actHeld;
    const used = () => { actHeld = true; tapPeg = 0; };
    // giving the flower comes first — it's the one thing she can do while he
    // IS looking, which is the whole point of carrying it
    if(act && sneaker.hasFlower && nearWasher()){ used(); giveFlower(); }
    else if(act && inPegRange() && !isWatching()){ used(); placePeg(); return; }
    else if(act && atFlowers() && !flowerPicked && sneaker===cushla){ used(); pickFlower(); }
    else if(act && atCat() && cat.patCd<=0){ used(); patCat(); }
    else if(act && atSwitch()){ used(); flickSwitch(); }
  } else {
    const ai = aiMove(dt); mx = ai.x; my = ai.y;
    if(ai.peg){ placePeg(); return; }
    throttle = AI_SPEED;               // he creeps rather than marches
  }
  const len = Math.hypot(mx,my) || 1;
  sneaker.vx = mx/len*SPD*throttle; sneaker.vy = my/len*SPD*throttle;
  sneaker.moving = (mx||my) ? true : false;
  if(mx) sneaker.dir = mx>0 ? 1 : -1;

  moveWithCollision(sneaker, sneaker.vx*dt, sneaker.vy*dt);

  if(sneaker.moving){
    const was = Math.floor(sneaker.walk);
    sneaker.walk += dt*9;
    if(Math.floor(sneaker.walk)!==was && Math.floor(sneaker.walk)%2===0) S.step();
  } else sneaker.walk += dt*0.6;

  // ----- back at the basket? grab a fresh peg -----
  if(!sneaker.hasPeg && atPegBox()) reload();

  // ----- the rule: while he's looking, be STILL or be HIDDEN -----
  if(graceT > 0) graceT -= dt;
  const hide = hiddenAt(sneaker.x, sneaker.y);
  sneaker.hidden = !!hide;

  // ----- he can't walk past a guitar -----
  if(!humanTurn() && hide === GUITAR_F && !sneaker.moving){
    if(playing <= 0){                       // just picked it up
      aiRest = Math.max(aiRest, 2.8);       // …so he lingers long enough to play
      tally.guitar++;
      strumT = 0;
    }
    playing += dt;
    strumT  -= dt;
    if(strumT <= 0){
      S.strum(Math.round(playing*2));
      strumT = 0.44 + Math.random()*0.14;
      // off to the side of the guitar — dead centre puts them under the
      // "hidden!" label that's floating over whoever is stood there
      notes.push({x: GUITAR_F.x + GUITAR_F.w + 12 + Math.random()*16,
                  y: GUITAR_F.y - 4, vy: -30 - Math.random()*16,
                  life: 1.7, ph: Math.random()*6});
    }
  } else playing = 0;
  // a flower in her hand and he hasn't the heart to catch her
  if(graceT <= 0 && lookLanded() && sneaker.moving && !hide && !sneaker.hasFlower){
    getCaught(); return;
  }
  // …and if she stopped only a heartbeat before he looked, let her feel it.
  // "Nothing happened" is a much duller outcome than "that was close".
  stillT = sneaker.moving ? 0 : stillT + dt;
  const landed = lookLanded();
  if(landed && !wasLanded && humanTurn() && !sneaker.moving && !hide
     && stillT < 0.45 && graceT <= 0){
    phewT = 1.5; S.phew();
    for(let i=0;i<3;i++) sparks.push({x: sneaker.x + 14 + i*4, y: sneaker.y - 116,
      vx: 40+Math.random()*30, vy: -30-Math.random()*20, life: 0.6, col:"#9fd7f2"});
  }
  wasLanded = landed;
}

/* ---------- Shonty's AI sneak ----------
   He should look like he's SNEAKING, not marching: he creeps in short dashes
   between hiding pockets and pauses in cover to see if you'll turn. And he's
   deliberately slow to react when you do spin round — that reaction window is
   your whole chance of catching him, so it must be generous.               */
let aiBurst = 0;        // >0: currently dashing
let aiRest  = 0;        // >0: currently holding still
let aiCover = null;     // the pocket he's making for
// He can't walk past a guitar. Left to himself he never would go near it —
// he only ever picks the NEAREST pocket that's on his way to the sink — so
// once a turn he makes a deliberate detour to it instead.
let guitarPlan = false; // means to stop off at the guitar this turn
let guitarGoing = false;// on his way there now
let guitarT = 0;        // …and how long he's been trying, in case he can't
let aiWatchT = 0;       // how long you've been looking at him
let aiWind = 0;         // winding up to clip a peg on
let aiSinceWatch = 0;   // how long since you last looked — he breaks cover then
let graceT = 0;         // no catches for a moment as a turn opens
let turnT = 0;          // how long the current turn has run
let aiPatience = 0;     // how long he's been holding back waiting for an opening
let aiPatienceMax = 2;  // …after which he chances it anyway

function nearestCover(){
  let best=null, bd=1e9;
  for(const f of FURNITURE){
    const cx=f.hide.x+f.hide.w/2, cy=f.hide.y+f.hide.h/2;
    // only cover that's actually on the way — nearer the sink than he is
    if(cy > sneaker.y + 20*SC) continue;
    const d = Math.hypot(cx-sneaker.x, cy-sneaker.y);
    if(d<bd){ bd=d; best={x:cx,y:cy,d}; }
  }
  return best;
}

function aiMove(dt){
  if(aiPause>0){ aiPause -= dt; return {x:0,y:0,peg:false}; }

  const watching = isWatching();
  const hide = hiddenAt(sneaker.x, sneaker.y);
  const goal = sneaker.hasPeg ? {x:washer.x, y:washer.y+58*SC} : {x:PEGBOX.x, y:PEGBOX.y};

  // --- you're looking at him ---
  if(watching){
    aiWatchT += dt; aiSinceWatch = 0;
    aiWind = 0;
    if(hide) return {x:0,y:0,peg:false};       // safe in cover, just waits
    // REACTION WINDOW: he carries on for a beat before he notices you turned
    if(aiWatchT < aiReact){
      const d = navTo(sneaker.x, sneaker.y, goal.x, goal.y);
      return {x:d.x, y:d.y, peg:false};
    }
    return {x:0,y:0,peg:false};                // rumbled — freezes
  }
  aiWatchT = 0;

  // --- clipping a peg on takes a moment, so you can see it happening ---
  if(inPegRange()){
    aiWind += dt;
    if(aiWind > 0.28){ aiWind = 0; return {x:0,y:0,peg:true}; }
    return {x:0,y:0,peg:false};
  }
  aiWind = 0;

  // --- he watches your meter: won't commit to the last few steps while
  //     you've still got plenty of puff left to spin round with.
  //     BUT his patience is finite — otherwise a player who simply never
  //     looks would leave him waiting forever and the turn would deadlock. ---
  if(humanWatch() && sneaker.hasPeg){
    const close = Math.hypot(sneaker.x-washer.x, sneaker.y-washer.y) < 150*SC;
    if(close && peekE > 0.62 && !hide && aiPatience < aiPatienceMax){
      aiPatience += dt;
      aiRest = Math.max(aiRest, 0.25);
      return {x:0,y:0,peg:false};
    }
  }
  if(aiPatience >= aiPatienceMax) aiPatience = aiPatienceMax;   // committed now

  // --- creep in dashes, resting in cover between them ---
  aiSinceWatch += dt;
  if(aiRest > 0){
    aiRest -= dt;
    if(aiRest <= 0){ aiBurst = 0.75 + Math.random()*0.95; aiCover = null; }
    return {x:0,y:0,peg:false};
  }
  if(aiBurst <= 0){
    // he watches YOUR rhythm: breaks cover just after you turn back to the sink
    if(aiSinceWatch < 0.28 && Math.random() < 0.7){ return {x:0,y:0,peg:false}; }
    // pick the next hop: a hiding pocket on the way, or straight on
    const cover = nearestCover();
    if(GUITAR_F && (guitarGoing || guitarPlan) && !playing){
      guitarPlan = false; guitarGoing = true;      // stick with it across bursts
      const h = GUITAR_F.hide;
      aiCover = {x: h.x + h.w/2, y: h.y + h.h/2, d: 0};
    } else {
      aiCover = (cover && cover.d < 190*SC && !hide && Math.random() < 0.62) ? cover : null;
    }
    aiBurst = 0.75 + Math.random()*0.95;
  }
  aiBurst -= dt;
  let tgt = aiCover || goal;
  // The guitar overrides where he's headed, not just which cover he picks:
  // ending a rest clears aiCover and starts a fresh burst WITHOUT re-picking,
  // so as a mere cover choice he'd abandon it and march at the sink instead.
  if(guitarGoing && GUITAR_F){
    const h = GUITAR_F.hide;
    tgt = {x: h.x + h.w/2, y: h.y + h.h/2};
    guitarT += dt;
    if(guitarT > 9){ guitarGoing = false; guitarT = 0; }   // can't get there — give up
  }
  const d = navTo(sneaker.x, sneaker.y, tgt.x, tgt.y);
  // reached what he was making for? settle in and wait
  const reached = Math.hypot(tgt.x-sneaker.x, tgt.y-sneaker.y) < 26*SC;
  if(reached && (aiCover || guitarGoing)){
    aiCover = null; aiBurst = 0;
    aiRest = guitarGoing ? 0.7 : 0.45 + Math.random()*0.9;
    guitarGoing = false; guitarT = 0;        // arrived — and now he plays
    return {x:0,y:0,peg:false};
  }
  if(aiBurst <= 0){ aiRest = 0.35 + Math.random()*0.7; }
  return {x:d.x, y:d.y, peg:false};
}
